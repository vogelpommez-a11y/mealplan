<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#DC2626">
<meta name="theme-color" content="#0C0A0B" media="(prefers-color-scheme: dark)">
<title>Paddy’s Mealplan</title>
<style>
  :root {
    /* Kondensierte, athletische Display-Schrift — nur System-Fonts (kein externes
       Laden: Google-Fonts-CDN waere in DE ein Datenschutz-/Abmahnrisiko). */
    --font-display: "Bahnschrift", "Arial Narrow", "Roboto Condensed", "Oswald", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-body: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

    --bg: #F6F4F4;
    --surface: #FFFFFF;
    --surface-2: #F0ECEC;
    --text: #1A1416;
    --text-muted: #6B5F62;
    --border: #E7E0E1;
    --border-strong: #D6CCCE;

    --accent: #DC2626;
    --accent-strong: #B01218;
    --accent-contrast: #FFFFFF;
    /* Rot als Vollflaeche hinter weisser Schrift. Getrennt von --accent, weil das
       helle Dark-Rot mit Weiss nur 3,65:1 erreicht – zu wenig fuer Text (4,5:1). */
    --accent-solid: #DC2626;

    /* War frueher ein eigenes Orange, getrennt von --accent. Kein dokumentierter Token,
       kein bewusst gewaehltes zweites Rot – nur ein Altlast-Wert. Fehler/Warnung/
       destruktiv sind im Theme dasselbe Rot wie ueberall sonst, kein zweites Signal. */
    --danger: var(--accent);
    --ok: #1E9E57;   /* Sync ok / verbunden */

    --fr: #A96E12;   /* Frühstück */
    --mi: #2E7D6B;   /* Mittagessen */
    --ab: #6E5A9E;   /* Abendessen */

    /* Trainingstag. Das einzige Blau im Theme und bewusst gesetzt: Rot ist hier die
       Grundfarbe UND das Warnsignal ("drueber"), ein rot markierter Trainingstag waere
       daher nicht als neutrale Eigenschaft lesbar. Blau ist der einzige Ton, der sich
       von beidem absetzt. Achtung: Rot und Blau haben zueinander nur 1,07:1 Kontrast —
       fuer Farbenblinde sind sie ununterscheidbar. Die Markierung traegt deshalb NIE
       allein ueber die Farbe, sondern immer zusaetzlich Hantel-Icon + Text. */
    --train: #2563EB;
    --train-strong: #1D4ED8;
    /* Schrift auf blauer Vollflaeche. Eigener Token, weil sich Blau zwischen den
       Themes UMKEHRT: hell ist es dunkelblau (weisse Schrift), dunkel ist es hellblau
       (dunkle Schrift). Ein festes Weiss wie bei --accent-contrast waere im Dark-Theme
       auf #93C5FD unlesbar (rund 1,9:1). */
    --train-contrast: #FFFFFF;

    --shadow: 0 1px 2px rgba(20,24,31,.06), 0 8px 24px rgba(20,24,31,.08);
    --radius: 12px;
    --radius-sm: 8px;
    --maxw: 1120px;

  @media (prefers-color-scheme: dark) {
    :root {
      --logo: var(--logoD);
      --bg: #0C0A0B;
      --surface: #141011;
      --surface-2: #1C1718;
      --text: #F4EFEE;
      --text-muted: #A69B9D;
      --border: #2A2223;
      --border-strong: #3A2F30;

      --accent: #FF3040;
      --accent-strong: #FF5A66;
      --accent-contrast: #FFFFFF;
      --accent-solid: #E02234;

      --danger: var(--accent);
      --ok: #3DDC84;

      --fr: #E0A94A;
      --mi: #58B49E;
      --ab: #AC93E0;

      --train: #60A5FA;
      --train-strong: #93C5FD;
      --train-contrast: #0C1220;

      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"] {
    --logo: var(--logoL);
    --bg: #F6F4F4; --surface: #FFFFFF; --surface-2: #F0ECEC;
    --text: #1A1416; --text-muted: #6B5F62; --border: #E7E0E1; --border-strong: #D6CCCE;
    --accent: #DC2626; --accent-strong: #B01218; --accent-contrast: #FFFFFF; --accent-solid: #DC2626; --danger: var(--accent); --ok: #1E9E57;
    --fr: #A96E12; --mi: #2E7D6B; --ab: #6E5A9E;
    --train: #2563EB; --train-strong: #1D4ED8; --train-contrast: #FFFFFF;
    --shadow: 0 1px 2px rgba(20,24,31,.06), 0 8px 24px rgba(20,24,31,.08);
  }
  :root[data-theme="dark"] {
    --logo: var(--logoD);
    --bg: #0C0A0B; --surface: #141011; --surface-2: #1C1718;
    --text: #F4EFEE; --text-muted: #A69B9D; --border: #2A2223; --border-strong: #3A2F30;
    --accent: #FF3040; --accent-strong: #FF5A66; --accent-contrast: #FFFFFF; --accent-solid: #E02234; --danger: var(--accent); --ok: #3DDC84;
    --fr: #E0A94A; --mi: #58B49E; --ab: #AC93E0;
    --train: #60A5FA; --train-strong: #93C5FD; --train-contrast: #0C1220;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; }
  body { margin: 0; }

  .app {
    font-family: var(--font-body);
    color: var(--text);
    background:
      radial-gradient(1200px 400px at 10% -8%, color-mix(in srgb, var(--accent) 9%, transparent), transparent),
      var(--bg);
    min-height: 100vh;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 20px; }

  /* ---------- Header ---------- */
  /* Hintergrund und Weichzeichnung liegen bewusst auf dem Pseudo-Element, nicht auf
     dem Kopf selbst: ein backdrop-filter auf einem Element macht dieses zum
     Bezugsrahmen fuer ALLE fixierten Nachfahren. Die untere Reiterleiste (position:
     fixed) klebte dadurch am unteren Rand des Kopfes statt am Bildschirm und
     verdeckte Logo, Slogan und Profil. Auf dem Pseudo-Element hat der Filter
     denselben optischen Effekt, ohne diese Nebenwirkung. */
  header.site {
    position: sticky; top: 0; z-index: 30;
    border-bottom: 1px solid var(--border);
  }
  header.site::before {
    content: ""; position: absolute; inset: 0; z-index: -1;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
  }
  .head-inner { display: flex; align-items: center; gap: 18px; padding: 14px 0; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 12px; margin-right: auto; }
  .brand .mark {
    width: 44px; height: 44px; border-radius: 50%; flex: none;
    overflow: hidden;
    background: center / cover no-repeat var(--logo);
  }
  .brand h1 {
    font-family: var(--font-display); font-weight: 700;
    font-size: 26px; margin: 0; letter-spacing: .6px; line-height: 1;
    text-transform: uppercase;
  }
  .brand h1 span { color: var(--accent); }
  .brand p { margin: 0; font-size: 12.5px; color: var(--text-muted); }
  /* Slogan in Schreibschrift (System-Fonts, kein externes Laden). Farbe folgt
     dem Theme: im Dark quasi weiss, im Light dunkel – sonst waere er unlesbar. */
  .brand .slogan { margin: 3px 0 0; font-family: "Segoe Script", "Bradley Hand", "Brush Script MT", "Snell Roundhand", cursive; font-size: 15.5px; font-weight: 400; color: var(--text); letter-spacing: .3px; line-height: 1.1; }
  /* Kopfzeile: Brand + Profil in Zeile 1, Reiter in eigener Zeile darunter */
  #profile-slot { order: 2; }
  .navrow { order: 3; width: 100%; display: flex; }

  .tabs { display: flex; gap: 4px; background: var(--surface-2); padding: 4px; border-radius: 999px; border: 1px solid var(--border); }
  .tab {
    font: inherit; font-size: 14px; font-weight: 550;
    border: 0; background: transparent; color: var(--text-muted);
    padding: 8px 18px; border-radius: 999px; cursor: pointer;
    display: flex; align-items: center; gap: 7px; transition: color .15s, background .15s;
  }
  .tab:hover { color: var(--text); }
  .tab[aria-selected="true"] { background: var(--surface); color: var(--accent-strong); box-shadow: var(--shadow); }
  .tab .count { font-size: 11.5px; background: color-mix(in srgb, var(--accent) 16%, var(--surface)); color: var(--accent-strong); border-radius: 999px; padding: 1px 7px; font-variant-numeric: tabular-nums; }
  .tab .soon-tag { font-family: var(--font-display); font-size: 9.5px; text-transform: uppercase; letter-spacing: .08em; background: var(--accent); color: var(--accent-contrast); border-radius: 5px; padding: 1px 5px; margin-left: 1px; }
  /* Pro sticht als einziger Reiter als Vollflaeche heraus. Spezifitaet .tab.tab-pro,
     damit die Regel gegen .tab[aria-selected="true"] gewinnt – sonst waere der
     Knopf ausgerechnet im aktiven Zustand wieder unauffaellig. */
  .tab.tab-pro { background: var(--accent-solid); color: var(--accent-contrast); font-weight: 700; }
  .tab.tab-pro:hover { background: color-mix(in srgb, var(--accent-solid) 86%, #000); color: var(--accent-contrast); }
  .tab.tab-pro[aria-selected="true"] { background: var(--accent-solid); color: var(--accent-contrast); box-shadow: var(--shadow); }
  .tab.tab-pro .soon-tag { background: var(--accent-contrast); color: var(--accent-solid); }
  .tab .ts { display: none; } /* Kurzform der Beschriftung, nur im unteren Balken */
  /* Handy: aus der Reiterleiste im Kopf wird eine feste Leiste am unteren Rand, wie in
     nativen Apps. Grund ist gemessen, nicht geschaetzt: die fuenf Reiter brauchen
     742 px, bei 360 px Bildschirmbreite stehen 332 px zur Verfuegung — bisher waren
     sie also nur durch seitliches Schieben erreichbar, ohne jeden Hinweis darauf.
     Die Leiste wird per CSS versetzt und NICHT im Markup verdoppelt: sonst muessten
     zwei Leisten synchron gehalten werden (aria-selected, Meal-Zaehler). */
  @media (max-width: 680px) {
    /* display:contents statt none — none wuerde die (fixierte) Leiste mit ausblenden */
    .navrow { display: contents; }
    .tabs {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 0;
      border: 0; border-top: 1px solid var(--border); border-radius: 0;
      background: color-mix(in srgb, var(--surface) 94%, var(--bg));
      backdrop-filter: blur(10px);
      padding: 5px 3px calc(5px + env(safe-area-inset-bottom, 0px)); /* iPhone-Homebar */
      box-shadow: 0 -6px 20px rgba(0, 0, 0, .18);
    }
    .tab {
      flex: none; flex-direction: column; gap: 3px; padding: 6px 2px 5px;
      font-size: 10.5px; font-weight: 600; line-height: 1.1; min-height: 46px;
      justify-content: center; position: relative; border-radius: 10px; white-space: nowrap;
    }
    .tab svg { width: 20px; height: 20px; }
    .tab .tl { display: none; }
    .tab .ts { display: inline; }
    .tab[aria-selected="true"] {
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent); box-shadow: none;
    }
    /* Kein Vollflaechen-Rot im Balken — als Kachel unter dem Daumen waere das zu laut.
       Pro bleibt ueber die Akzentfarbe erkennbar. */
    .tab.tab-pro, .tab.tab-pro:hover, .tab.tab-pro[aria-selected="true"] {
      background: transparent; color: var(--accent); box-shadow: none;
    }
    .tab.tab-pro[aria-selected="true"] { background: color-mix(in srgb, var(--accent) 12%, transparent); }
    /* Zaehler als Eckmarke am Symbol — neben dem Text ist in 66 px kein Platz */
    .tab .count { position: absolute; top: 1px; left: 50%; margin-left: 5px; font-size: 9.5px; padding: 0 5px; }
    .tab .soon-tag { display: none; } /* passt nicht; die Seite selbst sagt „Bald“ */
    /* Platz schaffen, sonst verdeckt die Leiste Inhalt und Fusszeile */
    .app { padding-bottom: calc(56px + env(safe-area-inset-bottom, 0px)); }
    #toast { bottom: calc(72px + env(safe-area-inset-bottom, 0px)); }
  }

  main { padding: 28px 0 80px; }

  /* ---------- Footer (Rechtliches) ---------- */
  .site-foot { border-top: 1px solid var(--border); margin-top: auto; background: color-mix(in srgb, var(--surface-2) 40%, var(--bg)); }
  .foot-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px 18px; padding: 16px 0; flex-wrap: wrap; }
  .foot-copy { font-size: 12.5px; color: var(--text-muted); }
  .foot-nav { display: flex; align-items: center; gap: 8px; }
  .foot-link { font: inherit; font-size: 12.5px; color: var(--text-muted); background: 0; border: 0; padding: 2px 2px; cursor: pointer; }
  .foot-link:hover { color: var(--accent-strong); text-decoration: underline; }
  .foot-sep { color: var(--border-strong); }
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .legal h4 { font-family: var(--font-display); font-size: 15.5px; font-weight: 600; margin: 18px 0 5px; }
  .legal h4:first-child { margin-top: 0; }
  .legal p { margin: 0 0 10px; font-size: 13.5px; line-height: 1.6; color: var(--text); }
  .legal p.muted, .legal a { color: var(--text-muted); }
  .credits { overflow-x: auto; margin: 0 0 10px; }
  .credits table { border-collapse: collapse; width: 100%; min-width: 460px; font-size: 12px; }
  .credits th, .credits td { text-align: left; padding: 5px 8px 5px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
  .credits th { color: var(--text-muted); font-weight: 650; white-space: nowrap; }
  .credits td { color: var(--text); }
  .legal a { color: var(--accent-strong); }
  .legal-draft { font-size: 12.5px; line-height: 1.55; background: color-mix(in srgb, var(--fr) 12%, var(--surface)); border: 1px solid color-mix(in srgb, var(--fr) 30%, transparent); border-radius: var(--radius-sm); padding: 10px 12px; margin: 0 0 16px; color: var(--text); }

  /* ---------- Section head ---------- */
  .section-head { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
  .section-head .title { margin-right: auto; }
  .section-head h2 { font-family: var(--font-display); font-weight: 600; font-size: 27px; margin: 0 0 2px; letter-spacing: .2px; }
  .section-head .sub { color: var(--text-muted); font-size: 14px; }

  /* ---------- Buttons ---------- */
  .btn {
    font: inherit; font-size: 14px; font-weight: 550; cursor: pointer;
    border: 1px solid var(--border-strong); background: var(--surface); color: var(--text);
    padding: 9px 15px; border-radius: var(--radius-sm);
    display: inline-flex; align-items: center; gap: 8px; transition: border-color .15s, background .15s, transform .05s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn:active { transform: translateY(1px); }
  /* Gesperrte Knoepfe sahen bisher aus wie bedienbare – es gab gar keinen Stil dafuer.
     Kein Zeiger, kein Hover, kein Anheben beim Druecken: der Knopf soll auch beim
     Antippen erkennbar nicht reagieren. */
  .btn:disabled { opacity: .45; cursor: default; box-shadow: none; }
  .btn:disabled:hover { border-color: var(--border-strong); }
  .btn.primary:disabled:hover { border-color: var(--accent); }
  .btn:disabled:active { transform: none; }
  /* Sieht gesperrt aus, ist es aber nicht: ein echtes disabled schluckt den Klick, und
     dann liesse sich beim Antippen auch nicht sagen, WARUM es nicht weitergeht. Deshalb
     nur die Optik plus aria-disabled – die Meldung kommt aus dem Klick-Handler. */
  .btn.is-off { opacity: .45; box-shadow: none; }
  .btn.is-off:active { transform: none; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-contrast); }
  .btn.primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--text-muted); }
  .btn.ghost:hover { color: var(--text); background: var(--surface-2); border-color: transparent; }
  .btn.danger { color: var(--accent); border-color: transparent; }
  .btn.danger:hover { background: color-mix(in srgb, var(--accent) 13%, var(--surface)); border-color: transparent; color: var(--accent-strong); }
  /* Löschen als Icon-Button (Meal-Karte) – dezent grau, Hover in Theme-Rot.
     Sichtbar 34 px, Trefferflaeche per Pseudo-Element auf 44 × 44 erweitert
     (hitSlop-Muster) – so bleibt die Button-Zeile niedrig und der Touch-Target konform. */
  .btn.del-ic { position: relative; margin-left: auto; width: 34px; height: 34px; padding: 0; justify-content: center; color: var(--text-muted); background: transparent; border-color: transparent; }
  .btn.del-ic::after { content: ""; position: absolute; inset: -5px; }
  .btn.del-ic svg { width: 17px; height: 17px; }
  .btn.del-ic:hover { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--surface)); border-color: transparent; }
  .btn svg { width: 16px; height: 16px; }
  .btn.sm { padding: 6px 11px; font-size: 13px; }

  /* ---------- Week grid ---------- */
  /* Wochenplan-Kopf: Titel oben, Werkzeugleiste eine Zeile darunter */
  .plan-head { flex-direction: column; align-items: stretch; gap: 16px; }
  .plan-tools { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .plan-tools .grow { margin-left: auto; }
  .week-switch { display: inline-flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 3px; gap: 2px; }
  .ws-btn { font: inherit; font-size: 13px; font-weight: 600; letter-spacing: .01em; cursor: pointer; border: 0; background: transparent; color: var(--text-muted); padding: 7px 15px; border-radius: 999px; white-space: nowrap; transition: color .12s, background .12s, box-shadow .12s; }
  .ws-btn:hover { color: var(--text); }
  .ws-btn.active { color: var(--accent-contrast); background: linear-gradient(135deg, var(--accent), var(--accent-strong)); box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 34%, transparent); }
  .shop-cta { display: flex; align-items: center; justify-content: center; gap: 11px; width: 100%; margin: 22px 0 2px; padding: 16px; font: inherit; font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; cursor: pointer; color: var(--accent-contrast); background: linear-gradient(135deg, var(--accent), var(--accent-strong)); border: 0; border-radius: var(--radius); box-shadow: 0 6px 20px color-mix(in srgb, var(--accent) 26%, transparent); transition: transform .14s ease, box-shadow .14s ease; }
  .shop-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 28px color-mix(in srgb, var(--accent) 32%, transparent); }
  .shop-cta svg { width: 22px; height: 22px; }
  .week { display: grid; grid-template-columns: repeat(auto-fill, minmax(232px, 1fr)); gap: 16px; }
  .day {
    position: relative;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column;
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  .day::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; z-index: 1;
    background: linear-gradient(90deg, var(--accent), var(--accent-strong));
  }
  .day:hover {
    transform: translateY(-3px);
    border-color: color-mix(in srgb, var(--accent) 42%, var(--border));
    box-shadow: 0 12px 30px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  .day.today { border-color: color-mix(in srgb, var(--accent) 55%, var(--border)); box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 40%, transparent), var(--shadow); }
  .day.today::before { height: 5px; }
  .day > .day-head {
    display: flex; align-items: center; justify-content: space-between; gap: 6px 8px;
    flex-wrap: wrap; /* schmale Karte: das Ueberschreitungs-Zeichen darf umbrechen,
                        statt den Heute-Chip aus der Karte zu draengen */
    padding: 15px 15px 12px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 12%, var(--surface)), var(--surface));
    border-bottom: 1px solid var(--border);
  }
  .day-head .dname { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: .2px; }
  .day-head .dtag {
    font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
    color: var(--text-muted); background: var(--surface-2); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 999px;
  }
  .day.today .dtag {
    color: var(--accent-contrast); border-color: transparent;
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 38%, transparent);
  }
  .day-head .dnum { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  /* Ueber dem Tagesziel: Zeichen UND Text, nie nur Farbe. Steht vor dem Tages-Chip,
     damit es beim Ueberfliegen der Wochenspalten sofort auffaellt. */
  .day-head .dover {
    margin-left: auto; font-size: 10px; font-weight: 700; letter-spacing: .03em;
    white-space: nowrap; color: var(--accent); padding: 3px 8px; border-radius: 999px;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 38%, transparent);
  }
  .day.over > .day-head { background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 20%, var(--surface)), var(--surface)); }

  /* ---- Trainingstag ----
     Rot und Blau sind fast gleich hell (1,07:1) und fuer Farbenblinde nicht zu trennen.
     Die Markierung besteht deshalb aus drei Trägern: Rand, Hantel-Icon UND dem Wort
     „Training". Wer nur einen davon entfernt, nimmt der Markierung ihre Zugaenglichkeit. */
  .day.training { border-color: color-mix(in srgb, var(--train) 55%, var(--border)); }
  .day.training::before { background: linear-gradient(90deg, var(--train), var(--train-strong)); }
  /* Kopfzeile zieht mit — sonst steht ein blauer Rand ueber rosa Verlauf. Das :not(.over)
     ist bewusst und nicht durch Reihenfolge ersetzbar: ueberschreitet der Tag sein Ziel,
     muss die Warnung rot bleiben, egal ob trainiert wird. */
  .day.training:not(.over) > .day-head {
    background: linear-gradient(180deg, color-mix(in srgb, var(--train) 12%, var(--surface)), var(--surface));
  }
  .day.training:hover {
    border-color: color-mix(in srgb, var(--train) 70%, var(--border));
    box-shadow: 0 12px 30px color-mix(in srgb, var(--train) 20%, transparent);
  }
  /* Faellt „heute" auf einen Trainingstag, wird auch der Ring blau — sonst stossen roter
     Ring und blauer Rand aneinander. Dass es heute ist, traegt weiter der rote Chip. */
  .day.training.today { box-shadow: 0 0 0 1px color-mix(in srgb, var(--train) 45%, transparent), var(--shadow); }
  .day-head .dtrain {
    /* klebt am Tagesnamen und schiebt Ueberschreitungs-Zeichen + Tages-Chip nach rechts */
    margin-right: auto;
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase;
    white-space: nowrap; color: var(--train-strong); padding: 3px 8px; border-radius: 999px;
    background: color-mix(in srgb, var(--train) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--train) 40%, transparent);
  }
  /* 13px. Kein stroke-width hier: das Icon bringt seine Staerken selbst mit, und eine
     CSS-Regel wuerde das Praesentationsattribut im SVG ueberschreiben. */
  .day-head .dtrain svg { width: 13px; height: 13px; flex: none; }
  .wg-train { display: inline-flex; align-items: center; gap: 4px; color: var(--train-strong); }
  .wg-train svg { width: 13px; height: 13px; flex: none; }
  .slots { display: flex; flex-direction: column; gap: 2px; padding: 8px; flex: 1; }

  /* Tages-Nährwerte (Fuß der Tageskarte) */
  .day-nut { display: flex; align-items: baseline; flex-wrap: wrap; gap: 4px 12px; padding: 9px 14px 12px; border-top: 1px dashed var(--border); background: color-mix(in srgb, var(--surface-2) 55%, var(--surface)); }
  .day-nut .kcal { font-weight: 700; font-size: 13px; color: var(--accent); font-variant-numeric: tabular-nums; }
  .day-nut .kcal small { font-weight: 600; color: var(--text-muted); }
  .day-nut .macros { display: flex; gap: 9px; margin-left: auto; font-size: 11.5px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .day-nut .macros b { font-weight: 650; color: var(--text); }
  .day-nut .m::before { content: ""; display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: baseline; background: var(--mc, var(--accent)); }
  .m.carb { --mc: #E9A03B; } .m.prot { --mc: #C74B78; } .m.fat { --mc: #4AA8E0; }

  /* Wochen-Gesamtübersicht */
  .week-nut { position: relative; overflow: hidden; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 18px; margin-bottom: 20px; }
  .week-nut::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent-strong)); }
  .week-nut .wn-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .week-nut .wn-head h3 { font-family: var(--font-display); font-size: 18px; font-weight: 600; margin: 0; }
  .week-nut .wn-head .wn-sub { color: var(--text-muted); font-size: 12.5px; }
  .wn-tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .wn-tile { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .wn-tile .val { font-family: var(--font-display); font-size: 24px; font-weight: 600; line-height: 1; font-variant-numeric: tabular-nums; }
  .wn-tile .val .u { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-left: 3px; font-family: var(--font-body); }
  .wn-tile .lbl { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .wn-tile .lbl::before { content: ""; width: 9px; height: 9px; border-radius: 50%; background: var(--tc, var(--accent)); }
  .wn-tile.t-kcal { --tc: var(--accent); }
  .wn-tile.t-carb { --tc: #E9A03B; } .wn-tile.t-prot { --tc: #C74B78; } .wn-tile.t-fat { --tc: #4AA8E0; }
  .week-nut .wn-empty { color: var(--text-muted); font-size: 13.5px; margin: 2px 0 0; }
  /* Ziel-Fortschritt: Balken gegen das im Kalorienrechner gespeicherte Tagesziel.
     Ueberschreitung faerbt bernstein (--danger) – Rot ist bereits die Akzentfarbe. */
  /* Zwei getrennte Farbachsen: --mc sagt WELCHES Makro (Punkt vor dem Label),
     --sc sagt WIE es steht (Balken). Sonst wuerde die Kategoriefarbe die Warnung
     ueberdecken – und der Zustand steht ohnehin zusaetzlich als Text da. */
  /* „noch offen“ = gedaempftes Gruen: sichtbar, aber ohne die Aussage „geschafft“.
     Anteil so gewaehlt, dass der Balken gegen die Rinne noch ≥3:1 steht. */
  .gm { --mc: var(--accent); --sc: color-mix(in srgb, var(--ok) 55%, var(--surface-2)); --sc2: color-mix(in srgb, var(--ok) 40%, var(--surface-2)); margin-top: 9px; }
  .gm-r { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; font-size: 11.5px; margin-bottom: 5px; }
  .gm-n { color: var(--text-muted); font-weight: 600; }
  .gm-n::before { content: ""; display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; background: var(--mc); }
  .gm-v { color: var(--text-muted); font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .gm-v b { color: var(--text); font-weight: 700; }
  .gm-bar { height: 6px; border-radius: 999px; background: var(--surface-2); overflow: hidden; box-shadow: inset 0 0 0 1px var(--border); }
  .gm-bar > span { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--sc2), var(--sc)); transition: width .25s ease; }
  .gm-left { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-top: 5px; font-variant-numeric: tabular-nums; }
  .gm.t-carb { --mc: #E9A03B; } .gm.t-prot { --mc: #C74B78; } .gm.t-fat { --mc: #4AA8E0; }
  /* Zustaende: noch offen (neutral) – im Ziel (gruen) – drueber (rot) */
  .gm.is-ok   { --sc: var(--ok); --sc2: color-mix(in srgb, var(--ok) 72%, #000); }
  .gm.is-over { --sc: var(--accent); --sc2: var(--accent-strong); }
  .gm.is-ok .gm-left { color: var(--ok); }
  .gm.is-over .gm-v b, .gm.is-over .gm-left { color: var(--accent); }
  /* Wochenansicht mit Ziel: Ring, Text und Makros nebeneinander.
     BEWUSST Grid statt Flex: in einer Flex-Zeile teilen sich alle Kinder denselben
     Platz nach Inhalt. Die Kopfzeile der "Heute"-Karte ist laenger als die von "Diese
     Woche" (Trainings-Badge + Ziel-Chip kommen dazu) - in Flex nahm sie dadurch den
     Makros mehr Platz weg, und Protein/Kohlenhydrate/Fett wechselten je nach Kartentext
     zwischen "alle drei nebeneinander" und "zwei plus eins darunter". Mit festen
     Grid-Spalten hat die Makro-Spalte in beiden Karten dieselbe Breite, unabhaengig
     vom Kopftext daneben - er darf beliebig lang werden und wirkt sich nur auf seine
     eigene Spalte aus. */
  .wg { display: grid; grid-template-columns: auto minmax(0, 1fr) minmax(0, 320px); grid-template-areas: "ring text macros"; align-items: center; gap: 20px; }
  .wg-ring { grid-area: ring; position: relative; width: 78px; height: 78px; }
  .wg-ring svg { transform: rotate(-90deg); }
  .wg-track { fill: none; stroke: var(--surface-2); stroke-width: 7; }
  .wg-fill { fill: none; stroke: color-mix(in srgb, var(--ok) 55%, var(--surface-2)); stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }
  .wg.is-ok .wg-fill { stroke: var(--ok); }
  .wg.is-over .wg-fill { stroke: var(--accent); }
  .wg-c { position: absolute; inset: 0; display: grid; place-content: center; text-align: center; }
  .wg-c b { font-family: var(--font-display); font-size: 19px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
  .wg-c span { font-size: 9px; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; font-weight: 700; }
  /* min-width:0 haelt die Textspalte im eigenen Grid-Track: ohne das wuerde ihr
     Inhalt (die Titelzeile) die Spalte ueber ihre 1fr-Breite hinaus aufdruecken. */
  .wg-txt { grid-area: text; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  /* Titelzeile der Leiste: Zeitraum + Kennzeichen, statt einer eigenen Ueberschriftzeile */
  .wg-lbl { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; font-family: var(--font-display); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--text); font-weight: 700; }
  .wg-big { font-family: var(--font-display); font-size: 26px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; color: var(--text); }
  .wg-big em { font-style: normal; font-size: 14px; font-weight: 600; color: var(--text-muted); font-family: var(--font-body); }
  .wg.is-ok .wg-big { color: var(--ok); }
  .wg.is-over .wg-big { color: var(--accent); }
  .wg-base { font-size: 12px; color: var(--text-muted); font-weight: 600; font-variant-numeric: tabular-nums; }
  /* Zwei flache Leisten untereinander (Tag, Woche). Volle Breite je Leiste, damit die
     Makros rechts NEBEN den Kalorien Platz haben statt darunter. */
  .wg-cols { display: flex; flex-direction: column; gap: 10px; }
  .wg-col { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 16px; }
  /* Kennzeichen in der Titelzeile: Ziel-Modus bei „Heute“, Planungsstand bei der Woche.
     Traegt den Kontext, ohne eine weitere Zeile aufzumachen. */
  .wg-chip {
    font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: .06em;
    padding: 3px 8px; border-radius: 999px; white-space: nowrap;
    color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
  }
  .wg-chip.plain { color: var(--text-muted); background: transparent; border-color: var(--border-strong); text-transform: none; letter-spacing: .02em; }
  /* Eigene Grid-Spalte (siehe .wg oben) statt margin-left:auto in einer Flex-Zeile:
     so bleibt die Breite unabhaengig vom Text daneben, in beiden Karten identisch. */
  /* Umbruch der drei Balken INNERHALB der Spalte nicht ueber Breakpoints, sondern
     intrinsisch: mit flex-wrap und einer Mindestbreite je Balken entscheidet der
     Browser selbst, ob drei nebeneinander passen. Mit festen Breakpoints stimmte die
     Annahme sonst irgendwann nicht mehr und die Bezeichnungen wurden abgeschnitten. */
  .wg-macros { grid-area: macros; display: flex; flex-wrap: wrap; gap: 12px 14px; min-width: 0; }
  /* 150 px Basis ist die Untergrenze, bei der „Kohlenhydrate“ und der Wert noch
     nebeneinander passen. Schmaler wuerde nur ein Teil der drei umbrechen und sie
     stuenden versetzt — lieber einer pro Zeile als drei ausgefranste. */
  .wg-macros .gm { margin-top: 0; flex: 1 1 150px; min-width: 0; }
  /* Protein etwas breiter und kraeftiger als KH/Fett: beim Abnehmen ist es die
     wichtigste Nebengroesse (Saettigung, Muskelerhalt) und intern schon als
     Untergrenze modelliert — das darf man auch sehen. */
  .wg-macros .gm.t-prot { flex-grow: 1.35; }
  .wg-macros .gm.t-prot .gm-n { font-size: 12.5px; }
  .wg-macros .gm.t-prot .gm-v b { font-size: 13px; }
  .wg-macros .gm.t-prot .gm-bar { height: 8px; }
  /* Restbudget fuer die noch ungeplanten Tage — beim Planen die gesuchte Zahl */
  .wg-open {
    margin-top: 11px; padding-top: 10px; border-top: 1px dashed var(--border);
    font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums;
  }
  .wg-open b { color: var(--text); font-weight: 700; }
  .wg-macros .gm-r { gap: 8px; margin-bottom: 5px; }
  .wg-macros .gm-n { font-weight: 700; color: var(--text); }
  .wg-macros .gm-v { font-size: 11.5px; }
  /* Schmal rutschen die Makros unter Ring und Kalorien statt daneben – als eigene
     Grid-Zeile, die die volle Breite der Karte nutzt (spannt beide Spalten). */
  @media (max-width: 720px) {
    .wg { grid-template-columns: auto minmax(0, 1fr); grid-template-areas: "ring text" "macros macros"; gap: 8px 14px; }
    .wg-macros { margin-top: 4px; }
  }

  /* Kalorien breit, darunter die Makros (.wg-macros, wiederverwendet von "Ziele dieser
     Woche" – siehe dayGoalsHtml). Die Tageskarte sitzt in einem auto-fill-Grid und wird
     im Desktop-Raster nur ~232px breit; .wg-macros schrumpft dort von selbst auf ein
     Makro pro Zeile (flex-wrap, siehe dort), statt Namen abzukuerzen. */
  .day-goals { padding: 11px 14px 13px; border-top: 1px dashed var(--border); background: color-mix(in srgb, var(--surface-2) 55%, var(--surface)); }
  .day-goals .wg-macros { margin-top: 12px; }
  @media (max-width: 560px) { .wn-tiles { grid-template-columns: repeat(2, 1fr); } }

  /* Nährwerte in der Rezept-Detailansicht */
  .nutfacts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .nutfacts .nf { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 11px; }
  .nutfacts .nf .v { font-weight: 700; font-size: 16px; font-variant-numeric: tabular-nums; }
  .nutfacts .nf .v .u { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-left: 2px; }
  .nutfacts .nf .k { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .nutfacts .nf .k::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--tc, var(--accent)); }
  .nutfacts .nf.t-kcal { --tc: var(--accent); } .nutfacts .nf.t-carb { --tc: #E9A03B; } .nutfacts .nf.t-prot { --tc: #C74B78; } .nutfacts .nf.t-fat { --tc: #4AA8E0; }
  @media (max-width: 560px) { .nutfacts { grid-template-columns: repeat(2, 1fr); } }

  .slot { position: relative; border-radius: var(--radius-sm); padding: 8px 10px 9px 12px; transition: background .12s; }
  .slot::before { content:""; position:absolute; left:5px; top:10px; bottom:10px; width:3px; border-radius:3px; background: var(--slot-c); opacity:.9; }
  .slot[data-meal="fr"] { --slot-c: var(--fr); }
  .slot[data-meal="mi"] { --slot-c: var(--mi); }
  .slot[data-meal="ab"] { --slot-c: var(--ab); }
  .slot .mlabel { font-size: 11px; font-weight: 650; letter-spacing: .04em; text-transform: uppercase; color: var(--slot-c); margin-bottom: 3px; }
  .slot .add {
    font: inherit; font-size: 13px; width: 100%; text-align: left; cursor: pointer;
    border: 1px dashed var(--border-strong); background: transparent; color: var(--text-muted);
    padding: 7px 10px; border-radius: var(--radius-sm); transition: border-color .12s, color .12s, background .12s;
  }
  .slot .add:hover { border-color: var(--slot-c); color: var(--text); background: color-mix(in srgb, var(--slot-c) 7%, transparent); }
  .slot .add.more { font-size: 12px; padding: 5px 10px; opacity: .8; }
  .slot .filled + .filled, .slot .filled + .add, .slot .add + .filled { margin-top: 4px; }
  .slot .filled {
    display: flex; align-items: flex-start; gap: 8px;
    background: color-mix(in srgb, var(--slot-c) 9%, var(--surface));
    border: 1px solid color-mix(in srgb, var(--slot-c) 24%, var(--surface));
    border-radius: var(--radius-sm); padding: 8px 8px 8px 10px; cursor: grab;
  }
  .slot .filled:active { cursor: grabbing; }
  .slot .filled img.r-thumb { width: 28px; height: 28px; border-radius: 6px; object-fit: cover; flex: none; margin-top: 1px; }
  .slot .filled .r-name { font-size: 13.5px; font-weight: 550; line-height: 1.3; flex: 1; word-break: break-word; }
  .slot .filled .r-meta { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }
  .slot .filled .x {
    flex: none; border: 0; background: transparent; color: var(--text-muted); cursor: pointer;
    width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center; font-size: 15px; line-height: 1;
  }
  .slot .filled .x:hover { background: color-mix(in srgb, var(--danger) 14%, transparent); color: var(--danger); }
  .slot.dragover { background: color-mix(in srgb, var(--accent) 12%, transparent); outline: 2px dashed var(--accent); outline-offset: -2px; }
  .slot.nodrop { opacity: .4; cursor: not-allowed; }
  .filled.dragging { opacity: .4; }

  /* ---------- Recipe grid ---------- */
  .catgroup { margin-bottom: 22px; }
  .cathead {
    display: flex; align-items: center; gap: 8px; width: 100%; margin: 0 0 12px;
    padding: 6px 2px; background: none; border: none; border-bottom: 1px solid var(--border);
    color: var(--text); font: inherit; cursor: pointer; text-align: left;
  }
  .cathead:hover { border-bottom-color: var(--border-strong); }
  .cathead .caret { width: 15px; height: 15px; flex: none; color: var(--text-muted); transition: transform .15s; }
  .cathead .caret.open { transform: rotate(90deg); }
  .cathead .cname { font-size: 14.5px; font-weight: 650; letter-spacing: .01em; display: inline-flex; align-items: center; gap: 7px; }
  .cathead .cname .cicon { width: 16px; height: 16px; flex: none; color: var(--text-muted); }
  .cathead .ccount {
    font-size: 11.5px; font-weight: 650; color: var(--text-muted);
    background: var(--surface-2); border: 1px solid var(--border);
    padding: 1px 8px; border-radius: 999px;
  }
  .recipes { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .rcard {
    position: relative;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 0; display: flex; flex-direction: column; overflow: hidden;
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  .rcard::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; z-index: 2;
    background: linear-gradient(90deg, var(--accent), var(--accent-strong));
  }
  .rcard:hover {
    transform: translateY(-3px);
    border-color: color-mix(in srgb, var(--accent) 42%, var(--border));
    box-shadow: 0 12px 30px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  /* Ganze Karte als Drop-Ziel fuer ein Foto aus dem Dateisystem (Desktop) - im
     Ruhezustand unsichtbar, nur waehrend des Ziehens ein Rahmen als Rueckmeldung.
     Mobil fehlt echtes OS-Datei-Drag ohnehin, daher keine eigene Handhabung noetig. */
  .rcard.dragover-file { outline: 2px dashed var(--accent); outline-offset: -2px; background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }
  .rcard .imgadd {
    position: absolute; top: 12px; right: 10px; z-index: 3;
    width: 28px; height: 28px; border: 0; border-radius: 50%; cursor: pointer;
    display: grid; place-items: center; font-size: 19px; line-height: 1; padding: 0;
    color: var(--accent-contrast); background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    box-shadow: 0 2px 8px rgba(0,0,0,.35); transition: transform .12s ease;
  }
  .rcard .imgadd:hover { transform: scale(1.12); }

  /* Zutaten-Zeilen im Meal-Formular */
  /* Akzentbalken oben wie bei den Meal-Karten (.rcard::before) — grenzt die einzelnen
     Zutaten sichtbar voneinander ab; etwas schmaler, weil hier mehrere untereinander stehen */
  /* overflow bleibt sichtbar, damit die Vorschlagsliste der Zutaten-Suche aus der Zeile
     herausragen darf; der Akzentbalken rundet sich dafuer selbst oben mit ab. */
  .ing-row { position: relative; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 12px 11px; margin-bottom: 9px; transition: border-color .12s, box-shadow .12s; }
  .ing-row::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 2;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-strong));
  }
  .ing-row:focus-within { border-color: color-mix(in srgb, var(--accent) 45%, var(--border-strong)); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent); }
  /* Die offene Vorschlagsliste hebt ihre Zeile ueber die darunterliegenden Zeilen */
  .ing-row.ac-open { z-index: 5; }
  .ing-top { display: flex; align-items: center; gap: 8px; }
  /* Name und Barcode-Knopf bleiben zusammen — auch wenn die Zeile mobil umbricht */
  .ing-nrow { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .ing-nwrap { position: relative; flex: 1; min-width: 0; }
  .ing-nwrap .ing-name { width: 100%; }
  /* Zutaten-Suche: Vorschlaege aus der eingebauten Naehrwerttabelle (ARIA-Listbox) */
  .ing-ac {
    position: absolute; z-index: 30; top: calc(100% + 4px); left: 0; right: 0;
    margin: 0; padding: 4px; list-style: none; max-height: 236px; overflow-y: auto;
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); box-shadow: var(--shadow);
  }
  .ing-ac-item {
    display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
    min-height: 40px; padding: 9px 10px; border-radius: 7px; cursor: pointer;
    transition: background-color .12s, color .12s;
  }
  .ing-ac-item .fname { font-weight: 600; color: var(--text); }
  .ing-ac-item .fnut { flex: none; font-size: 11px; font-weight: 700; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .ing-ac-item:hover, .ing-ac-item.on { background: color-mix(in srgb, var(--accent) 14%, var(--surface-2)); }
  .ing-ac-item:hover .fnut, .ing-ac-item.on .fnut { color: var(--accent); }
  /* Mengen-Feld mit Einheiten-Auswahl (g / ml / Stueck) */
  .ing-gwrap { display: flex; gap: 6px; flex: none; width: 158px; }
  .ing-gwrap .ing-g { flex: none; width: 74px; text-align: right; }
  .ing-gwrap .ing-u { flex: 1; min-width: 0; padding: 8px 6px; }
  .ing-ic { flex: none; width: 34px; height: 34px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); border-radius: 9px; cursor: pointer; display: grid; place-items: center; font-size: 14px; line-height: 1; padding: 0; transition: color .12s, border-color .12s, background-color .12s; }
  .ing-ic svg { width: 17px; height: 17px; }
  .ing-ic:disabled, .ing-barcode:disabled { opacity: .5; cursor: default; }
  /* Beschriftet statt nur bebildert: auf Touch gibt es keine Tooltips, ein reines
     Symbol waere dort unauffindbar. Deshalb traegt der Knopf seinen Namen sichtbar. */
  .ing-barcode {
    flex: none; display: inline-flex; align-items: center; gap: 6px; height: 34px;
    padding: 0 11px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text-muted); border-radius: 9px; cursor: pointer;
    font-family: var(--font-body); font-size: 11px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase; white-space: nowrap;
    transition: color .12s, border-color .12s, background-color .12s;
  }
  .ing-barcode svg { width: 17px; height: 17px; flex: none; }
  .ing-barcode:hover { color: var(--accent); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }
  .ing-ic.busy, .ing-barcode.busy { animation: syncpulse 1s ease-in-out infinite; }
  .ing-del:hover { color: var(--accent); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--surface)); }
  .ing-nut { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
  .ing-per { display: block; font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .ing-vals { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .ing-nut label { display: flex; flex-direction: column; gap: 4px; font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--text-muted); text-align: center; }
  .ing-nut input { width: 100%; padding: 7px 4px; text-align: center; }
  #f-ing-add { margin-top: 2px; }
  #f-ing-add[hidden] { display: none; }
  /* Makro-Summe: das Ergebnis der Zutaten, keine weitere Eingabezeile. Roter Rahmen und
     kraeftigere Schrift grenzen sie von den optisch gleichen Zutatenkarten darueber ab. */
  .nut-total {
    border: 1.5px solid var(--accent); border-radius: var(--radius);
    background: color-mix(in srgb, var(--accent) 6%, var(--surface-2));
    padding: 14px 14px 12px;
  }
  .nut-total > label {
    font-family: var(--font-display); font-size: 16px; font-weight: 700;
    letter-spacing: .04em; text-transform: uppercase; color: var(--text);
  }
  .nut-total > label .hint { font-family: var(--font-body); text-transform: none; letter-spacing: 0; }
  .nut-total input { font-weight: 700; font-size: 15px; font-variant-numeric: tabular-nums; }
  .nut-total #f-kcal { color: var(--accent); }
  /* Heller Grund statt --surface-2, sonst verschwaenden die Felder im getoenten Kasten */
  #f-kcal[readonly], #f-carbs[readonly], #f-protein[readonly], #f-fat[readonly] { opacity: .85; background: var(--surface); }
  .rimg { position: relative; height: 116px; display: grid; place-items: center; overflow: hidden; }
  .rimg::after { content: ""; position: absolute; inset: 0; background: radial-gradient(130px 66px at 78% 16%, rgba(255,255,255,.30), transparent); pointer-events: none; }
  .rimg.has-photo::after { display: none; }
  .rphoto { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .rimg.has-photo .cchip { background: rgba(16,18,13,.62); }
  .rimg .cchip { position: absolute; left: 11px; bottom: 10px; z-index: 1; font-size: 11px; font-weight: 650; letter-spacing: .03em; text-transform: uppercase; color: #fff; background: rgba(16,18,13,.5); backdrop-filter: blur(4px); padding: 3px 10px; border-radius: 999px; }
  /* Makro-Hinweis oben links: .good (Proteinreich/Low Carb) nutzt --ok, das schon als
     "positiv"-Signal existiert (Sync verbunden). .fat nutzt dasselbe Blau wie die
     Naehrwert-Kacheln (--mc/--tc fuer Fett) - kein neuer Fett-Ton.
     Bis zu zwei Badges (Haupt-Makro + "Low Carb"), daher Flex mit Umbruch: auf
     schmalen Karten rutscht das zweite in die naechste Zeile statt aus dem Bild. */
  .rimg .mbadges { position: absolute; left: 11px; top: 10px; z-index: 1; display: flex; flex-wrap: wrap; gap: 5px; max-width: calc(100% - 22px); }
  .rimg .mbadge { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; color: #fff; background: rgba(16,18,13,.62); backdrop-filter: blur(4px); padding: 3px 9px 3px 7px; border-radius: 999px; }
  .rimg .mbadge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--mbc); flex: none; }
  .rimg .mbadge.good { --mbc: var(--ok); }
  .rimg .mbadge.fat { --mbc: #4AA8E0; }
  .rbody { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .rcard .top { display: flex; align-items: flex-start; gap: 10px; }
  .rcard h3 { font-family: var(--font-display); font-size: 18px; font-weight: 600; margin: 0; flex: 1; line-height: 1.25; word-break: break-word; }
  .chip { font-size: 11px; font-weight: 650; letter-spacing: .03em; text-transform: uppercase; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .chip.cat-fr { color: var(--fr); background: color-mix(in srgb, var(--fr) 14%, var(--surface)); }
  .chip.cat-mi { color: var(--mi); background: color-mix(in srgb, var(--mi) 14%, var(--surface)); }
  .chip.cat-ab { color: var(--ab); background: color-mix(in srgb, var(--ab) 14%, var(--surface)); }
  .chip.cat-x { color: var(--accent-strong); background: color-mix(in srgb, var(--accent) 14%, var(--surface)); }
  .chip.example { color: var(--fr); background: color-mix(in srgb, var(--fr) 15%, var(--surface)); border: 1px solid color-mix(in srgb, var(--fr) 32%, transparent); }
  .rcard .meta { display: flex; gap: 14px; flex-wrap: wrap; color: var(--text-muted); font-size: 12.5px; }
  .rcard .meta span { display: inline-flex; align-items: center; gap: 5px; }
  .rcard .meta svg { width: 14px; height: 14px; opacity: .8; }
  .rcard .ingredients { font-size: 13px; color: var(--text-muted); border-top: 1px dashed var(--border); padding-top: 10px; line-height: 1.5; }
  .rcard .actions { display: flex; align-items: center; gap: 10px; margin-top: auto; padding-top: 4px; }
  .rcard .actions .btn.sm { gap: 6px; }
  .rcard .actions .btn.sm svg { width: 15px; height: 15px; }

  /* ---------- Empty state ---------- */
  .empty { text-align: center; padding: 60px 24px; border: 1.5px dashed var(--border-strong); border-radius: var(--radius); color: var(--text-muted); background: var(--surface); }
  .empty .em-ico { width: 52px; height: 52px; margin: 0 auto 14px; color: var(--accent); opacity: .85; }
  .empty h3 { font-family: var(--font-display); color: var(--text); font-size: 20px; margin: 0 0 6px; }
  .empty p { margin: 0 auto 18px; max-width: 42ch; }

  /* ---------- Modal ---------- */
  .overlay { position: fixed; inset: 0; z-index: 60; background: color-mix(in srgb, #0a0c07 55%, transparent); display: grid; place-items: start center; padding: 5vh 16px 16px; overflow-y: auto; color: var(--text); font-family: var(--font-body); }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 24px 70px rgba(0,0,0,.35); width: 100%; max-width: 540px; overflow: hidden; animation: pop .16s ease-out; }
  @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.99);} to { opacity: 1; transform: none; } }
  /* Live-Barcode-Scanner. Eigene Ebene ueber dem Modal-Overlay (60), aber unter dem
     Toast (90) - der Scanner wird AUS dem Meal-Formular geoeffnet, das darunter offen
     bleiben muss. Deshalb bewusst nicht ueber openModal(), das modalRoot leert. */
  .scanwrap { position: fixed; inset: 0; z-index: 80; background: #0a0c07; display: grid; place-items: center; padding: 16px; color: var(--text); font-family: var(--font-body); }
  .scanbox { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 14px; }
  .scanhead { display: flex; align-items: center; gap: 12px; color: #F4EFEE; }
  .scanhead h3 { font-family: var(--font-display); font-size: 20px; margin: 0; flex: 1; letter-spacing: .3px; }
  .scanhead .btn { flex: none; }
  /* Feste 4:3-Buehne: reserviert den Platz, bevor das Video laeuft (kein Springen) */
  .scanvid { position: relative; width: 100%; aspect-ratio: 4 / 3; background: #000; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border-strong); }
  .scanvid video { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* Sucherrahmen: Ecken statt Vollrahmen, damit der Barcode sichtbar bleibt */
  .scanframe { position: absolute; left: 8%; right: 8%; top: 27%; bottom: 27%; pointer-events: none; }
  .scanframe::before, .scanframe::after { content: ""; position: absolute; width: 34px; height: 34px; border: 3px solid var(--accent); }
  .scanframe::before { left: 0; top: 0; border-right: 0; border-bottom: 0; border-radius: 6px 0 0 0; }
  .scanframe::after { right: 0; bottom: 0; border-left: 0; border-top: 0; border-radius: 0 0 6px 0; }
  .scanhint { margin: 0; text-align: center; font-size: 14px; color: #A69B9D; min-height: 21px; }
  .scanhint.err { color: var(--accent); font-weight: 600; }
  .scanfoot { display: flex; flex-direction: column; gap: 8px; }
  .scanfoot .btn { width: 100%; justify-content: center; }
  @media (max-width: 560px) {
    .scanvid { aspect-ratio: 3 / 4; }
  }
  .modal-head { display: flex; align-items: center; gap: 12px; padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .modal-head h3 { font-family: var(--font-display); font-size: 19px; margin: 0; flex: 1; }
  .modal-head .kicker { font-size: 11.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
  .modal-body { padding: 18px; }
  .modal-foot { display: flex; gap: 8px; justify-content: flex-end; padding: 14px 18px; border-top: 1px solid var(--border); background: var(--surface-2); flex-wrap: wrap; }

  .field { margin-bottom: 15px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; color: var(--text); letter-spacing: .01em; }
  .field .hint { font-weight: 400; color: var(--text-muted); }
  input[type="text"], input[type="number"], input[type="email"], input[type="password"], input[type="search"], select, textarea {
    font: inherit; font-size: 14px; width: 100%; color: var(--text);
    background: var(--bg); border: 1px solid var(--border-strong); border-radius: var(--radius-sm);

  }

  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .imgfield { display: flex; gap: 14px; align-items: center; }
  .imgprev { width: 156px; min-height: 96px; flex: none; border-radius: 10px; border: 1.5px dashed var(--border-strong); background-color: var(--surface-2); background-size: cover; background-position: center; overflow: hidden; display: grid; place-items: center; text-align: center; color: var(--text-muted); cursor: pointer; transition: border-color .12s, background-color .12s; }
  .imgprev.has-img { border-style: solid; border-color: var(--border); }

  .imgprev.dragover { border-color: var(--accent); background-color: color-mix(in srgb, var(--accent) 13%, var(--surface-2)); }
  .imgprev:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .imgprev-hint { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 11px; line-height: 1.3; padding: 8px; pointer-events: none; }
  .imgprev-hint svg { opacity: .8; }

  .imgbtns { display: flex; flex-direction: column; gap: 7px; align-items: flex-start; }

  /* Picker list */

  .plist { display: flex; flex-direction: column; gap: 4px; max-height: 46vh; overflow-y: auto; margin: 0 -4px; padding: 0 4px; }

    background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 9px 11px; color: var(--text); }
  .pitem:hover { background: var(--surface-2); border-color: var(--border); }
  .pitem .pdot { width: 9px; height: 9px; border-radius: 3px; flex: none; }
  .pitem img.pthumb { width: 38px; height: 28px; border-radius: 5px; object-fit: cover; flex: none; }
  .pitem .pn { font-size: 14px; font-weight: 550; flex: 1; }
  .pitem .pc { font-size: 11.5px; color: var(--text-muted); }

  .pitem.offcat .pn, .pitem.offcat .pc { color: var(--text-muted); }

  }

  /* Detail / shopping */
  .detail .dbanner { height: 150px; border-radius: 12px; display: grid; place-items: center; position: relative; margin-bottom: 16px; overflow: hidden; }
  .detail .dbanner::after { content: ""; position: absolute; inset: 0; background: radial-gradient(180px 90px at 80% 14%, rgba(255,255,255,.30), transparent); }
  .detail .dbanner.has-photo::after { display: none; }
  .detail dl { margin: 0; }
  .detail .dsec { margin-top: 14px; }
  .detail .dsec h4 { font-size: 12.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin: 0 0 6px; }
  .detail ul { margin: 0; padding-left: 18px; line-height: 1.6; }
  .detail .steps { white-space: pre-wrap; line-height: 1.6; font-size: 14px; }
  .shop-head { display: flex; align-items: center; gap: 13px; }
  .shop-head .cart { flex: none; width: 42px; height: 42px; border-radius: 12px; display: grid; place-items: center; color: var(--accent-contrast); background: linear-gradient(150deg, var(--accent), var(--accent-strong)); box-shadow: var(--shadow); }
  .shop-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
  .shop-progress .bar { flex: 1; height: 7px; border-radius: 99px; background: var(--surface-2); overflow: hidden; }
  .shop-progress .bar > i { display: block; height: 100%; width: 0; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent-strong)); transition: width .3s ease; }
  .shop-progress .ptext { font-size: 12.5px; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .shop-progress .toggle-all { font: inherit; font-size: 12.5px; font-weight: 550; color: var(--accent-strong); background: none; border: 0; cursor: pointer; padding: 3px 7px; border-radius: 6px; white-space: nowrap; }
  .shop-progress .toggle-all:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); }
  .shop-list { display: flex; flex-direction: column; gap: 7px; max-height: 46vh; overflow-y: auto; margin: 0 -6px; padding: 2px 6px; }
  .shop-item { display: flex; align-items: center; gap: 13px; padding: 11px 13px; border-radius: 11px; background: var(--surface-2); border: 1px solid var(--border); cursor: pointer; transition: border-color .12s, background .12s; }
  .shop-item:hover { border-color: var(--border-strong); }
  .shop-item:has(.shop-check:checked) { background: color-mix(in srgb, var(--accent) 6%, var(--surface)); border-color: color-mix(in srgb, var(--accent) 24%, var(--border)); }
  .shop-check { position: absolute; opacity: 0; width: 1px; height: 1px; }
  .shop-item .box { flex: none; width: 23px; height: 23px; border-radius: 7px; border: 2px solid var(--border-strong); display: grid; place-items: center; color: #fff; transition: background .15s, border-color .15s; }
  .shop-item .box svg { width: 13px; height: 13px; opacity: 0; transform: scale(.5); transition: opacity .12s, transform .15s; }
  .shop-check:checked + .box { background: var(--accent); border-color: var(--accent); }
  .shop-check:checked + .box svg { opacity: 1; transform: none; }
  .shop-check:focus-visible + .box { outline: 2px solid var(--accent); outline-offset: 2px; }
  .shop-item .lbl { flex: 1; font-size: 14.5px; line-height: 1.35; word-break: break-word; }
  .shop-check:checked ~ .lbl { text-decoration: line-through; color: var(--text-muted); }
  .shop-item .qty { flex: none; font-size: 11.5px; font-weight: 650; color: var(--accent-strong); background: color-mix(in srgb, var(--accent) 14%, var(--surface)); border-radius: 99px; padding: 3px 9px; font-variant-numeric: tabular-nums; }
  .shop-check:checked ~ .qty { opacity: .5; }
  .shop-empty { text-align: center; padding: 20px 10px 4px; color: var(--text-muted); }
  .shop-empty .ic { width: 46px; height: 46px; margin: 0 auto 12px; color: var(--accent); opacity: .85; }
  .shop-empty p { margin: 0 auto; max-width: 34ch; line-height: 1.5; }
  .shop-group { display: flex; flex-direction: column; gap: 7px; }
  .shop-group:not(:first-child) { margin-top: 10px; }
  .shop-cat { display: flex; align-items: center; gap: 8px; margin: 0 2px 1px; font-family: var(--font-display); font-size: 12.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); }
  .shop-cat-ic { font-size: 15px; line-height: 1; }
  .shop-cat-n { margin-left: auto; font-family: var(--font-body); font-size: 11px; font-weight: 650; letter-spacing: 0; color: var(--text-muted); background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px; }

  /* Toast */
  #toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px); z-index: 90;
    background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 999px; font-size: 14px; font-weight: 550;
    box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .visually-hidden { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); border:0; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  /* ---------- Profil (Login) & Teilen ---------- */
  .app.authing .tabs, .app.authing #profile-slot { display: none; }
  .profile { position: relative; }
  .profile-btn { display: flex; align-items: center; gap: 9px; font: inherit; cursor: pointer; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px 4px 4px; color: var(--text); transition: border-color .12s; }
  .profile-btn:hover { border-color: var(--accent); }
  .avatar { width: 30px; height: 30px; border-radius: 50%; flex: none; display: grid; place-items: center; font-size: 12.5px; font-weight: 700; color: var(--accent-contrast); background: linear-gradient(150deg, var(--accent), var(--accent-strong)); }
  .profile-btn .pname { font-size: 13.5px; font-weight: 550; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .profile-btn .caret { color: var(--text-muted); }
  .menu { position: absolute; right: 0; top: calc(100% + 8px); z-index: 40; min-width: 216px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 18px 50px rgba(0,0,0,.28); padding: 6px; animation: pop .14s ease-out; }
  .menu .mhead { padding: 8px 11px 11px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
  .menu .mhead .mn { font-weight: 650; font-size: 14px; }
  .menu .mhead .me { font-size: 12px; color: var(--text-muted); word-break: break-all; }
  .menu button { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; font: inherit; font-size: 13.5px; cursor: pointer; background: transparent; border: 0; border-radius: var(--radius-sm); padding: 9px 11px; color: var(--text); }
  .menu button:hover { background: var(--surface-2); }
  .menu button svg { width: 16px; height: 16px; color: var(--text-muted); flex: none; }
  /* Abmelden ist nicht destruktiv – es geht nichts verloren, und der Klick fuehrt
     ohnehin in einen Bestaetigungsdialog. Daher neutral wie die uebrigen Eintraege;
     abgesetzt wird es durch die Trennlinie darueber, die – anders als eine
     Hover-Faerbung – auch auf dem Touchscreen sichtbar ist. Rot bleibt echten
     Loeschaktionen vorbehalten. */
  .menu button.danger:hover { background: color-mix(in srgb, var(--accent) 10%, var(--surface)); color: var(--accent); }
  .menu button.danger:hover svg { color: var(--accent); }
  /* Konto/Daten loeschen IST destruktiv und unwiderruflich – anders als Abmelden
     durchgehend rot, nicht erst im Hover, plus eigene Trennlinie zur Abgrenzung
     von den ungefaehrlichen Eintraegen (destructive-emphasis). */
  .menu button.destructive, .menu button.destructive svg { color: var(--accent); }
  .menu button.destructive:hover { background: color-mix(in srgb, var(--accent) 12%, var(--surface)); }
  .menu hr { border: 0; border-top: 1px solid var(--border); margin: 6px 4px; }
  .sync-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: var(--border-strong); flex: none; }
  .sync-dot.ok { background: var(--ok); }
  .sync-dot.busy { background: var(--fr); animation: syncpulse 1s ease-in-out infinite; }
  .sync-dot.err { background: var(--danger); }
  .sync-dot.off { background: var(--border-strong); }
  .av-wrap { position: relative; display: inline-flex; }
  .sync-dot.chip { position: absolute; right: -1px; bottom: -1px; width: 11px; height: 11px; border: 2px solid var(--surface); box-sizing: border-box; }
  .menu .msync { display: flex; align-items: center; gap: 7px; margin-top: 9px; font-size: 12px; color: var(--text-muted); }
  @keyframes syncpulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }

  .auth { min-height: calc(100vh - 170px); display: grid; place-items: center; padding: 16px 0 60px; }
  /* Intro-Hero über dem Wochenplan */
  .app-hero { margin: 2px 0 22px; }
  .app-hero.compact { margin: 2px 0 12px; } /* nur noch die Wochenangabe */
  .app-hero .eyebrow { display: inline-block; font-family: var(--font-display); text-transform: uppercase; letter-spacing: .22em; font-size: 12px; font-weight: 600; color: var(--accent-strong); margin-bottom: 8px; }
  .app-hero h2 { font-family: var(--font-display); font-weight: 700; text-transform: uppercase; font-size: clamp(30px, 4.4vw, 50px); line-height: .96; letter-spacing: .5px; margin: 0; text-wrap: balance; }
  .app-hero h2 em { color: var(--accent); font-style: normal; }
  .app-hero .hero-sub { color: var(--text-muted); font-size: 15.5px; line-height: 1.5; margin: 12px 0 0; max-width: 60ch; }
  /* Kalorienrechner-Platzhalter (kommt bald) */
  .soon-wrap { min-height: 46vh; display: grid; place-items: center; text-align: center; padding: 40px 0; }
  .soon-card { max-width: 460px; }
  .soon-card .soon-ic { width: 60px; height: 60px; border-radius: 16px; display: grid; place-items: center; margin: 0 auto 18px; background: color-mix(in srgb, var(--accent) 12%, var(--surface)); border: 1px solid color-mix(in srgb, var(--accent) 34%, transparent); color: var(--accent); }
  .soon-card .soon-ic svg { width: 28px; height: 28px; }
  .soon-card h2 { font-family: var(--font-display); text-transform: uppercase; font-size: 30px; font-weight: 700; letter-spacing: .5px; margin: 0 0 8px; }
  .soon-card p { color: var(--text-muted); font-size: 15px; line-height: 1.55; margin: 0; }
  .soon-card .soon-pill { display: inline-block; margin-top: 16px; font-family: var(--font-display); text-transform: uppercase; letter-spacing: .14em; font-size: 12px; font-weight: 600; color: var(--accent-contrast); background: var(--accent); border-radius: 999px; padding: 6px 14px; }
  .soon-card .btn.primary { margin-top: 20px; }
  .soon-card .soon-note { font-size: 12.5px; margin-top: 14px; opacity: .85; }

  /* ---------- Kalorienrechner ---------- */
  .calc { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .calc-form .field { margin-bottom: 15px; }
  .row3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  /* Segmented control (Geschlecht/Ziel) im Stil der Wochen-Umschalter */
  .seg { display: flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 3px; gap: 2px; }
  .seg button { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; border: 0; background: transparent; color: var(--text-muted); padding: 9px 8px; border-radius: 999px; white-space: nowrap; transition: color .12s, background .12s, box-shadow .12s; }
  .seg button:hover { color: var(--text); }
  .seg button.on { color: var(--accent-contrast); background: linear-gradient(135deg, var(--accent), var(--accent-strong)); box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 32%, transparent); }
  .seg .seg-hint { font-weight: 500; font-size: 10.5px; opacity: .82; }
  /* Aktivität als vertikale Knopf-Liste (Label links, Hinweis rechts) */
  /* Trainingstage: sieben Umschalter, Mehrfachauswahl. Bewusst NICHT .seg, obwohl es
     so aussieht — .seg ist eine Einfachauswahl (genau ein .on). Gleiche Optik, aber
     eigene Klasse, damit niemand die Seg-Logik darauf loslaesst. */
  .tdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px; }
  .tdays button {
    font: inherit; font-size: 12.5px; font-weight: 700; cursor: pointer; border: 0;
    background: transparent; color: var(--text-muted); padding: 9px 2px; min-height: 44px;
    border-radius: var(--radius-sm); transition: color .12s, background .12s, box-shadow .12s;
  }
  .tdays button:hover { color: var(--text); }
  /* Im RECHNER ist die Auswahl rot wie jede andere Auswahl im Formular. Das Blau ist der
     Statusfarbe im Wochenplan vorbehalten, wo es einen Tag als Trainingstag markiert —
     hier waere es nur ein zweiter Akzent ohne eigene Bedeutung. */
  .tdays button[aria-pressed="true"] {
    color: var(--accent-contrast); background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 32%, transparent);
  }
  .tdays-note { font-size: 11.5px; color: var(--text-muted); margin: 8px 0 15px; line-height: 1.45; }
  .tdays-note b { color: var(--text); font-weight: 600; }
  /* Eine Zeile je Trainingstag: Kuerzel, Stufe, Dauer, Aufschlag.
     Abfragebasis ist die Breite des FELDES, nicht die des Bildschirms — wie bei den
     Makro-Beschriftungen der Tageskarten. Eine Bildschirm-Query war hier nachweislich
     falsch: im zweispaltigen Rechner-Layout ist die Formularspalte auch auf einem
     breiten Monitor schmal, die Zeile lief dann um 67px ueber ihren Container hinaus. */
  #c-tdetail { container-type: inline-size; }
  .trow {
    /* Frueher standen hier pro Zeile zusaetzlich ein Minutenfeld, der Kalorien-Aufschlag
       und ein „auf alle"-Knopf — bei sieben Tagen ein Feld aus Zahlen und roten Flaechen.
       Die Dauer gilt jetzt einmal fuer alle (.tmin darueber), der Aufschlag steht im
       Ergebnis, wo er hingehoert. Bleibt: Tag, Stufe, Beispiel. */
    display: grid; grid-template-columns: 30px 1fr;
    grid-template-areas: "d lv" "def def";
    align-items: center; gap: 8px; row-gap: 6px;
    padding: 8px 0; border-top: 1px solid var(--border);
  }
  .trow-d { grid-area: d; } .trow-lv { grid-area: lv; }

  /* Eine Dauer fuer alle Einheiten. Steht ueber den Tageszeilen, weil sie fuer alle
     gilt — als Feld IN einer Tageszeile haette sie faelschlich nach „nur dieser Tag"
     ausgesehen. */
  .tmin {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 10px 12px; margin-bottom: 4px;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  }
  .tmin label { font-size: 12.5px; font-weight: 600; color: var(--text); }
  .tmin-f { display: flex; align-items: center; gap: 6px; }
  .tmin-f span { font-size: 11.5px; color: var(--text-muted); }
  .tmin-f input {
    width: 66px; text-align: center; padding: 8px 4px; font-size: 16px; /* 16px gegen iOS-Zoom */
    font-variant-numeric: tabular-nums; color: var(--text);
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  }
  .tmin-f input:focus-visible { outline: 2px solid var(--train); outline-offset: 1px; }
  /* Beispiele zur GEWAEHLTEN Stufe. Stehen sichtbar in der Zeile und nicht nur im
     title-Attribut: auf dem Handy gibt es keine Tooltips, dort waeren sie unsichtbar —
     und genau dort wird die App benutzt. */
  .trow-def {
    grid-area: def; font-size: 11px; line-height: 1.45; color: var(--text-muted);
    padding-left: 38px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  }
  .trow-def > span { flex: 1; }
  @container (max-width: 379px) { .trow-def { padding-left: 0; } }
  .trow:first-child { border-top: 0; }
  /* Das Tageskuerzel war rot. Es ist aber nur die Beschriftung der Zeile, keine
     Auswahl und keine Warnung — Rot hat hier nichts zu sagen und nahm dem Akzent
     seine Bedeutung. Jetzt normale Textfarbe. */
  .trow-d { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--text); }
  /* Die gewaehlte Stufe ist BLAU, nicht rot: Training ist im Wochenplan bereits blau
     (--train, siehe .day.training), und im Rechner stand dafuer bisher Rot — dieselbe
     Sache in zwei Farben. Zugleich war Rot pro Zeile mehrfach vertreten und trug damit
     keine Aussage mehr. Rot bleibt jetzt den Tages-Chips darueber, wo tatsaechlich
     ausgewaehlt wird. Erkennbar bleibt die Stufe an Flaeche UND Text, nie an Farbe
     allein — das Beispiel darunter nennt sie zusaetzlich in Worten. */
  .trow-lv { padding: 2px; gap: 1px; }
  .trow-lv button.on {
    color: var(--train-contrast);
    background: linear-gradient(135deg, var(--train), var(--train-strong));
    box-shadow: 0 2px 8px color-mix(in srgb, var(--train) 32%, transparent);
  }
  /* min-height, damit die Stufen mit dem Daumen zu treffen sind: ohne sie waren die
     Buttons 26px hoch, waehrend die Wochentag-Umschalter direkt darueber 44px haben.
     Bei sieben Trainingstagen stehen 21 dieser Buttons gleichzeitig auf dem Schirm. */
  .trow-lv button { padding: 8px 4px; font-size: 11.5px; min-height: 40px; }
  /* Vorschau je Trainingstag im Ergebnis */
  .tprev { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; padding: 5px 0; }
  .tprev + .tprev { border-top: 1px dashed var(--border); }
  .tprev-d { font-size: 12px; font-weight: 700; color: var(--text); }
  .tprev-d span { font-weight: 400; color: var(--text-muted); margin-left: 6px; font-size: 11px; }
  .tprev-v { font-size: 12px; color: var(--text-muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .tprev-v b { color: var(--text); font-size: 13px; }
  .tprev-v span { margin-left: 8px; }
  /* Ruhetag-Werte im Ergebnis: zweite Makro-Zeile, klar als Ableitung erkennbar. */
  .rest-macros { border-top: 1px dashed var(--border); margin-top: 12px; padding-top: 12px; }
  .rest-macros .rm-h { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 8px; }
  .rest-macros .rm-h svg { width: 13px; height: 13px; flex: none; color: var(--accent-strong); }

  .seg-col { flex-direction: column; gap: 3px; border-radius: var(--radius-sm); padding: 4px; }
  .seg-col button { flex-direction: row; justify-content: space-between; align-items: center; border-radius: var(--radius-sm); padding: 11px 14px; }
  .calc-result { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 26px 22px; text-align: center; position: sticky; top: 92px; }
  /* Die Kernzahl ist das Ergebnis der ganzen Seite. Hervorgehoben wird sie ueber RAUM,
     nicht ueber eine weitere Farbe: 54px sind bereits die groesste Schrift der App, und
     ein zweiter Akzentton wuerde nur die Bedeutung des roten schwaechen. */
  .calc-kcal { font-family: var(--font-display); font-size: 54px; font-weight: 700; color: var(--accent); line-height: 1; letter-spacing: .5px; margin: 12px 0 6px; }
  /* Die Einheit steht bewusst als eigene Zeile statt neben der Zahl: „2.062 kcal / Ruhetag"
     passt bei 54px Zifferngroesse in kein Panel dieser Breite. Ohne block brach sie hinter
     dem Schraegstrich um und erbte dabei die Zeilenhoehe der grossen Zahl — ein Loch von
     ueber 50px mitten im Ergebnis. */
  .calc-kcal .u { display: block; margin-top: 7px; font-family: var(--font-body); font-size: 17px; font-weight: 600; color: var(--text-muted); letter-spacing: 0; line-height: 1.2; }
  .calc-sub { color: var(--text-muted); font-size: 13px; margin-top: 8px; line-height: 1.5; }
  /* Ueberschrift, damit die drei Kacheln benannt sind – ohne sie standen dort nur drei
     Zahlen ohne Oberbegriff. Gleiche Machart wie .calc-group-h. */
  .macros-h {
    font-family: var(--font-display); font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted);
    margin: 22px 0 9px; text-align: left;
  }
  .macros-h span { font-family: var(--font-body); text-transform: none; letter-spacing: 0; font-weight: 400; }
  .macros { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .macro { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 6px; }
  /* Farben wie ueberall sonst im Projekt (Wochenbilanz, Naehrwerte je Portion): jedes
     Makro hat dort schon seinen Ton. Getragen wird die Zuordnung vom Punkt UND vom
     Wort darunter – die Farbe allein traegt keine Aussage. */
  .macro .mv { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--tc, var(--text)); }
  .macro .ml { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; font-weight: 650; color: var(--text-muted); margin-top: 3px; }
  .macro .ml::before { content: ""; width: 8px; height: 8px; border-radius: 50%; flex: none; background: var(--tc, var(--accent)); }
  .macro.t-prot { --tc: #C74B78; } .macro.t-carb { --tc: #E9A03B; } .macro.t-fat { --tc: #4AA8E0; }
  /* Der Abschluss der Seite wird als solcher abgesetzt: mehr Luft nach oben, dazu der
     weiche Akzentschein, den aktive Elemente im Theme ohnehin tragen (Heute-Chip,
     Tages-Umschalter). Hebt den Button heraus, ohne einen neuen Farbwert einzufuehren. */
  .calc-result .btn.primary {
    width: 100%; justify-content: center; margin-top: 28px;
    box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 34%, transparent);
  }
  .calc-result .btn.primary:hover { box-shadow: 0 6px 20px color-mix(in srgb, var(--accent) 44%, transparent); }
  /* Der Schein ist Dekoration: wer Bewegung/Effekte reduziert, bekommt ihn flacher. */
  @media (prefers-reduced-motion: reduce) {
    .calc-result .btn.primary, .calc-result .btn.primary:hover { box-shadow: var(--shadow); }
  }
  .calc-saved { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 12.5px; color: var(--text-muted); margin-top: 12px; }
  /* Hinweis, dass die Werte Richtwerte sind – gleiches Muster wie .auth-note */
  /* Der Haftungshinweis stand als sechszeiliger Block unter dem Rechner und drueckte
     auf dem Handy alles Wichtige aus dem Bild. Jetzt eine Zeile mit (i), die sich
     aufklappt. Bewusst <details> und kein selbstgebauter Aufklapper: das funktioniert
     ohne JS, ist mit der Tastatur bedienbar und wird von Sprachausgaben als
     zu-/aufgeklappt angesagt. Der Kern bleibt sichtbar in der Zusammenfassung stehen —
     ein blosses (i) ohne Text waere fuer einen Gesundheitshinweis zu wenig. */
  .calc-note { max-width: var(--maxw); font-size: 12px; line-height: 1.55; color: var(--text-muted); margin: 20px 0 0; padding-top: 6px; border-top: 1px solid var(--border); }
  .calc-note > summary {

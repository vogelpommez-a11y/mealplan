  }
  function loadSharedById(id) {
    if (!window.CloudShare || !window.CloudShare.enabled) { toast("Geteilte Links brauchen ein Cloud-Konto"); return; }
    window.CloudShare.fetch(id).then(function (data) {
      if (data && Array.isArray(data.recipes)) openSharedImport(data);
      else toast("Geteilter Plan nicht gefunden (Link abgelaufen?)");
    }).catch(function () { toast("Geteilter Plan konnte nicht geladen werden"); });
  }
  function openSharedImport(d) {
    if (!d || !Array.isArray(d.recipes)) return;
    const who = d.by ? esc(d.by) : "Jemand";
    const nrec = d.recipes.length;
    const node = el(`<div class="modal" role="dialog" aria-modal="true" aria-label="Geteilter Plan">

      <div class="modal-body"><p style="margin:0"><strong>${who}</strong> hat einen Wochenplan mit dir geteilt (${nrec} Meal${nrec === 1 ? "" : "s"}). Möchtest du ihn übernehmen? Deine eigenen Meals bleiben erhalten, neue kommen dazu – dein aktueller Wochenplan wird durch den geteilten ersetzt.</p></div>
      <div class="modal-foot"><button class="btn ghost" data-close>Später</button><button class="btn primary" data-take>Plan übernehmen</button></div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    node.querySelector("[data-take]").addEventListener("click", () => applySharedData(d, true));

    const wrap = document.querySelector(".profile");
    if (!wrap) return;
    const menu = el(`<div class="menu" role="menu">
      <div class="mhead"><div class="mn">${esc(profile.name)}</div><div class="me">${esc(profile.email)}</div>${authMode === "cloud" ? `<div class="msync"><span class="sync-dot off" data-sync-dot></span><span data-sync-label>Nicht verbunden</span></div>` : ""}</div>
      <button data-mi="edit" role="menuitem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>Profil bearbeiten</button>

    </div>`);
    wrap.appendChild(menu);

    menu.querySelector("[data-mi='edit']").addEventListener("click", () => { menu.remove(); openProfileForm(); });
    menu.querySelector("[data-mi='share']").addEventListener("click", () => { menu.remove(); openShare(); });

    setTimeout(() => {

  function renderAuthLocal() {
    appEl.classList.add("authing");

    const hasData = state.recipes.length > 0;
    view.innerHTML = `<div class="auth"><div class="auth-card">
      <div class="mark"></div>

      ${pendingShare ? `<p class="lead" style="color:var(--accent-strong);font-weight:600;margin-top:-8px">Du wurdest zu einem geteilten Plan eingeladen – melde dich an, um ihn zu übernehmen.</p>` : ""}
      <div class="field"><label for="a-name">Name</label><input type="text" id="a-name" placeholder="Wie heißt du?" value="${back ? esc(last.name) : ""}" maxlength="40" autocomplete="name"></div>

      <p class="auth-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg><span>Dies ist ein <strong>lokales Profil</strong> auf diesem Gerät – kein Cloud-Konto, kein Passwort nötig. Zum gemeinsamen Planen teilst du deine Woche per Einladungs-Code.</span></p>
    </div></div>`;
    const nameEl = view.querySelector("#a-name");

    function submit() {
      const name = nameEl.value.trim();

      if (!name) { nameEl.focus(); nameEl.style.borderColor = "var(--danger)"; toast("Bitte gib deinen Namen ein"); return; }

      profile = { name, email }; saveProfile(); rememberLast();
      enterApp(); toast("Angemeldet als " + name);
    }
    view.querySelector("#a-go").addEventListener("click", submit);
    [nameEl, emailEl].forEach(inp => inp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); }));
    setTimeout(() => nameEl.focus(), 40);

  /* ---------- Cloud-Anmeldung (Firebase) ---------- */

  const APPLE_ENABLED = false;
  const GOOGLE_SVG = '<svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 4.1 29.5 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22 22-9.8 22-22c0-1.5-.2-2.6-.4-3.5z"/><path fill="#FF3D00" d="M3.2 12.7l6.6 4.8C11.5 13.6 17.3 10 24 10c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 4.1 29.5 2 24 2 15.6 2 8.3 6.9 3.2 12.7z"/><path fill="#4CAF50" d="M24 46c5.4 0 10.3-2.1 14-5.5l-6.5-5.3C29.6 36.8 26.9 38 24 38c-5.2 0-9.6-3.3-11.2-8l-6.5 5C9.5 41 16.2 46 24 46z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.5l6.5 5.3C41.9 35.9 46 30.5 46 24c0-1.5-.2-2.6-.4-3.5z"/></svg>';
  const APPLE_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.4 12.7c0-2.3 1.9-3.4 2-3.5-1.1-1.6-2.8-1.8-3.4-1.8-1.4-.1-2.8.9-3.5.9-.7 0-1.9-.9-3-.8-1.6 0-3 .9-3.8 2.3-1.6 2.8-.4 7 1.2 9.3.8 1.1 1.7 2.4 2.9 2.3 1.2 0 1.6-.7 3-.7s1.8.7 3 .7 2-1.1 2.8-2.2c.9-1.3 1.2-2.5 1.3-2.6-.1 0-2.5-1-2.5-3.8zM14.2 5.4c.6-.8 1-1.9.9-3-.9 0-2 .6-2.6 1.4-.6.7-1.1 1.8-1 2.8 1 .1 2-.5 2.7-1.2z"/></svg>';

  function renderAuthLoading() {

  function cloudErrMsg(e) {

      "auth/invalid-email": "Diese E-Mail-Adresse ist ungültig.",

  function drawCloudCard() {
    const reg = cloudMode === "register";
    view.innerHTML = `<div class="auth"><div class="auth-card">
      <div class="mark"></div>
      <h2>${reg ? "Konto erstellen" : "Willkommen zurück"}</h2>
      <p class="lead">${reg ? "Registriere dich, um deinen Plan auf allen Geräten zu nutzen." : "Melde dich an, um weiterzuplanen."}</p>
      ${pendingShare ? `<p class="lead" style="color:var(--accent-strong);font-weight:600;margin-top:-8px">Du wurdest zu einem geteilten Plan eingeladen – melde dich an, um ihn zu übernehmen.</p>` : ""}

    const card = view.querySelector(".auth-card");

      if (!validEmail(email)) { showErr("Bitte gib eine gültige E-Mail-Adresse ein."); return; }

      setBusy(true);
      try {
        if (reg) {
          const name = val("#c-name");
          if (!name) { showErr("Bitte gib deinen Namen ein."); setBusy(false); return; }
          if (pw.length < 6) { showErr("Das Passwort muss mindestens 6 Zeichen haben."); setBusy(false); return; }
          const user = await window.CloudAuth.registerEmail(name, email, pw);

      <p class="auth-err" id="v-err" role="alert"></p>
      <button class="btn primary" id="v-check">Ich habe bestätigt</button>
      <div class="auth-or">oder</div>
      <button class="btn social" id="v-resend" type="button">Bestätigungsmail erneut senden</button>
      <p class="auth-switch">Falsche Adresse oder anderes Konto? <button type="button" class="auth-forgot" style="display:inline;margin:0" id="v-back">Abmelden</button></p>
      <p class="auth-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg><span>Keine Mail erhalten? Schau auch im <strong>Spam-Ordner</strong> nach. Der Link ist einige Zeit gültig.</span></p>
    </div></div>`;
    const card = view.querySelector(".auth-card");
    const errEl = view.querySelector("#v-err");
    const setBusy = on => card.classList.toggle("auth-busy", !!on);

    view.querySelector("#v-check").addEventListener("click", async () => {
      errEl.textContent = ""; setBusy(true);
      try {
        const u = await window.CloudAuth.reloadUser();
        if (u && u.emailVerified) { handleCloudUser(u); }
        else { setBusy(false); errEl.textContent = "Noch nicht bestätigt. Bitte klicke zuerst den Link in der E-Mail."; }
      } catch (e) { setBusy(false); errEl.textContent = cloudErrMsg(e); }
    });
    view.querySelector("#v-resend").addEventListener("click", async () => {
      errEl.textContent = ""; setBusy(true);
      try { await window.CloudAuth.resendVerification(); toast("Bestätigungsmail gesendet"); }
      catch (e) { errEl.textContent = cloudErrMsg(e); }
      setBusy(false);
    });
    view.querySelector("#v-back").addEventListener("click", () => {
      try { window.CloudAuth.logout(); } catch (e) {}
      cloudMode = "login";
    });
  }

  function openForgotPassword(prefill) {
    const node = el(`<div class="modal" role="dialog" aria-modal="true" aria-label="Passwort zurücksetzen">
      <div class="modal-head"><h3>Passwort zurücksetzen</h3><button class="btn ghost sm" data-close>✕</button></div>
      <div class="modal-body">
        <p class="share-hint">Gib deine E-Mail-Adresse ein – wir senden dir einen Link zum Zurücksetzen deines Passworts.</p>
        <div class="field"><label for="fp-email">E-Mail-Adresse</label><input type="email" id="fp-email" value="${esc(prefill || "")}" placeholder="du@beispiel.de"></div>
        <p class="auth-err" id="fp-err" role="alert"></p>
      </div>
      <div class="modal-foot"><button class="btn ghost" data-close>Abbrechen</button><button class="btn primary" data-send>Link senden</button></div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    node.querySelector("[data-send]").addEventListener("click", async () => {
      const email = node.querySelector("#fp-email").value.trim();
      const err = node.querySelector("#fp-err");
      if (!validEmail(email)) { err.textContent = "Bitte gib eine gültige E-Mail-Adresse ein."; return; }
      err.textContent = "";
      try { await window.CloudAuth.resetPassword(email); closeModal(); toast("E-Mail zum Zurücksetzen gesendet"); }
      catch (e) { err.textContent = cloudErrMsg(e); }
    });
    openModal(node);
    setTimeout(() => { const f = node.querySelector("#fp-email"); if (f && !prefill) f.focus(); }, 40);
  }

  function openProfileForm() {
    const node = el(`<div class="modal" role="dialog" aria-modal="true" aria-label="Profil bearbeiten">
      <div class="modal-head"><h3>Profil bearbeiten</h3><button class="btn ghost sm" data-close>✕</button></div>
      <div class="modal-body">
        <div class="field"><label for="p-name">Name</label><input type="text" id="p-name" value="${esc(profile.name)}" maxlength="40"></div>
        <div class="field"><label for="p-email">E-Mail-Adresse</label><input type="email" id="p-email" value="${esc(profile.email)}"${authMode === "cloud" ? " readonly style=\"opacity:.6\"" : ""}></div>
        ${authMode === "cloud" ? `<p class="share-mini">Deine E-Mail-Adresse ist mit deinem Cloud-Konto verknüpft und kann hier nicht geändert werden.</p>` : ""}
      </div>
      <div class="modal-foot"><button class="btn ghost" data-close>Abbrechen</button><button class="btn primary" data-save>Speichern</button></div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    node.querySelector("[data-save]").addEventListener("click", async () => {
      const name = node.querySelector("#p-name").value.trim();
      if (!name) { toast("Bitte gib deinen Namen ein"); return; }
      if (authMode === "cloud") {
        try { await window.CloudAuth.updateName(name); } catch (e) { toast("Speichern nicht möglich"); return; }
        profile = Object.assign({}, profile, { name }); saveProfile(); rememberLast();
        renderProfileChip(); closeModal(); toast("Profil gespeichert");
        return;
      }
      const email = node.querySelector("#p-email").value.trim();
      if (!validEmail(email)) { toast("Bitte gib eine gültige E-Mail ein"); return; }
      profile = { name, email }; saveProfile(); rememberLast();
      renderProfileChip(); closeModal(); toast("Profil gespeichert");
    });
    openModal(node);
  }

  function signOut() {
    const node = el(`<div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head"><h3>Abmelden?</h3><button class="btn ghost sm" data-close>✕</button></div>
      <div class="modal-body"><p style="margin:0">Dein Plan und deine Meals bleiben auf diesem Gerät gespeichert. Du kannst dich jederzeit wieder anmelden.</p></div>
      <div class="modal-foot"><button class="btn ghost" data-close>Abbrechen</button><button class="btn danger" data-confirm>Abmelden</button></div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    node.querySelector("[data-confirm]").addEventListener("click", () => {
      closeModal();
      if (authMode === "cloud" && window.CloudAuth && window.CloudAuth.logout) {
        cloudMode = "login";
        stopCloudSync();
        window.CloudAuth.logout().catch(() => {});
        // onAuthStateChanged rendert danach die Anmeldung
      } else {
        profile = null; saveProfile(); renderAuthLocal();
      }
    });
    openModal(node);
  }

  function sharePayload() {
    return { app: "wochenkueche", v: 1, by: profile ? profile.name : "", when: Date.now(), plan: state.plan, recipes: state.recipes };
  }
  function shareId() {
    return Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-4);
  }
  function copyToClipboard(text, okMsg) {
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(() => toast(okMsg || "Kopiert")).catch(() => toast("Kopieren nicht möglich"));
    else { try { const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); toast(okMsg || "Kopiert"); } catch (e) { toast("Kopieren nicht möglich"); } }
  }
  function planText() {
    return DAYS.map(d => {
      const parts = MEALS.map(m => {
        const names = state.plan[d.key][m.key].map(rid => { const r = getRecipe(rid); return r ? r.name : null; }).filter(Boolean);
        return names.length ? m.label + ": " + names.join(", ") : null;
      }).filter(Boolean);
      return d.label + ": " + (parts.length ? parts.join(", ") : "–");
    }).join("\n");
  }
  function buildPrintable() {
    const rows = DAYS.map(d => {
      const cells = MEALS.map(m => {
        const names = state.plan[d.key][m.key].map(rid => { const r = getRecipe(rid); return r ? esc(r.name) : null; }).filter(Boolean);
        return `<td>${names.length ? names.join("<br>") : "<span class='pt-empty'>–</span>"}</td>`;
      }).join("");
      return `<tr><th>${esc(d.label)}</th>${cells}</tr>`;
    }).join("");
    const dateStr = new Date().toLocaleDateString("de-DE", { day: "2-digit", month: "long", year: "numeric" });
    return `<div class="pt-doc">
      <div class="pt-head">
        <h1>Wochenplan</h1>
        <div class="pt-meta">${profile ? esc(profile.name) + "<br>" : ""}${dateStr}</div>
      </div>
      <table class="pt-table">
        <thead><tr><th></th><th>Frühstück</th><th>Mittagessen</th><th>Abendessen</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="pt-foot">Erstellt mit Paddy’s Mealplan</div>
    </div>`;
  }
  // ----- PDF selbst erzeugen (kein window.print, sandbox-sicher) -----
  const WINANSI = { "ä":"344","ö":"366","ü":"374","Ä":"304","Ö":"326","Ü":"334","ß":"337","·":"267","–":"226","—":"227","…":"205","é":"351","è":"350","ê":"352","á":"341","à":"340","â":"342","ç":"347","ñ":"361","€":"200","°":"260","„":"204","“":"223","”":"224","‘":"221","’":"222" };
  function pdfEsc(str) {
    let out = "";
    for (const ch of String(str)) {
      const code = ch.codePointAt(0);
      if (ch === "\\") out += "\\\\";
      else if (ch === "(") out += "\\(";
      else if (ch === ")") out += "\\)";
      else if (code >= 32 && code < 127) out += ch;
      else if (WINANSI[ch]) out += "\\" + WINANSI[ch];
      else out += "?";
    }
    return out;
  }
  function trunc(s, n) { s = String(s); return s.length > n ? s.slice(0, n - 1) + "…" : s; }
  function planPdfString() {
    const L = 56, R = 539;
    const dateStr = new Date().toLocaleDateString("de-DE", { day: "numeric", month: "long", year: "numeric" });
    const name = profile ? profile.name : "";
    let cs = "0.208 0.439 0.290 RG 2 w " + L + " 752 m " + R + " 752 l S\nBT\n";
    cs += "0 0 0 rg /F2 24 Tf 1 0 0 1 " + L + " 786 Tm (" + pdfEsc("Wochenplan") + ") Tj\n";
    cs += "0.4 0.4 0.4 rg /F1 11 Tf 1 0 0 1 " + L + " 764 Tm (" + pdfEsc((name ? name + "   ·   " : "") + dateStr) + ") Tj\n";
    cs += "0 0 0 rg\n";
    let y = 722;
    DAYS.forEach(d => {
      cs += "/F2 13 Tf 1 0 0 1 " + L + " " + y + " Tm (" + pdfEsc(d.label) + ") Tj\n";
      MEALS.forEach((m, i) => {
        const names = state.plan[d.key][m.key].map(rid => { const r = getRecipe(rid); return r ? r.name : null; }).filter(Boolean);
        const yy = y - 17 - i * 15;
        cs += "/F1 11 Tf 1 0 0 1 74 " + yy + " Tm (" + pdfEsc(m.label + ":") + ") Tj\n";
        cs += (names.length ? "0 0 0" : "0.66 0.66 0.66") + " rg /F1 11 Tf 1 0 0 1 172 " + yy + " Tm (" + pdfEsc(names.length ? trunc(names.join(", "), 52) : "–") + ") Tj\n0 0 0 rg\n";
      });
      y -= 74;
    });
    cs += "0.6 0.6 0.6 rg /F1 9 Tf 1 0 0 1 " + L + " 44 Tm (" + pdfEsc("Erstellt mit Paddy’s Mealplan") + ") Tj\nET\n";

    const objs = [];
    objs.push("<< /Type /Catalog /Pages 2 0 R >>");
    objs.push("<< /Type /Pages /Kids [3 0 R] /Count 1 >>");
    objs.push("<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 5 0 R /F2 6 0 R >> >> /Contents 4 0 R >>");
    objs.push("<< /Length " + cs.length + " >>\nstream\n" + cs + "endstream");
    objs.push("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>");
    objs.push("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>");
    let pdf = "%PDF-1.4\n";
    const offsets = [];
    objs.forEach((o, i) => { offsets.push(pdf.length); pdf += (i + 1) + " 0 obj\n" + o + "\nendobj\n"; });
    const xref = pdf.length;
    pdf += "xref\n0 " + (objs.length + 1) + "\n0000000000 65535 f \n";
    offsets.forEach(off => { pdf += String(off).padStart(10, "0") + " 00000 n \n"; });
    pdf += "trailer\n<< /Size " + (objs.length + 1) + " /Root 1 0 R >>\nstartxref\n" + xref + "\n%%EOF";
    return pdf;
  }
  function downloadPdf() {
    try {
      const pdf = planPdfString();
      const bytes = new Uint8Array(pdf.length);
      for (let i = 0; i < pdf.length; i++) bytes[i] = pdf.charCodeAt(i) & 0xff;
      const blob = new Blob([bytes], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);
      const who = (profile ? profile.name : "plan").replace(/[^\wäöüßÄÖÜ-]+/g, "_");
      const a = document.createElement("a"); a.href = url; a.download = "wochenplan-" + who + ".pdf"; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
      toast("PDF gespeichert");
    } catch (e) { toast("PDF konnte nicht erstellt werden"); }
  }

  function emailSubject() { return "Mein Wochenplan" + (profile ? " von " + profile.name : ""); }
  function emailBody() { return "Hallo,\n\nhier ist mein Wochenplan:\n\n" + planText() + "\n\n(Die PDF hänge ich an.)\n\nViele Grüße" + (profile ? "\n" + profile.name : ""); }
  function emailText(to) { return (to ? "An: " + to + "\n" : "") + "Betreff: " + emailSubject() + "\n\n" + emailBody(); }
  function buildMailto(to) { return "mailto:" + (to || "") + "?subject=" + encodeURIComponent(emailSubject()) + "&body=" + encodeURIComponent(emailBody()); }
  window.addEventListener("beforeprint", () => { const pa = document.getElementById("print-area"); if (pa) pa.innerHTML = buildPrintable(); });

  function openShare() {
    let mode = "link";
    let createdUrl = null;
    const node = el(`<div class="modal" role="dialog" aria-modal="true" aria-label="Teilen">
      <div class="modal-head"><div style="flex:1"><div class="kicker">Gemeinsam planen</div><h3 style="margin-top:2px">Woche teilen</h3></div><button class="btn ghost sm" data-close>✕</button></div>
      <div class="modal-body">
        <div class="segbar" role="tablist">
          <button role="tab" data-seg="link" aria-selected="true">Teilen-Link</button>
          <button role="tab" data-seg="pdf" aria-selected="false">PDF &amp; E-Mail</button>
        </div>
        <div id="seg-body"></div>
      </div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    const segBody = node.querySelector("#seg-body");
    const segBtns = node.querySelectorAll("[data-seg]");
    function paint() {
      segBtns.forEach(b => b.setAttribute("aria-selected", String(b.dataset.seg === mode)));
      if (mode === "link") {
        const cloudOk = window.CloudShare && window.CloudShare.enabled;
        if (!cloudOk) {
          segBody.innerHTML = `<p class="share-hint">Der Teilen-Link funktioniert nur, wenn du in deinem <b>Cloud-Konto</b> angemeldet bist. Nutze so lange den PDF-Export.</p>`;
        } else if (createdUrl) {
          segBody.innerHTML = `
            <p class="share-hint">Fertig! Schick diesen Link an Familie oder Freunde – wer ihn öffnet, übernimmt deinen Wochenplan als <b>Kopie</b>. <em>Momentaufnahme, keine Live-Synchronisierung.</em></p>
            <span class="share-sub">Dein Teilen-Link</span>
            <div class="link-row">
              <input type="text" class="share-link" id="sl" readonly value="${esc(createdUrl)}">
              <button class="btn primary" id="sl-copy">Link kopieren</button>
            </div>
            <p class="share-mini">Der Empfänger meldet sich einmal kostenlos an (E-Mail oder Google) und kann den Plan dann übernehmen.</p>
            <div class="share-actions"><button class="btn" id="sl-new">Neuen Link erstellen</button></div>`;
          segBody.querySelector("#sl-copy").addEventListener("click", () => { segBody.querySelector("#sl").select(); copyToClipboard(createdUrl, "Link kopiert"); });
          segBody.querySelector("#sl-new").addEventListener("click", () => { createdUrl = null; paint(); });
        } else {
          segBody.innerHTML = `
            <p class="share-hint">Erzeuge einen kurzen Link zu deinem aktuellen Wochenplan (inkl. Meals). Wer ihn öffnet, übernimmt eine <b>Kopie</b>. <em>Momentaufnahme, keine Live-Synchronisierung.</em></p>
            <button class="btn primary" id="mk-link" style="width:100%;justify-content:center">Teilen-Link erstellen</button>
            <p class="share-mini" id="mk-note"></p>`;
          const btn = segBody.querySelector("#mk-link");
          const note = segBody.querySelector("#mk-note");
          btn.addEventListener("click", () => {
            const payload = sharePayload();
            if (JSON.stringify(payload).length > 900000) { note.className = "share-mini warn"; note.textContent = "Dein Plan ist mit den eigenen Fotos zu groß zum Teilen (über 0,9 MB). Nutze den PDF-Export."; return; }
            btn.disabled = true; btn.textContent = "Erstelle Link …"; note.className = "share-mini"; note.textContent = "";
            const id = shareId();
            window.CloudShare.publish(id, payload).then(() => { createdUrl = location.origin + location.pathname + "?s=" + id; paint(); })
              .catch(() => { btn.disabled = false; btn.textContent = "Teilen-Link erstellen"; note.className = "share-mini warn"; note.textContent = "Link konnte nicht erstellt werden. Bist du online und angemeldet?"; });
          });
        }
      } else if (mode === "pdf") {
        segBody.innerHTML = `
          <p class="share-hint">Erzeuge aus deiner Woche ein <b>PDF</b> und verschick es per E-Mail – so teilst du deinen fertigen Plan.</p>
          <button class="btn primary" id="pdf-btn" style="width:100%;justify-content:center">Wochenplan als PDF speichern</button>
          <p class="share-mini">Lädt eine PDF-Datei mit deinem kompletten Wochenplan herunter.</p>
          <span class="share-sub" style="display:block;margin-top:18px">Per E-Mail senden</span>
          <div class="field"><input type="email" class="share-link" id="mail-to" placeholder="empfaenger@beispiel.de (optional)"></div>
          <div class="share-actions">
            <button class="btn primary" id="mail-copy">E-Mail-Text kopieren</button>
            <a class="btn" id="mail-open" href="#" target="_blank" rel="noopener">Mail-App öffnen</a>
          </div>
          <p class="share-mini">Am zuverlässigsten: <b>Text kopieren</b> und in deine Mail einfügen. „Mail-App öffnen" startet dein Mail-Programm in einem neuen Tab (klappt je nach Umgebung nicht immer). Die zuvor gespeicherte PDF hängst du in der Mail an.</p>`;
        segBody.querySelector("#pdf-btn").addEventListener("click", downloadPdf);
        const mailTo = segBody.querySelector("#mail-to");
        const mailOpen = segBody.querySelector("#mail-open");
        const updateMailHref = () => { mailOpen.href = buildMailto(mailTo.value.trim()); };
        mailTo.addEventListener("input", updateMailHref);
        updateMailHref();
        segBody.querySelector("#mail-copy").addEventListener("click", () => copyToClipboard(emailText(mailTo.value.trim()), "E-Mail-Text kopiert"));
      }
    }
    segBtns.forEach(b => b.addEventListener("click", () => { mode = b.dataset.seg; paint(); }));
    paint();
    openModal(node);
  }

  function applySharedData(data, takePlan) {
    if (!data || !Array.isArray(data.recipes)) { toast("Geteilter Plan nicht lesbar"); return; }
    const idMap = {};
    let added = 0;
    data.recipes.forEach(ir => {
      if (!ir || !ir.name) return;
      const existing = state.recipes.find(r => r.name.trim().toLowerCase() === ir.name.trim().toLowerCase());
      if (existing) { idMap[ir.id] = existing.id; return; }
      const nid = uid();
      idMap[ir.id] = nid;
      state.recipes.push({ id: nid, name: ir.name, category: ir.category || "Gericht", portions: ir.portions || null, time: ir.time || null, nutrition: (ir.nutrition && typeof ir.nutrition === "object") ? ir.nutrition : null, ingredients: Array.isArray(ir.ingredients) ? ir.ingredients : [], steps: ir.steps || "", image: ir.image || null });
      added++;
    });
    if (takePlan && data.plan) {
      const np = makeEmptyPlan();
      DAYS.forEach(d => MEALS.forEach(m => {
        const raw = data.plan[d.key] && data.plan[d.key][m.key];
        np[d.key][m.key] = asIdList(raw).map(v => idMap[v]).filter(Boolean);
      }));
      state.plan = np;
    }
    save(); closeModal();
    state.tab = "plan"; render();
    toast("Importiert" + (data.by ? " von " + data.by : "") + ": " + added + " neue Meal" + (added === 1 ? "" : "s"));
  }

  // ---------- Boot ----------
  boot();
})();
</script>

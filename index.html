    min-height: 44px; /* Tippflaeche */
    list-style: none; font-size: 12px;
  }
  .calc-note > summary::-webkit-details-marker { display: none; }
  .calc-note > summary:hover { color: var(--text); }
  .calc-note .ci { width: 15px; height: 15px; flex: none; color: var(--accent); }
  .calc-note .caret { width: 14px; height: 14px; flex: none; margin-left: auto; transition: transform .16s ease; }
  .calc-note[open] .caret { transform: rotate(90deg); }
  @media (prefers-reduced-motion: reduce) { .calc-note .caret { transition: none; } }
  .calc-note .cn-body { padding: 0 0 12px 24px; }
  .calc-note strong { color: var(--text); font-weight: 600; }
  .calc-empty { color: var(--text-muted); font-size: 14px; line-height: 1.55; padding: 30px 6px; }
  /* Eingabe-Gruppen (Karten) */
  .calc-group { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 18px 4px; margin-bottom: 16px; }
  .calc-group:last-child { margin-bottom: 0; }
  .calc-group-h { font-family: var(--font-display); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 14px; }
  /* Ziel-Tag + Aufschlüsselung im Ergebnis */
  .calc-goal-tag { display: inline-block; font-family: var(--font-display); text-transform: uppercase; letter-spacing: .08em; font-size: 11px; font-weight: 700; color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--surface)); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius: 999px; padding: 4px 12px; margin-bottom: 12px; }
  .breakdown { margin-top: 18px; text-align: left; }
  .bd-row { display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; padding: 8px 2px; border-top: 1px solid var(--border); color: var(--text-muted); }
  .bd-row span:last-child { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
  .bd-row.bd-mid { color: var(--text); font-weight: 600; }

  .calc-meta { display: flex; justify-content: center; gap: 22px; font-size: 13px; color: var(--text-muted); margin-top: 16px; }
  .calc-meta b { color: var(--text); }

  /* ---------- Handy: Wochenplan und Wochenziele werden gewischt ----------
     Untereinander ergaben die sieben Tageskarten auf dem Handy ein Band von weit
     ueber 3.000 px Hoehe – Donnerstag erreichte man nur durch langes Scrollen, und
     nach jedem Einplanen begann die Reise von vorn. Quer liegt jeder Tag auf einer
     eigenen Bildschirmbreite und wird seitlich gewischt.
     Die Knopfleiste darueber ist zweierlei zugleich: Anzeige, auf welcher Karte man
     steht (ein Karussell ohne Anzeige verraet nicht, dass es weitergeht), und
     Sprungziel. Deshalb 44 px hoch – sie ist Bedienelement, keine Dekoration.
     Die beiden Leisten stehen ausserhalb der Handy-Abfrage auf display:none; im
     Markup sind sie immer da, damit renderPlan() nicht zwei Faelle kennen muss. */
  .daybar, .wgbar, .calcbar, .calcnav { display: none; }

  @media (max-width: 680px) {
    .daybar {
      display: flex; gap: 4px;
      position: sticky; top: var(--head-h, 70px); z-index: 20;
      margin: 0 0 10px; padding: 6px 0;
      /* Deckend und BEWUSST ohne backdrop-filter: die Leiste klebt genau ueber dem
         Streifen, der beim Scrollen in Bewegung ist. Ein Weichzeichner muesste den
         Hintergrund dann in jedem Bild neu rechnen – auf dem Handy die haeufigste
         Ursache fuer ruckelndes Scrollen. Der Kopf darueber hat bereits einen;
         ein zweiter, gestapelter kostet doppelt und bringt hier nichts, weil
         darunter ohnehin nur --bg liegt. */
      background: var(--bg);
      box-shadow: 0 6px 12px -8px rgba(0, 0, 0, .45);
    }
    .db-b {
      flex: 1 1 0; min-width: 0; min-height: 44px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      font: inherit; font-family: var(--font-display); font-size: 13px; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase; cursor: pointer;
      color: var(--text-muted); background: var(--surface-2);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      transition: color .14s, background .14s, border-color .14s;
    }
    /* „Heute" ist im Streifen bewusst nur ein Punkt: die Aussage steht ohnehin als
       Wort im Kopf der Tageskarte, hier ist sie Wiederholung zur Orientierung. */
    .db-b .db-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0; }
    .db-b.is-today { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); }
    .db-b.is-today .db-dot { opacity: 1; }
    .db-b.active {
      color: var(--accent-contrast); border-color: transparent;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 34%, transparent);
    }

    .week {
      display: flex; gap: 12px;
      scroll-snap-type: x mandatory;
      /* Der Wisch darf nicht die Seite darunter mitziehen (Zurueck-Geste, Neuladen). */
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      /* Waagerecht scrollen heisst zwangslaeufig auch: senkrechter Scrollbehaelter.
         overflow-y: clip waere die Ausnahme, aber die Spezifikation rechnet clip
         neben overflow-x: auto zu hidden zurueck – im Pruefstand gemessen, nicht
         vermutet. Folge: eine klebende Kopfzeile INNERHALB einer Tageskarte kann es
         hier nicht geben, sie richtete sich an .week statt am Bildschirm aus und
         bliebe einfach stehen. Den Wochentag fixiert deshalb die Tagesleiste
         darueber – die haengt am Bildschirm und klebt zuverlaessig.
         Geklemmt wird nichts: .week ist so hoch wie die hoechste Karte. */
      overflow-x: auto; overflow-y: hidden;
    }
    .week::-webkit-scrollbar { display: none; }
    /* flex-start statt des voreingestellten stretch: sonst wird JEDE Tageskarte so
       hoch wie die hoechste der Woche, und ein leerer Tag bekommt unter "Abendessen"
       die Leerflaeche des vollsten Tages geschenkt. Die passende Hoehe des Streifens
       setzt fitHeight() nach, sonst bliebe die Luecke nur ausserhalb der Karte. */
    .week { align-items: flex-start; }
    .week > .day { flex: 0 0 100%; scroll-snap-align: start; scroll-snap-stop: always; }
    /* Auf dem Handy gibt es kein echtes Hover – beim Wischen setzt der Browser den
       Zustand trotzdem auf die beruehrte Karte. Sie bliebe dann angehoben stehen,
       und der weiche Schatten wuerde mitten im Scrollen ueber eine Uebergangszeit
       neu gezeichnet: grosse Weichzeichnungsflaeche, jedes Bild neu – genau die
       Art Arbeit, die das Scrollen stocken laesst. Hier also komplett aus. */
    .week > .day:hover {
      transform: none;
      border-color: var(--border);
      box-shadow: var(--shadow);
    }
    .week > .day.today:hover { border-color: color-mix(in srgb, var(--accent) 55%, var(--border)); }
    .week > .day.training:hover { border-color: color-mix(in srgb, var(--train) 55%, var(--border)); }
    .week > .day { transition: none; }

    /* Ziele der Woche: gleiches Muster mit zwei Karten (Heute / Diese Woche). */
    .wgbar { display: flex; gap: 6px; margin: 0 0 10px; }
    .wg-b {
      flex: 1 1 0; min-width: 0; min-height: 44px; padding: 0 10px;
      font: inherit; font-size: 12.5px; font-weight: 700; letter-spacing: .02em;
      cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text-muted); background: var(--surface-2);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      transition: color .14s, background .14s, border-color .14s;
    }
    .wg-b.active {
      color: var(--accent-contrast); border-color: transparent;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }
    .wg-cols {
      flex-direction: row; gap: 12px;
      overflow-x: auto; overflow-y: hidden;
      scroll-snap-type: x mandatory; overscroll-behavior-x: contain;
      scrollbar-width: none;
      align-items: flex-start; /* gleiche Ueberlegung wie beim Wochenplan */
    }
    .wg-cols::-webkit-scrollbar { display: none; }
    .wg-cols > .wg-col { flex: 0 0 100%; scroll-snap-align: start; scroll-snap-stop: always; }

    /* ---- Kalorienrechner als Assistent ----
       Am Rechner stehen Formular und Ergebnisspalte nebeneinander und das Ergebnis
       rechnet bei jedem Tastendruck mit – das ist dort die Staerke und bleibt. Auf dem
       Handy liegen die drei Gruppen untereinander, das Ergebnis ganz unten ausser
       Sicht; hier fuehren vier Schritte besser. Dieselbe Mechanik wie beim Wochenplan.
       display:contents flacht .calc-form nur fuer die Darstellung ein, damit die drei
       Gruppen zu Karten des Streifens werden – im DOM bleibt die Ebene stehen,
       deshalb bekommt initCarousel die Karten dort ausdruecklich uebergeben. */
    .calc {
      display: flex; gap: 12px; align-items: flex-start;
      /* hidden statt auto: der Weg durch den Rechner ist fest, gewischt wird nicht.
         Programmgesteuertes Scrollen (Weiter/Zurueck) funktioniert weiter – ein
         overflow:hidden-Element ist nach wie vor ein Scrollbehaelter, nur eben keiner,
         den der Finger bewegt. Deshalb greifen auch fitHeight() und wizardActive()
         unveraendert, die beide an scrollWidth > clientWidth haengen. */
      overflow: hidden;
    }
    .calc-form { display: contents; }
    .calc .calc-group, .calc .calc-result { flex: 0 0 100%; margin-bottom: 0; }

    /* Wie die Tagesleiste im Wochenplan: klebt unter dem Kopf, damit beim Scrollen
       durch eine lange Karte sichtbar bleibt, in welchem Schritt man steht. */
    .calcbar {
      display: flex; gap: 4px;
      position: sticky; top: var(--head-h, 70px); z-index: 20;
      margin: 0 0 12px; padding: 6px 0;
      background: var(--bg);
      box-shadow: 0 6px 12px -8px rgba(0, 0, 0, .45);
    }
    .cb-b {
      flex: 1 1 0; min-width: 0; min-height: 44px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
      font: inherit; font-size: 10.5px; font-weight: 650; letter-spacing: .02em;
      cursor: pointer; white-space: nowrap; overflow: hidden;
      color: var(--text-muted); background: var(--surface-2);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      transition: color .14s, background .14s, border-color .14s;
    }
    /* Die Schrittnummer traegt die Reihenfolge auch dann, wenn die Beschriftung
       auf schmalen Geraeten kaum zu lesen ist. */
    .cb-b .cb-n {
      font-family: var(--font-display); font-size: 13px; font-weight: 700; line-height: 1;
    }
    .cb-b.done { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 45%, var(--border)); }
    .cb-b.active {
      color: var(--accent-contrast); border-color: transparent;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }
    /* Noch nicht erreichte Schritte sind echt deaktiviert, nicht nur blass: sonst
       fuehrt ein Tippen ins Leere, ohne dass jemand versteht warum. */
    .cb-b:disabled { opacity: .4; cursor: default; }

    /* Der Fussknopf ist der Faden durch den Assistenten: Weiter, Weiter, Berechnen,
       Zuruecksetzen. Klebt am unteren Rand ueber der Reiterleiste, damit er auf jeder
       Karte erreichbar bleibt, ohne ans Ende scrollen zu muessen. */
    .calcnav {
      display: block; position: sticky; z-index: 20;
      /* ueber der festen Reiterleiste, nicht dahinter. Deren Hoehe misst
         syncStickyOffsets(); der Rueckfallwert gilt nur, bis das einmal gelaufen ist.
         env() steckt schon in der Leiste selbst – hier nicht doppelt rechnen. */
      bottom: calc(var(--tabbar-h, 56px) + 8px);
      margin: 16px 0 0; padding: 10px 0 4px;
      background: var(--bg);
    }
    /* Zurueck schmal links, die Haupthandlung breit rechts – der Weg nach vorn ist
       das Wahrscheinliche und bekommt das groessere Ziel unter dem Daumen. */
    .calcnav .cn-row { display: flex; gap: 8px; }
    .calcnav .btn { justify-content: center; min-height: 48px; font-size: 15px; }
    /* .btn.ghost hat einen durchsichtigen Rand – im Fussbereich stehen aber teils ZWEI
       davon nebeneinander (Zurueck + Ziel zuruecksetzen), und die Zeile las sich dann
       als zwei schwebende Textlinks ohne Bedienhinweis. Hier bekommen sie eine
       sichtbare Kontur aus den vorhandenen Tokens. */
    .calcnav .btn.ghost { background: var(--surface); border-color: var(--border-strong); color: var(--text); }
    .calcnav #c-step-back { flex: 0 0 34%; }
    .calcnav #c-step-go { flex: 1 1 auto; }
    /* Auf der Ergebniskarte traegt der Fussknopf die Aktion – der Knopf in der Karte
       waere dieselbe Handlung ein zweites Mal. */
    .calc-result #c-save, .calc-result .calc-saved { display: none; }
  }
</style>

<!-- ============================================================
     Cloud-Anmeldung (Firebase) — lädt als ES-Modul.
     Solange die Config unten Platzhalter enthält ODER das CDN
     blockiert ist (z. B. im Claude-Artifact), fällt die App
     automatisch auf den lokalen Login zurück – es bricht nichts.
     ============================================================ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, createUserWithEmailAndPassword,
    signInWithEmailAndPassword, sendEmailVerification, signOut,
    updateProfile, sendPasswordResetEmail, setPersistence,
    browserLocalPersistence, GoogleAuthProvider, OAuthProvider, signInWithPopup,
    deleteUser, reauthenticateWithPopup, reauthenticateWithCredential, EmailAuthProvider
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc, deleteDoc, onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  /* ▼▼▼ HIER die Werte aus der Firebase-Konsole eintragen ▼▼▼
     (Projekt-Einstellungen → Deine Apps → Web-App → SDK-Konfiguration) */
  const firebaseConfig = {
    apiKey: "AIzaSyAr6kx7lByKgoUrnNJsRD06PKSs3ivplLE",
    authDomain: "paddys-mealplan.firebaseapp.com",
    projectId: "paddys-mealplan",
    storageBucket: "paddys-mealplan.firebasestorage.app",
    messagingSenderId: "1045496121634",
    appId: "1:1045496121634:web:c43390145fe7b52789bd7b"
  };
  /* ▲▲▲ ------------------------------------------------------- ▲▲▲ */

  const CONFIGURED = firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf("DEIN_") !== 0;
  window.CloudAuth = { configured: !!CONFIGURED };

  if (!CONFIGURED) {
    window.dispatchEvent(new CustomEvent("cloudauth:disabled"));
  } else {
    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      auth.languageCode = "de";
      setPersistence(auth, browserLocalPersistence).catch(function () {});

      Object.assign(window.CloudAuth, {
        registerEmail: async function (name, email, pw) {
          const cred = await createUserWithEmailAndPassword(auth, email, pw);
          if (name) { try { await updateProfile(cred.user, { displayName: name }); } catch (e) {} }
          await sendEmailVerification(cred.user);
          return cred.user;
        },
        loginEmail: function (email, pw) { return signInWithEmailAndPassword(auth, email, pw); },
        loginGoogle: function () {
          const p = new GoogleAuthProvider(); p.setCustomParameters({ prompt: "select_account" });
          return signInWithPopup(auth, p);
        },
        loginApple: function () {
          const p = new OAuthProvider("apple.com"); p.addScope("email"); p.addScope("name");
          return signInWithPopup(auth, p);
        },
        resendVerification: function () {
          return auth.currentUser ? sendEmailVerification(auth.currentUser) : Promise.reject(new Error("no-user"));
        },
        resetPassword: function (email) { return sendPasswordResetEmail(auth, email); },
        updateName: function (name) {
          return auth.currentUser ? updateProfile(auth.currentUser, { displayName: name }) : Promise.reject(new Error("no-user"));
        },
        reloadUser: function () {
          return auth.currentUser ? auth.currentUser.reload().then(function () { return auth.currentUser; }) : Promise.resolve(null);
        },
        logout: function () { return signOut(auth); },
        current: function () { return auth.currentUser; },
        // Konto vollstaendig loeschen (Art. 17 DSGVO). Reihenfolge ist wichtig: die
        // Firestore-Dokumente muessen VOR deleteUser() weg, weil die Security Rules
        // "request.auth.uid == uid" pruefen - nach deleteUser waere der Nutzer nicht
        // mehr angemeldet und der Zugriff wuerde verweigert.
        // opts.password fuer Email/Passwort-Konten, sonst per Popup erneut bestaetigt
        // (Firebase verlangt fuer diese sensible Aktion eine kuerzliche Anmeldung).
        deleteAccount: async function (opts) {
          const user = auth.currentUser;
          if (!user) throw new Error("no-user");
          const pid = (user.providerData[0] || {}).providerId;
          if (pid === "password") {
            if (!opts || !opts.password) throw new Error("password-required");
            await reauthenticateWithCredential(user, EmailAuthProvider.credential(user.email, opts.password));
          } else if (pid === "google.com") {
            await reauthenticateWithPopup(user, new GoogleAuthProvider());
          } else if (pid === "apple.com") {
            await reauthenticateWithPopup(user, new OAuthProvider("apple.com"));
          }
          const uid = user.uid;
          // Fehler beim Loeschen eines geteilten Plans NICHT verschlucken und weitermachen:
          // sonst koennte "Konto loeschen" durchlaufen, obwohl ein Snapshot liegen blieb -
          // und der waere danach fuer immer verwaist (die Regel verlangt einen Auth-User
          // mit genau dieser uid, den es nach deleteUser() nicht mehr gibt). Lieber
          // abbrechen und dem Nutzer einen erneuten Versuch ermoeglichen (das Wiederholen
          // ist unproblematisch: bereits geloeschte Dokumente ueberspringt deleteDoc still).
          const shareIds = (opts && opts.shareIds) || [];
          for (let i = 0; i < shareIds.length; i++) {
            await deleteDoc(doc(db, "shared", shareIds[i]));
          }
          await deleteDoc(doc(db, "users", uid));
          try {
            await deleteUser(user);
          } catch (e) {
            // Daten sind zu diesem Zeitpunkt bereits weg; nur noch der Login-Account
            // besteht. Markieren, damit die App eine passende Meldung zeigen kann.
            e.dataAlreadyDeleted = true;
            throw e;
          }
        }
      });

      // ----- Cloud-Sync (Firestore): pro Nutzer ein Dokument users/{uid} -----
      const db = getFirestore(app);
      window.CloudSync = {
        enabled: true,
        load: function (uid) {
          return getDoc(doc(db, "users", uid)).then(function (snap) {
            return snap.exists() ? snap.data() : null;
          });
        },
        save: function (uid, data) {
          return setDoc(doc(db, "users", uid), data);
        },
        watch: function (uid, cb) {
          return onSnapshot(doc(db, "users", uid), function (snap) {
            if (snap.exists()) cb(snap.data(), snap.metadata.hasPendingWrites);
          }, function () {});
        }
      };

      // ----- Teilen per Cloud-Link: öffentlich lesbare Snapshots in shared/{id} -----
      window.CloudShare = {
        enabled: true,
        publish: function (id, data) { return setDoc(doc(db, "shared", id), data); },
        fetch: function (id) {
          return getDoc(doc(db, "shared", id)).then(function (s) { return s.exists() ? s.data() : null; });
        }
      };

      onAuthStateChanged(auth, function (user) {
        if (typeof window.__onCloudAuth === "function") window.__onCloudAuth(user);
      });
    } catch (e) {
      window.dispatchEvent(new CustomEvent("cloudauth:disabled"));
    }
  }
</script>

<script>
(function () {
  "use strict";

  const STORE_KEY = "wochenkueche_v1";
  // Ganz oben, weil sanitizeIng() (Zutaten-Einheiten) schon von load() gebraucht wird,
  // das selbst frueh im Script laeuft (state = load()). Eine const weiter unten im
  // Script waere zu diesem Zeitpunkt noch nicht initialisiert (Temporal Dead Zone) -
  // genau das brach die App fuer jeden Nutzer mit einer strukturierten Zutat.
  const ING_UNITS = ["g", "ml", "st"];

  const DAYS = [
    { key: "mon", label: "Montag",     short: "Mo" },
    { key: "tue", label: "Dienstag",   short: "Di" },
    { key: "wed", label: "Mittwoch",   short: "Mi" },
    { key: "thu", label: "Donnerstag", short: "Do" },
    { key: "fri", label: "Freitag",    short: "Fr" },
    { key: "sat", label: "Samstag",    short: "Sa" },
    { key: "sun", label: "Sonntag",    short: "So" },
  ];
  const MEALS = [
    { key: "fr", label: "Frühstück"  },
    { key: "mi", label: "Mittagessen" },
    { key: "ab", label: "Abendessen"  },
  ];
  // ---------- Aktivitaet und Training (Stammdaten des Kalorienrechners) ----------
  // Stehen hier oben und nicht beim Rechner, weil sanitizeGoal() sie braucht und das
  // bereits in `let state = load()` laeuft — weiter unten waeren sie dort noch in der
  // temporalen Todeszone und die App wuerde beim Start sterben.
  //
  // Alltags- und Berufsbewegung OHNE Sport (PAL-Systematik nach DGE bzw. FAO/WHO/UNU).
  // Bewusste Abkehr von den frueheren Faktoren 1,2/1,375/1,55/1,725/1,9: die waren mit
  // dem Sport DRIN definiert ("3-5x/Woche"). Solange das Training nicht separat erfasst
  // wurde, war das richtig — jetzt wuerde es das Training doppelt zaehlen, einmal im
  // Faktor und einmal ueber die Trainingstage. PAL-Werte sind genau fuer den Fall
  // gemacht, dass Sport obendrauf kommt.
  // Wer hier Werte aendert, muss ACTIVITY_MIGRATE mitziehen.
  const ACTIVITY = [
    { key: "pal12", f: 1.2, label: "Kaum Bewegung",  hint: "fast nur sitzend/liegend" },
    { key: "pal14", f: 1.4, label: "Sitzend",        hint: "Büro, Auto, abends Sofa" },
    { key: "pal16", f: 1.6, label: "Sitzend + Wege", hint: "Büro, aber viel zu Fuß" },
    { key: "pal18", f: 1.8, label: "Stehend/gehend", hint: "Verkauf, Pflege, Gastro" },
    { key: "pal20", f: 2.0, label: "Körperlich",     hint: "Bau, Handwerk, Landwirtschaft" }
  ];
  // Alte, sportinklusive Schluessel auf die neue Alltags-Skala. Verlustfrei geht das nicht:
  // in "3-5x/Woche" steckte Sport, dessen Umfang wir nicht kennen. Deshalb konservativ nach
  // unten gemappt — der Sport kommt jetzt ueber die Trainingstage dazu. Laeuft still, weil
  // die App noch keinen Nutzerkreis hat; sollte sich das aendern, gehoert an dieser Stelle
  // ein Hinweis in den Rechner, dass die Einstufung einmal zu pruefen ist.
  const ACTIVITY_MIGRATE = { sed: "pal14", light: "pal14", mod: "pal14", high: "pal16", ext: "pal18" };
  function activityFactor(k) { const a = ACTIVITY.find(x => x.key === k); return a ? a.f : 1.4; }

  // Trainingsstufen. netMet ist bewusst der NETTO-Wert (MET − 1): die uebliche Formel
  // kcal = MET × kg × h liefert den Bruttoumsatz inklusive dessen, was der Koerper in
  // derselben Zeit ohnehin verbraucht haette. Dieser Ruheanteil steckt hier aber schon im
  // Alltagsbedarf (BMR × PAL) — ihn nochmal mitzurechnen waere der zweite Doppelzaehler
  // und wuerde die Einheit je nach Laenge um 40-120 kcal zu teuer machen.
  // MET-Werte nach dem Compendium of Physical Activities: Krafttraining allgemein 3,5,
  // kraeftig 5-6, intensive Einheiten/HIIT ~7.
  // Die Stufen folgen der ACSM-Einteilung light/moderate/vigorous; eingeordnet wird ueber
  // die Beispiele in `ex`, die dem Nutzer in der Trainingszeile angezeigt werden.
  //
  // WICHTIG bei `ex`: Laufen, Spinning und zuegiges Radfahren gehoeren zu „Intensiv",
  // auch lockeres Joggen. Ausdauersport liegt im Compendium systematisch hoeher als
  // Krafttraining (Joggen ~7 MET, Laufen 8 km/h ~8,3, Radfahren 19-22 km/h ~8,0), weil
  // Krafttraining viele Pausen enthaelt. Wer Laufen unter „Normal" einordnet, unterschaetzt
  // sich um rund 40 % — deshalb stehen diese Sportarten namentlich in der intensiven Zeile.
  // Die Beispiele sind damit nicht nur Illustration, sondern die eigentliche Definition.
  // Die Schluessel (light/mod/hard) bleiben unveraendert, damit gespeicherte Plaene gelten.
  const TRAIN_LEVELS = [
    { key: "light", label: "Locker",   met: 3.5, netMet: 2.5, defMin: 30,
      ex: "Spaziergang, gemütliches Radeln, Yoga, Mobility, Krafttraining mit langen Pausen" },
    { key: "mod",   label: "Normal",   met: 5.0, netMet: 4.0, defMin: 60,
      ex: "Normales Krafttraining, zügiges Wandern, ruhiges Schwimmen, Radfahren im Alltagstempo" },
    { key: "hard",  label: "Intensiv", met: 7.0, netMet: 6.0, defMin: 75,
      ex: "HIIT, Intervalle, Laufen (auch lockeres Joggen), schweres Krafttraining, Spinning" }
  ];
  const TRAIN_MIN_MIN = 10, TRAIN_MIN_MAX = 240;
  function trainLevel(k) { return TRAIN_LEVELS.find(x => x.key === k) || TRAIN_LEVELS[1]; }
  // Zusatzverbrauch einer Einheit in kcal: netto-MET × Koerpergewicht × Stunden.
  // Haengt am Gewicht — dieselbe Einheit sind bei 55 kg gut 220 kcal und bei 120 kg 480.
  // Deshalb gibt es hier auch keine festen kcal-Spannen je Stufe.
  function trainKcal(levelKey, minutes, weightKg) {
    const lv = trainLevel(levelKey);
    const min = Math.max(TRAIN_MIN_MIN, Math.min(TRAIN_MIN_MAX, +minutes || lv.defMin));
    return Math.round(lv.netMet * (+weightKg || 0) * (min / 60));
  }

  const CATEGORIES = ["Frühstück", "Mittagessen", "Abendessen", "Snack", "Dessert", "Beilage", "Getränk"];
  const CAT_CLASS = { "Frühstück": "cat-fr", "Mittagessen": "cat-mi", "Abendessen": "cat-ab" };
  const CAT_TO_MEAL = { "Frühstück": "fr", "Mittagessen": "mi", "Abendessen": "ab" };
  // Snack/Dessert/Beilage passen in jeden Slot; alles ohne bekannte Kategorie ebenfalls,
  // damit geteilte oder ältere Meals nie unplanbar werden.
  function catFitsMeal(cat, mealKey) {
    const bound = CAT_TO_MEAL[cat];
    return !bound || bound === mealKey;
  }

  // Beispiel-Meals mit Fitness-/Abnehm-Fokus (viel Protein, realistische Portionen fuers
  // Meal-Prep) statt generischer Alltagsgerichte - passend zum Zielpublikum der App.
  const SEED = [
    { name: "Protein-Porridge mit Beeren", category: "Frühstück", portions: 1, time: 10,
      nutrition: { kcal: 530, carbs: 64, protein: 43, fat: 11 },
      ingredients: [
        { name: "Haferflocken", grams: 60 },
        { name: "Milch", grams: 250, unit: "ml" },
        { name: "Whey-Protein Vanille", grams: 30 },
        { name: "Beeren, gemischt", grams: 100 },
        "1 TL Chiasamen", "Prise Zimt"
      ],
      steps: "Haferflocken mit Milch aufkochen und 3–4 Min. bei milder Hitze quellen lassen. Vom Herd nehmen, Whey-Protein unterrühren. In eine Schale füllen, mit Beeren, Chiasamen und Zimt toppen." },
    { name: "Hähnchen mit Pute und Reis", category: "Mittagessen", portions: 2, time: 30,
      nutrition: { kcal: 620, carbs: 55, protein: 55, fat: 16 },
      ingredients: [
        { name: "Hähnchenbrust", grams: 200 },
        { name: "Putenbrust", grams: 150 },
        { name: "Basmatireis", grams: 200 },
        { name: "Paprika", grams: 1, unit: "st" },
        { name: "Zucchini", grams: 1, unit: "st" },
        "1 EL Olivenöl", "Sojasauce", "Paprikapulver, Salz, Pfeffer"
      ],
      steps: "Reis nach Packungsangabe kochen. Hähnchen- und Putenbrust würfeln, würzen und in Olivenöl scharf anbraten. Paprika und Zucchini kurz mitbraten, mit Sojasauce ablöschen. Alles auf dem Reis anrichten." },
    { name: "Eiweißshake mit Whey und Milch", category: "Snack", portions: 1, time: 5,
      nutrition: { kcal: 350, carbs: 39, protein: 35, fat: 6 },
      ingredients: [
        { name: "Milch", grams: 300, unit: "ml" },
        { name: "Whey-Protein", grams: 30 },
        { name: "Banane", grams: 1, unit: "st" },
        "Eiswürfel"
      ],
      steps: "Milch, Whey-Protein, Banane und ein paar Eiswürfel in den Mixer geben und cremig mixen." },
    { name: "Rindersteak mit Ofenkartoffeln", category: "Abendessen", portions: 1, time: 35,
      nutrition: { kcal: 650, carbs: 62, protein: 56, fat: 20 },
      ingredients: [
        { name: "Rindersteak (Rumpsteak)", grams: 200 },
        { name: "Kartoffeln", grams: 300 },
        { name: "Brokkoli", grams: 150 },
        "1 EL Olivenöl", "Rosmarin, Salz, Pfeffer"
      ],
      steps: "Kartoffeln würfeln, mit Olivenöl und Rosmarin vermengen und im Ofen bei 200 °C ca. 25 Min. rösten. Steak salzen, pfeffern und in einer heißen Pfanne von jeder Seite 2–3 Min. braten, kurz ruhen lassen. Brokkoli dämpfen und alles zusammen anrichten." },
  ];

  // Erkennt die mitgelieferten Beispiel-Meals: gleicher Name UND unveränderte Zubereitung.
  // Sobald der Nutzer ein Beispiel bearbeitet, gilt es als sein eigenes (kein Badge mehr).
  function isExample(r) {
    if (!r || !r.name) return false;
    const key = r.name.trim().toLowerCase();
    const s = SEED.find(x => x.name.trim().toLowerCase() === key);
    return !!s && String(r.steps || "").trim() === String(s.steps || "").trim();
  }
  // IDs aller Meals, die im Wochenplan wirklich eingeplant sind.
  function planRecipeIds() {
    const ids = new Set();
    DAYS.forEach(d => MEALS.forEach(m => { asIdList(state.plan[d.key][m.key]).forEach(id => ids.add(id)); }));
    return ids;
  }

  // ---------- State ----------
  let state = load();

  function makeEmptyPlan() {
    const p = {};
    DAYS.forEach(d => { p[d.key] = { fr: [], mi: [], ab: [] }; });
    return p;
  }
  // Ein Slot ist eine Liste von Rezept-IDs. Alte Pläne speicherten eine
  // einzelne ID (oder null) – asIdList normalisiert beide Formen.
  function asIdList(v) { return Array.isArray(v) ? v.slice() : (v ? [v] : []); }

  // ---------- Wochen (aktuelle + naechste, an ISO-Kalenderwochen gebunden) ----------
  // Plaene liegen unter state.plans["YYYY-Www"]. "Aktuell" ist die ISO-Woche von heute,
  // "Naechste" die von heute + 7 Tagen — dadurch rueckt am Montag alles automatisch weiter,
  // ganz ohne Rotationslogik. Verfallene (aeltere) Wochen entfernt pruneWeeks.
  function isoWeekKey(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const day = d.getUTCDay() || 7;                 // Mo=1 … So=7
    d.setUTCDate(d.getUTCDate() + 4 - day);         // Donnerstag der Woche (ISO-8601)
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    const week = Math.ceil((((d - yearStart) / 864e5) + 1) / 7);
    return d.getUTCFullYear() + "-W" + String(week).padStart(2, "0");
  }
  function weekKeyFor(which) {
    const b = new Date();
    if (which === "next") b.setDate(b.getDate() + 7);
    return isoWeekKey(b);
  }
  function activeWeekKey() { return weekKeyFor(state.viewWeek === "next" ? "next" : "cur"); }
  // Nur aktuelle + naechste Woche behalten; alles Aeltere/Fremde verfaellt.
  function pruneWeeks(plans) {
    const keep = {}; keep[weekKeyFor("cur")] = 1; keep[weekKeyFor("next")] = 1;
    Object.keys(plans).forEach(k => { if (!keep[k]) delete plans[k]; });
    return plans;
  }
  // Aktive Woche als Referenz spiegeln, damit alle bestehenden state.plan[..]-Zugriffe gelten.
  function setViewWeek(which) {
    state.viewWeek = which === "next" ? "next" : "cur";
    const key = activeWeekKey();
    if (!state.plans[key]) state.plans[key] = makeEmptyPlan();
    state.plan = state.plans[key];
  }

  // Trainingsplan auf gueltige Wochentage eindampfen: fremde Schluessel raus, Stufe auf
  // eine bekannte Stufe zwingen, Dauer in den erlaubten Bereich klemmen.
  // Bewusst eine `function` und keine `const`-Arrow — load() laeuft frueh, eine spaeter
  // deklarierte Konstante waere dort noch in der temporalen Todeszone und wuerde die
  // ganze App beim Start killen.
  function sanitizeTraining(t) {
    const out = {};
    if (!t || typeof t !== "object") return out;
    // Zwischenstand-Format: ["mon","wed"] ohne Stufe/Dauer. Kam aus der ersten Fassung
    // der Trainingstage (nie veroeffentlicht, aber lokal getestet) — auf die Standard-
    // stufe heben, statt die Auswahl des Nutzers wegzuwerfen.
    if (Array.isArray(t)) {
      DAYS.forEach(d => { if (t.indexOf(d.key) !== -1) out[d.key] = { level: "mod", min: 60 }; });
      return out;
    }
    DAYS.forEach(d => {
      const e = t[d.key];
      if (!e || typeof e !== "object") return;
      const lv = TRAIN_LEVELS.some(x => x.key === e.level) ? e.level : "mod";
      const min = Math.max(TRAIN_MIN_MIN, Math.min(TRAIN_MIN_MAX, Math.round(+e.min) || trainLevel(lv).defMin));
      out[d.key] = { level: lv, min: min };
    });
    return out;
  }
  function trainingKeys(t) { return DAYS.filter(d => t && t[d.key]).map(d => d.key); }

  // Jedes von aussen kommende Ziel laeuft hier durch (localStorage, Cloud, Import).
  // Zwei Migrationen stecken hier drin, beide unvermeidlich:
  //  1. trainingDays (Liste) -> training (Objekt mit Stufe und Dauer)
  //  2. sportinklusive Aktivitaetsschluessel -> reine Alltags-PAL-Skala
  // (2) laeuft still, ohne Hinweis an den Nutzer: die App hat noch keinen Nutzerkreis,
  // dessen alte Einstufung man erklaeren muesste. Die Zuordnung selbst muss aber bleiben —
  // ein Schluessel wie "mod" haette in der neuen Skala sonst gar keinen gueltigen Faktor.
  function sanitizeGoal(g) {
    if (!g || typeof g !== "object") return null;
    const out = Object.assign({}, g);
    out.training = sanitizeTraining(g.training != null ? g.training : g.trainingDays);
    delete out.trainingDays;
    if (ACTIVITY_MIGRATE[out.activity]) out.activity = ACTIVITY_MIGRATE[out.activity];
    else if (!ACTIVITY.some(a => a.key === out.activity)) out.activity = "pal14";
    return out;
  }

  function load() {
    let data = null;
    try { data = JSON.parse(localStorage.getItem(STORE_KEY)); } catch (e) { data = null; }
    const curKey = weekKeyFor("cur");
    if (!data || !Array.isArray(data.recipes)) {
      const recipes = SEED.map(r => Object.assign({ id: uid() }, r));
      const plans = {}; plans[curKey] = makeEmptyPlan();
      return { recipes, plans, plan: plans[curKey], viewWeek: "cur", tab: "plan", goal: null, shares: [] };
    }
    const recipes = sanitizeRecipes(data.recipes);
    const plans = {};
    if (data.plans && typeof data.plans === "object") {                 // neues Format
      Object.keys(data.plans).forEach(k => { plans[k] = normalizePlan(data.plans[k], recipes); });
    } else if (data.plan) {                                             // Migration: alter Einzelplan
      plans[curKey] = normalizePlan(data.plan, recipes);
    }
    pruneWeeks(plans);
    if (!plans[curKey]) plans[curKey] = makeEmptyPlan();
    return { recipes, plans, plan: plans[curKey], viewWeek: "cur", tab: data.tab === "recipes" ? "recipes" : "plan", goal: sanitizeGoal(data.goal), shares: Array.isArray(data.shares) ? data.shares : [] };
  }

  // Schlaegt das lokale Speichern fehl (Speicher voll, privater Modus), darf das NICHT
  // stillschweigend passieren: der Nutzer legt sonst weiter Meals an, die beim naechsten
  // Laden alle weg sind. Einmalig warnen statt bei jedem Tastendruck.
  let storageFullWarned = false;
  function save() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({ recipes: state.recipes, plans: state.plans, tab: state.tab, goal: state.goal || null, shares: state.shares || [] }));
      storageFullWarned = false;
    } catch (e) {
      if (!storageFullWarned) {
        storageFullWarned = true;
        toast(syncUid
          ? "Der Speicher dieses Geräts ist voll – deine Änderungen liegen nur noch in der Cloud. Entferne ein paar Meal-Fotos."
          : "Der Speicher dieses Geräts ist voll – neue Änderungen gehen beim Neuladen verloren. Entferne ein paar Meal-Fotos.");
      }
    }
    scheduleCloudPush();
  }

  // Vereinigung zweier ID-Listen (Teilen-Links) ohne Duplikate – wird beim Zusammenfuehren
  // von lokalem und Cloud-Stand gebraucht, damit kein Link "verschwindet".
  function unionIds(a, b) { return Array.from(new Set([].concat(a || [], b || []))); }

  // ---------- Cloud-Sync (Firestore) ----------
  let syncUid = null, syncUnsub = null, pushTimer = null, lastPushedJSON = null;
  // Sperrfrist fuer die „von aussen geaendert"-Meldung (siehe onRemote).
  const REMOTE_TOAST_GAP = 60000;
  let lastRemoteToast = 0;

  function normalizePlan(rawPlan, recipes) {
    const plan = makeEmptyPlan();
    const ids = new Set((recipes || []).map(r => r.id));
    if (rawPlan) DAYS.forEach(d => MEALS.forEach(m => {
      const raw = rawPlan[d.key] && rawPlan[d.key][m.key];
      plan[d.key][m.key] = asIdList(raw).filter(id => ids.has(id));
    }));
    return plan;
  }
  function normalizePlans(rawPlans, recipes) {
    const out = {};
    if (rawPlans && typeof rawPlans === "object") Object.keys(rawPlans).forEach(k => { out[k] = normalizePlan(rawPlans[k], recipes); });
    return out;
  }
  // Liefert das Wochen-Dictionary eines Datensatzes; toleriert das alte Einzelplan-Format.
  function plansField(d) {
    if (d && d.plans && typeof d.plans === "object") return d.plans;
    if (d && d.plan) { const o = {}; o[weekKeyFor("cur")] = d.plan; return o; }
    return {};
  }
  // Vergleichs-Signatur ohne "tab" – ein reiner Tab-Wechsel soll keinen Cloud-Write auslösen.
  function dataJSON(d) { return JSON.stringify({ recipes: (d && d.recipes) || [], plans: plansField(d), goal: (d && d.goal) || null, shares: (d && d.shares) || [] }); }

  function scheduleCloudPush() {
    if (!syncUid) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(pushNow, 800);
  }
  // Firestore laesst pro Dokument hoechstens 1 MiB zu. Weil alle Meals samt ihren
  // Fotos in EINEM Dokument liegen, ist die Grenze mit ein paar Dutzend eigenen
  // Bildern erreicht. Ohne Vorabpruefung wuerde jeder Push kommentarlos scheitern und
  // als "offline" erscheinen - der Sync waere dauerhaft tot, ohne dass es jemand merkt.
  const CLOUD_DOC_MAX = 900000;      // Sicherheitsabstand zur 1-MiB-Grenze
  let cloudTooBigWarned = false;
  async function pushNow() {
    if (!syncUid || !window.CloudSync) return;
    const d = { recipes: state.recipes, plans: state.plans, tab: state.tab, goal: state.goal || null, shares: state.shares || [] };
    const j = dataJSON(d);
    if (j === lastPushedJSON) return;
    if (j.length > CLOUD_DOC_MAX) {
      // Nicht als "offline" ausgeben: das Problem loest sich nicht von selbst und
      // verlangt eine Entscheidung des Nutzers (Fotos entfernen).
      setSyncStatus("toobig");
      if (!cloudTooBigWarned) {
        cloudTooBigWarned = true;
        toast("Deine Meals mit Fotos sind zu groß für die Cloud – neue Änderungen bleiben nur auf diesem Gerät. Entferne ein paar Fotos, dann läuft der Sync weiter.");
      }
      return;
    }
    cloudTooBigWarned = false;
    lastPushedJSON = j;
    setSyncStatus("saving");
    try {
      await window.CloudSync.save(syncUid, Object.assign({}, d, { updatedAt: Date.now() }));
      setSyncStatus("synced");
    } catch (e) {
      lastPushedJSON = null; setSyncStatus("offline"); /* z. B. offline – nächster Save versucht es erneut */
    }
  }
  function onRemote(data, pending) {
    if (pending || !data || !Array.isArray(data.recipes)) return; // eigener Schreibvorgang → ignorieren
    const j = dataJSON(data);
    if (j === dataJSON(state) || j === lastPushedJSON) return; // nichts Neues
    state.recipes = sanitizeRecipes(data.recipes);
    state.plans = pruneWeeks(normalizePlans(plansField(data), state.recipes));
    state.goal = sanitizeGoal(data.goal);
    state.shares = unionIds(state.shares, data.shares); // nie einen Link verlieren, der nur lokal bekannt ist
    setViewWeek(state.viewWeek);
    lastPushedJSON = j;
    save(); render();
    setSyncStatus("synced");
    // Nicht bei jedem eingehenden Schreibvorgang melden: wer auf einem Geraet plant,
    // erzeugt alle 800 ms (Debounce von scheduleCloudPush) einen Push — auf dem zweiten
    // Geraet prasselten dann im Minutentakt Dutzende Meldungen. Der Stand ist ohnehin
    // schon uebernommen und der Sync-Punkt zeigt „synced"; die Meldung sagt nur, DASS
    // sich etwas von aussen geaendert hat, und dafuer reicht ein Hinweis pro Minute.
    const now = Date.now();
    if (now - lastRemoteToast >= REMOTE_TOAST_GAP) {
      lastRemoteToast = now;
      toast("Von anderem Gerät aktualisiert");
    }
  }
  async function startCloudSync(uid) {
    if (!window.CloudSync || !window.CloudSync.enabled) return;
    if (syncUid === uid) return;                 // läuft schon
    stopCloudSync();
    syncUid = uid;
    setSyncStatus("connecting");
    try {
      const remote = await window.CloudSync.load(uid);
      if (remote && Array.isArray(remote.recipes) && remote.recipes.length) {
        // Rezepte zusammenführen (Cloud + eigene lokale, die es dort noch nicht gibt).
        // Beispiel-Meals werden NICHT in ein bestehendes Konto übernommen – sie sind nur
        // ein einmaliges Willkommens-Angebot für neue Konten.
        const map = {};
        sanitizeRecipes(remote.recipes).forEach(r => { if (r && r.id) map[r.id] = r; });
        state.recipes.forEach(r => { if (r && r.id && !map[r.id] && !isExample(r)) map[r.id] = r; });
        state.recipes = Object.values(map);
        const rp = pruneWeeks(normalizePlans(plansField(remote), state.recipes));
        Object.keys(state.plans).forEach(k => { if (!rp[k]) rp[k] = state.plans[k]; }); // lokale Wochen behalten, die es remote nicht gibt
        state.plans = pruneWeeks(rp);
        if (remote.goal) state.goal = sanitizeGoal(remote.goal); // Ziel aus der Cloud übernehmen; lokales bleibt, falls remote keins hat
        state.shares = unionIds(state.shares, remote.shares);
        setViewWeek(state.viewWeek);
        // state.tab bewusst NICHT aus remote uebernehmen — Start bleibt immer der Wochenplan
        save(); render();
      }
      lastPushedJSON = null;
      await pushNow();                            // zusammengeführten Stand als Baseline hochschreiben
      // Sperrfrist gleich mitstarten: direkt nach dem Verbinden sagt schon „Mit deiner
      // Cloud verbunden", dass Daten hereingekommen sind — ein zweiter Hinweis darauf
      // waere in derselben Sekunde nur Laerm.
      lastRemoteToast = Date.now();
      syncUnsub = window.CloudSync.watch(uid, onRemote);
      setSyncStatus("synced");
      toast("Mit deiner Cloud verbunden");
    } catch (e) { setSyncStatus("offline"); /* offline: App läuft lokal weiter, Sync greift beim nächsten Mal */ }
  }
  function stopCloudSync() {
    if (syncUnsub) { try { syncUnsub(); } catch (e) {} syncUnsub = null; }
    clearTimeout(pushTimer);
    syncUid = null; lastPushedJSON = null;
    setSyncStatus("off");
  }

  // Sync-Status für die Anzeige: "off" | "connecting" | "synced" | "saving" | "offline" | "toobig"
  let syncStatus = "off";
  function syncStatusInfo() {
    return ({
      connecting: { cls: "busy", label: "Verbinde …" },
      synced:     { cls: "ok",   label: "Synchronisiert" },
      saving:     { cls: "busy", label: "Wird gespeichert …" },
      offline:    { cls: "err",  label: "Offline – lokal gespeichert" },
      toobig:     { cls: "err",  label: "Zu viele Fotos für die Cloud" },
      off:        { cls: "off",  label: "Nicht verbunden" }
    })[syncStatus] || { cls: "off", label: "Nicht verbunden" };
  }
  function setSyncStatus(s) {
    if (syncStatus === s) return;
    syncStatus = s;
    updateSyncUI();
  }
  function updateSyncUI() {
    const info = syncStatusInfo();
    document.querySelectorAll("[data-sync-dot]").forEach(elm => {
      elm.classList.remove("ok", "busy", "err", "off");
      elm.classList.add(info.cls);
      elm.title = "Cloud-Sync: " + info.label;
    });
    document.querySelectorAll("[data-sync-label]").forEach(elm => { elm.textContent = info.label; });
  }

  function uid() { return "r" + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3); }
  // Waehrend eines Render-Durchlaufs wird sehr oft nach Rezepten gesucht (jeder Slot,
  // jede Tagesbilanz). Der Index macht daraus einen Map-Zugriff statt einer linearen
  // Suche. Er lebt bewusst NUR innerhalb von render(): dort mutiert state.recipes nicht,
  // ausserhalb koennte er veralten - deshalb faellt getRecipe dann auf die Suche zurueck.
  let recipeIndex = null;
  function getRecipe(id) {
    if (recipeIndex) return recipeIndex.get(id) || null;
    return state.recipes.find(r => r.id === id) || null;
  }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c])); }

  // ---------- Sicherheitsnetz fuer fremde Bilddaten ----------
  // Ein Meal-Foto landet als data-URL direkt in einem src="..."-Attribut. Kaeme dort
  // ein fremder String an (etwa aus einem geteilten Plan), koennte er mit einem
  // Anfuehrungszeichen aus dem Attribut ausbrechen und eigenes JavaScript einschleusen.
  // Deshalb hier die strenge Gegenprobe: NUR echte Base64-Bild-URLs passieren, und
  // deren Alphabet (A-Z a-z 0-9 + / =) enthaelt per Definition kein Anfuehrungszeichen.
  // Angewendet an JEDEM Punkt, an dem Rezepte von aussen hereinkommen (localStorage,
  // Cloud, geteilte Plaene) - eigene Uploads erzeugt canvas.toDataURL ohnehin sauber.
  // Regex bewusst IM Funktionskoerper: safeImage wird schon von load() gebraucht, das
  // weit oben laeuft - eine const hier oben waere zu diesem Zeitpunkt noch nicht
  // initialisiert (Temporal Dead Zone) und wuerde das ganze Script abbrechen.
  function safeImage(v) {
    return (typeof v === "string" && /^data:image\/(jpeg|jpg|png|gif|webp);base64,[A-Za-z0-9+/]+=*$/.test(v)) ? v : null;
  }
  // Ein komplettes Rezept aus fremder Quelle auf unbedenkliche Werte bringen.
  function sanitizeRecipe(r) {
    if (!r || typeof r !== "object") return null;
    const out = Object.assign({}, r);
    out.image = safeImage(r.image);
    if (Array.isArray(r.ingredients)) out.ingredients = r.ingredients.map(sanitizeIng).filter(Boolean);
    return out;
  }
  function sanitizeRecipes(list) { return Array.isArray(list) ? list.map(sanitizeRecipe).filter(Boolean) : []; }

  // ---------- Strich-Icons fuer die Kategorie-Ueberschriften ----------
  // Nur diese sechs werden gebraucht; Meals selbst zeigen immer ein Foto (siehe photoFor).

  const CAT_PHOTO = { "Frühstück": "porridge", "Snack": "fruit", "Dessert": "cake", "Beilage": "salad", "Getränk": "drink" };
  // Liefert IMMER ein Foto: eigenes Bild > Stichwort-Treffer > Kategorie > neutrales Bild.
  function photoFor(r) {

    if (r.image) { const ok = safeImage(r.image); if (ok) return ok; }
    const n = (r.name || "").toLowerCase();
    for (const [keys, key] of PHOTO_RULES) { if (keys.some(k => n.includes(k)) && PHOTOS[key]) return PHOTOS[key]; }

  // Bewertet die Makro-Verteilung ueber den Kalorienanteil (Protein/Kohlenhydrate x4,
  // Fett x9) und liefert 0 bis 2 Badges fuer die Meal-Karte: ein Haupt-Badge fuer das
  // dominante Makro und optional "Low Carb" als Zusatz. Ausgewogene Gerichte bekommen
  // bewusst gar keines - sonst traegt das Badge keine Information mehr.
  function macroBadges(r) {
    const n = recipeNut(r);
    const macroKcal = n.carbs * 4 + n.protein * 4 + n.fat * 9;
    // Unter ~100 kcal ist ein Makro-Anteil reines Rauschen: ein Kaffee mit einem Schuss
    // Milch (je 1 g Makro) kaeme sonst auf 53 % Fettanteil und waere "Fettreich".
    // Prozentual richtig, als Aussage ueber das Gericht aber falsch.
    if (macroKcal < 100) return [];
    const proteinShare = (n.protein * 4) / macroKcal;
    const carbShare = (n.carbs * 4) / macroKcal;
    const fatShare = (n.fat * 9) / macroKcal;
    const out = [];
    // Haupt-Badge: nur eines von beiden. Protein geht vor Fett - ein fettreiches
    // Gericht mit viel Eiweiss ist fuer den Trainingsplan zuerst eine Eiweissquelle.
    if (proteinShare >= 0.30) out.push({ label: "Proteinreich", cls: "good" });
    else if (fatShare >= 0.45) out.push({ label: "Fettreich", cls: "fat" });
    // Zusatz-Badge, nicht Ersatz. Anteil UND absolute Menge muessen niedrig sein:
    // 15 % einer 1400-kcal-Portion waeren 52 g Kohlenhydrate - kein Low Carb mehr.
    // Steht nie allein: bei <=15 % Kohlenhydraten ergeben Protein + Fett zwingend
    // >=85 %, damit ist immer eine der beiden Schwellen oben gerissen.
    if (carbShare <= 0.15 && n.carbs <= 20) out.push({ label: "Low Carb", cls: "good" });
    return out;
  }

  // read a file and downscale to <=640px JPEG data URL (keeps localStorage small)
  function readAndDownscale(file, cb) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const maxW = 640, scale = Math.min(1, maxW / img.width);
        const w = Math.max(1, Math.round(img.width * scale)), h = Math.max(1, Math.round(img.height * scale));
        const c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        try { cb(c.toDataURL("image/jpeg", 0.82)); } catch (err) { cb(null); }
      };
      img.onerror = () => cb(null);
      img.src = e.target.result;
    };
    reader.onerror = () => cb(null);
    reader.readAsDataURL(file);
  }

  // Reiter des letzten Durchlaufs. Ein Reiterwechsel soll oben beginnen, jeder andere

  let lastRenderTab = null;

  function render() {
    hoveredCardId = null; // Kartenknoten werden gleich ersetzt - alte Hover-Referenz waere sonst veraltet
    // Gleiche Ueberlegung fuer den Tastaturfokus: liegt er gerade auf einem Element in
    // <main>, wird dieses gleich mitsamt innerHTML ersetzt und der Fokus faellt auf
    // <body>. Das trifft besonders den Weg "Loeschen bestaetigen" - closeModal() gibt
    // den Fokus zwar an den ausloesenden Knopf zurueck, aber der verschwindet direkt
    // danach mit dem Neuaufbau. Deshalb hier merken und unten auffangen.
    const focusWasInView = view.contains(document.activeElement);
    // Scrollposition ueber den Neuaufbau retten. view.innerHTML = … wirft den ganzen
    // Inhalt weg, der Browser klemmt die Position dabei auf 0 – nach dem Einplanen
    // eines Meals landete man deshalb wieder ganz oben. Waagerecht gilt dasselbe fuer
    // die Handy-Karussells: sonst springt man von Donnerstag zurueck auf Montag.
    const sameTab = lastRenderTab === state.tab;
    lastRenderTab = state.tab;
    const keepY = sameTab ? window.scrollY : 0;
    const weekEl = view.querySelector(".week"), wgEl = view.querySelector(".wg-cols");
    const keepWeekX = sameTab && weekEl ? weekEl.scrollLeft : 0;
    const keepWgX = sameTab && wgEl ? wgEl.scrollLeft : 0;
    // Caches nur fuer die Dauer dieses Durchlaufs aufspannen; finally stellt sicher,
    // dass sie auch bei einem Fehler nicht als veraltete Kopie zurueckbleiben.
    recipeIndex = new Map(state.recipes.map(r => [r.id, r]));

      document.getElementById("recipe-count").textContent = state.recipes.length;
      document.querySelectorAll(".tab").forEach(t => t.setAttribute("aria-selected", String(t.dataset.tab === state.tab)));

      else if (state.tab === "fortschritt") renderFortschrittSoon();
      else if (state.tab === "pro") renderProSoon();
      else renderPlan();
    } finally {
      recipeIndex = null;
      dayNutCache = null;
    }
    // Fokus nur dann einfangen, wenn er beim Neuaufbau tatsaechlich verloren ging -
    // der aktive Reiter ist ein stabiler Anker, von dem aus man weitertabben kann.
    if (focusWasInView && (!document.activeElement || document.activeElement === document.body)) {
      const t = document.querySelector('.tab[aria-selected="true"]');
      if (t) t.focus();
    }

    // Ohne Sanftlauf: das hier ist Wiederherstellen, keine Bewegung, die jemand sehen soll.
    const newWeek = view.querySelector(".week"), newWg = view.querySelector(".wg-cols");
    if (keepWeekX && newWeek) newWeek.scrollLeft = keepWeekX;
    if (keepWgX && newWg) newWg.scrollLeft = keepWgX;
    window.scrollTo(0, keepY);
    save();
  }

  function planStats() {
    let filled = 0;

  // ---------- Nährwerte ----------
  function nutNum(x) { const n = Number(x); return isFinite(n) && n > 0 ? n : 0; }
  function nutParse(v) { const n = parseFloat(String(v == null ? "" : v).replace(",", ".")); return isFinite(n) && n >= 0 ? n : null; }
  function recipeNut(r) { const n = (r && r.nutrition) || {}; return { kcal: nutNum(n.kcal), carbs: nutNum(n.carbs), protein: nutNum(n.protein), fat: nutNum(n.fat) }; }
  function addNut(a, b) { return { kcal: a.kcal + b.kcal, carbs: a.carbs + b.carbs, protein: a.protein + b.protein, fat: a.fat + b.fat }; }

  let dayNutCache = null;

    if (dayNutCache && dayNutCache[dayKey]) return dayNutCache[dayKey];
    let s = { kcal: 0, carbs: 0, protein: 0, fat: 0 };
    MEALS.forEach(m => { state.plan[dayKey][m.key].forEach(rid => { const r = getRecipe(rid); if (r) s = addNut(s, recipeNut(r)); }); });
    if (dayNutCache) dayNutCache[dayKey] = s;

  // Eine Zutat ist entweder ein String (Altbestand, reiner Freitext) oder ein Objekt

  // (der Feldname bleibt aus Kompatibilitaet, siehe Namensdualitaet in CLAUDE.md), `unit`
  // sagt worin: "g", "ml" oder "st" (Stueck). Fehlendes `unit` = "g" — so bleiben alle
  // Altbestaende gueltig. Die Naehrwerte gelten pro 100 g / pro 100 ml bzw. PRO STUECK;
  // ingContrib rechnet entsprechend hoch. (ING_UNITS selbst steht ganz oben im Script,
  // weil sanitizeIng schon von load() gebraucht wird - eine const hier waere zu diesem
  // fruehen Zeitpunkt noch nicht initialisiert und haette das ganze Script abgebrochen.
  // Echter Absturz auf dem Live-Server gewesen, siehe Commit-Historie.)
  function ingUnit(o) { const u = o && o.unit; return ING_UNITS.indexOf(u) >= 0 ? u : "g"; }
  function unitShort(u) { return u === "st" ? "Stück" : u; }
  // Bezugsgroesse der Naehrwertfelder — bei Stueck gibt es keine 100er-Basis
  function ingPerLabel(u) { return u === "st" ? "pro Stück:" : "pro 100 " + u + ":"; }
  function ingObj(i) { return (i && typeof i === "object") ? i : { name: String(i == null ? "" : i) }; }
  function ingLabel(i) {
    const o = ingObj(i), n = String(o.name || "").trim(), q = nutNum(o.grams);
    return q ? qtyLabel(q, ingUnit(o)) + " " + n : n;

  function ingHasNut(i) { const o = ingObj(i); return o.kcal != null || o.carbs != null || o.protein != null || o.fat != null; }
  function ingContrib(i) {
    const o = ingObj(i);
    // Stueck: Naehrwert gilt je Stueck (×Menge). g/ml: Naehrwert gilt je 100 (×Menge/100).
    const f = ingUnit(o) === "st" ? nutNum(o.grams) : nutNum(o.grams) / 100;
    return { kcal: nutNum(o.kcal) * f, carbs: nutNum(o.carbs) * f, protein: nutNum(o.protein) * f, fat: nutNum(o.fat) * f };

  // Menge lesbar machen: ab 1000 auf die grosse Einheit (2800 ml -> 2,8 L, 1500 g -> 1,5 kg).
  function qtyLabel(n, u) {
    if (u === "st") return numLabel(n) + "×"; // "35× Ei" liest sich besser als "35 Stück Ei"
    if (n >= 1000) return numLabel(Math.round(n / 10) / 100) + (u === "ml" ? " L" : " kg");
    return numLabel(n) + " " + u;

  function numLabel(n) { return (Math.round(n * 100) / 100).toLocaleString("de-DE"); }

    const name = String(x.name || "").trim(); if (!name) return null;
    const o = { name };
    ["grams", "kcal", "carbs", "protein", "fat"].forEach(k => { const v = nutParse(x[k]); if (v != null) o[k] = v; });
    if (ING_UNITS.indexOf(x.unit) > 0) o.unit = x.unit; // "g" ist Default, muss nicht mit
    return Object.keys(o).length > 1 ? o : name;

  function foodNorm(s) {
    return String(s == null ? "" : s).toLowerCase()
      .replace(/ß/g, "ss")
      .replace(/ä/g, "a").replace(/ö/g, "o").replace(/ü/g, "u")

  // dann irgendwo mittendrin. Sonst schlaegt "reis" die Preiselbeere vor dem Reis vor.
  function foodSearch(q, max) {
    const n = foodNorm(q).trim();
    if (n.length < 2) return [];
    const a = [], b = [], c = [];
    foodList().forEach(f => {
      const i = f.key.indexOf(n);
      if (i < 0) return;
      if (i === 0) a.push(f);
      else if (/[\s,/-]/.test(f.key.charAt(i - 1))) b.push(f);
      else c.push(f);
    });

  // Foto vom Barcode -> Code lokal aus dem Bild lesen -> Nummer bei Open Food Facts
  // nachschlagen. Nur die Barcode-NUMMER verlaesst das Geraet, nie das Foto selbst.
  // Erkennung bevorzugt die native BarcodeDetector-API (Chrome/Edge/Android); die
  // gibt es auf iOS/Safari nicht - dort laedt loadZXing() beim ersten Scan eine
  // Open-Source-Bibliothek vom CDN nach (im Datenschutz-Absatz 7a erklaert).
  let zxLoad = null;
  function loadZXing() {
    if (window.ZXing) return Promise.resolve();
    if (!zxLoad) zxLoad = new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js";
      s.onload = resolve;
      s.onerror = () => { zxLoad = null; s.remove(); reject(new Error("zxing-load")); };
      document.head.appendChild(s);
    });
    return zxLoad;

  const BARCODE_FORMATS = ["ean_13", "ean_8", "upc_a", "upc_e", "code_128"];
  async function detectBarcode(file) {
    if (window.BarcodeDetector) {
      try {
        const det = new window.BarcodeDetector({ formats: BARCODE_FORMATS });
        const bmp = await createImageBitmap(file);
        const hits = await det.detect(bmp);
        if (hits && hits[0] && hits[0].rawValue) return hits[0].rawValue;
      } catch (e) { /* z. B. Format nicht unterstuetzt - fällt auf ZXing zurueck */ }
    }
    await loadZXing();
    const url = URL.createObjectURL(file);
    try {
      const reader = new window.ZXing.BrowserMultiFormatReader();
      const res = await reader.decodeFromImageUrl(url);

    } finally {
      URL.revokeObjectURL(url);

  // den "_100g"-Feldern (auch Cola steht unter carbohydrates_100g, nicht _100ml) -

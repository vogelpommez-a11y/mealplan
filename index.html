  ];
  const SHOP_OTHER = { key: "sonst", title: "Sonstiges", icon: "📦" };
  function shopCategory(label) {
    const toks = label.toLowerCase().replace(/ß/g, "ss").replace(/[0-9]+/g, " ").replace(/[^a-zäöü]+/g, " ").split(/\s+/).filter(Boolean);
    for (let c = 0; c < SHOP_CATS.length; c++) {
      const kws = SHOP_CATS[c].kw;
      for (let k = 0; k < kws.length; k++) {
        const kw = kws[k];
        for (let t = 0; t < toks.length; t++) {
          const tok = toks[t];
          if (tok === kw) return SHOP_CATS[c];
          if (kw.length >= 4 && (tok.indexOf(kw) === 0 || tok.slice(-kw.length) === kw)) return SHOP_CATS[c];
        }
      }
    }
    return SHOP_OTHER;
  }
  const SHOP_DONE_KEY = "wochenkueche_shop_v1";
  function loadShopDone() { try { return new Set(JSON.parse(localStorage.getItem(SHOP_DONE_KEY) || "[]")); } catch (e) { return new Set(); } }
  function saveShopDone(set) { try { localStorage.setItem(SHOP_DONE_KEY, JSON.stringify(Array.from(set))); } catch (e) {} }

  function openShopping() {
    // Zusammenfassen: gleiche Zutat + gleiche Einheit werden addiert (7 × 400 ml Milch
    // -> "2,8 L Milch"). Zutaten ohne Menge (Freitext wie "Salz, Pfeffer") haben nichts
    // zu addieren und werden wie bisher gezaehlt.
    const map = new Map(); // key -> {label, count, qty, unit, name}
    DAYS.forEach(d => MEALS.forEach(m => state.plan[d.key][m.key].forEach(rid => {
      const r = getRecipe(rid);
      if (!r || !r.ingredients) return;
      r.ingredients.forEach(i => {
        const o = ingObj(i);
        const name = String(o.name || "").trim();
        const qty = nutNum(o.grams);
        const unit = ingUnit(o);
        // Ohne Menge zaehlt der ganze Text (Altbestand), sonst Name+Einheit als Schluessel
        const norm = qty
          ? name.toLowerCase() + "|" + unit
          : ingLabel(i).toLowerCase().trim();
        if (!norm || (!qty && !name)) return;
        const hit = map.get(norm);
        if (hit) { hit.count++; if (qty) hit.qty += qty; }
        else map.set(norm, { norm: norm, name: name, qty: qty, unit: unit, count: 1 });
      });
    })));
    // Anzeige-Label erst am Ende bilden — die Summe entscheidet ueber g/kg bzw. ml/L
    map.forEach(it => { it.label = it.qty ? qtyLabel(it.qty, it.unit) + " " + it.name : it.name; });
    // nach Zutatennamen sortieren, nicht nach Label — sonst ordnet die Menge die Liste
    const items = Array.from(map.values()).sort((a, b) => (a.name || a.label).localeCompare(b.name || b.label, "de"));
    const done = loadShopDone();
    // nach Warengruppe gruppieren; Reihenfolge = SHOP_CATS, "Sonstiges" ganz am Ende
    const gmap = {};
    items.forEach(it => { const c = shopCategory(it.name || it.label); (gmap[c.key] || (gmap[c.key] = { cat: c, items: [] })).items.push(it); });
    const groups = SHOP_CATS.concat([SHOP_OTHER]).map(c => gmap[c.key]).filter(Boolean);

    const checkSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`;
    let body;
    if (items.length === 0) {
      body = `<div class="shop-empty">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 2H2"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/></svg>
        <p>Noch keine Zutaten – plane zuerst ein paar Mahlzeiten im Wochenplan, dann sammeln wir die Zutaten hier automatisch.</p>
      </div>`;
    } else {
      let idx = 0;
      const listHtml = groups.map(g => `
        <div class="shop-group">
          <div class="shop-cat"><span class="shop-cat-ic" aria-hidden="true">${g.cat.icon}</span>${esc(g.cat.title)}<span class="shop-cat-n">${g.items.length}</span></div>
          ${g.items.map(it => {
            const id = "s" + (idx++);
            return `<label class="shop-item">
              <input type="checkbox" class="shop-check" id="${id}" data-norm="${esc(it.norm)}"${done.has(it.norm) ? " checked" : ""}>
              <span class="box" aria-hidden="true">${checkSvg}</span>
              <span class="lbl"${it.qty && it.count > 1 ? ` title="summiert aus ${it.count} Meals der Woche"` : ""}>${esc(it.label)}</span>
              ${!it.qty && it.count > 1 ? `<span class="qty" title="in ${it.count} Meals der Woche">×${it.count}</span>` : ""}
            </label>`;
          }).join("")}
        </div>`).join("");
      body = `
        <div class="shop-progress">
          <span class="ptext" id="shop-count">0 von ${items.length} erledigt</span>
          <div class="bar"><i id="shop-bar"></i></div>
          <button class="toggle-all" id="shop-toggle" type="button">Alle abhaken</button>
        </div>
        <div class="shop-list">${listHtml}</div>`;
    }

    const node = el(`<div class="modal" role="dialog" aria-modal="true" aria-label="Einkaufsliste">
      <div class="modal-head">
        <div class="shop-head" style="flex:1">
          <div class="cart" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 2H2"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg></div>
          <div><div class="kicker">${items.length} Position${items.length===1?"":"en"} · diese Woche</div><h3 style="margin:2px 0 0">Einkaufsliste der Woche</h3></div>
        </div>
        <button class="btn ghost sm" data-close>✕</button>
      </div>
      <div class="modal-body">${body}</div>
      <div class="modal-foot">
        ${items.length ? `<button class="btn" data-copy>Als Text kopieren</button>` : ""}
        <button class="btn primary" data-close>Schließen</button>
      </div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    if (items.length) {
      const checks = Array.from(node.querySelectorAll(".shop-check"));
      const bar = node.querySelector("#shop-bar");
      const countEl = node.querySelector("#shop-count");
      const toggleBtn = node.querySelector("#shop-toggle");
      const updateProgress = () => {
        const done = checks.filter(c => c.checked).length;
        bar.style.width = Math.round(done / checks.length * 100) + "%";
        countEl.textContent = done + " von " + checks.length + " erledigt";
        toggleBtn.textContent = done === checks.length ? "Zurücksetzen" : "Alle abhaken";
      };
      const persist = () => { const d = new Set(); checks.forEach(c => { if (c.checked) d.add(c.dataset.norm); }); saveShopDone(d); };
      checks.forEach(c => c.addEventListener("change", () => { updateProgress(); persist(); }));
      toggleBtn.addEventListener("click", () => { const allDone = checks.every(c => c.checked); checks.forEach(c => { c.checked = !allDone; }); updateProgress(); persist(); });
      updateProgress();
    }
    const copyBtn = node.querySelector("[data-copy]");
    if (copyBtn) copyBtn.addEventListener("click", () => {
      const text = groups.map(g => g.cat.title.toUpperCase() + "\n" + g.items.map(it => "• " + it.label + (it.count > 1 ? " (×" + it.count + ")" : "")).join("\n")).join("\n\n");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => toast("Liste kopiert")).catch(() => toast("Kopieren nicht möglich"));
      } else toast("Kopieren nicht möglich");
    });
    openModal(node);
  }

  // ---------- Actions ----------
  // Meal-Verweise aus ALLEN gespeicherten Wochen entfernen, nicht nur aus der gerade
  // angezeigten - sonst bleibt in der anderen Woche ein Verweis auf ein geloeschtes
  // Meal stehen (faellt erst beim naechsten Laden weg, weil normalizePlan aufraeumt).
  function dropRecipeIds(idSet) {
    Object.keys(state.plans).forEach(key => {
      const p = state.plans[key];
      if (!p) return;
      DAYS.forEach(d => MEALS.forEach(m => {
        if (p[d.key] && p[d.key][m.key]) p[d.key][m.key] = asIdList(p[d.key][m.key]).filter(x => !idSet.has(x));
      }));
    });
  }
  function deleteRecipe(id) {
    const r = getRecipe(id); if (!r) return;
    confirmModal({
      title: "Meal löschen?",
      bodyHtml: `<p style="margin:0">„<strong>${esc(r.name)}</strong>" wird dauerhaft entfernt und aus dem Wochenplan gelöscht.</p>`,
      okLabel: "Löschen",
      onConfirm: () => {
        state.recipes = state.recipes.filter(x => x.id !== id);
        dropRecipeIds(new Set([id]));
        render(); toast("Meal gelöscht");
      }
    });
  }

  function clearExamples() {
    const exIds = new Set(state.recipes.filter(isExample).map(r => r.id));
    if (!exIds.size) { toast("Keine Beispiele vorhanden"); return; }
    const n = exIds.size;
    confirmModal({
      title: "Beispiele entfernen?",
      text: `Die ${n} mitgelieferten Beispiel-Meal${n === 1 ? "" : "s"} werden entfernt und aus dem Wochenplan gelöscht. Deine eigenen Meals bleiben erhalten.`,
      okLabel: "Entfernen",
      onConfirm: () => {
        state.recipes = state.recipes.filter(r => !exIds.has(r.id));
        dropRecipeIds(exIds);
        render(); toast("Beispiele entfernt");
      }
    });
  }

      <p>Bei der Registrierung: <strong>Name und E-Mail-Adresse</strong>. Bei Nutzung der App: die von dir angelegten <strong>Wochenpläne, Meals/Rezepte und ggf. Fotos</strong> sowie – falls du den Kalorienrechner nutzt und ein Ergebnis speicherst – <strong>Geschlecht, Alter, Größe, Gewicht, Alltagsbewegung, Ziel sowie deine Trainingstage</strong> (Wochentag, Intensität und Dauer; Details siehe Ziffer 3a). Erstellst du Teilen-Links, merkt sich dein Konto zusätzlich deren <strong>Kennungen</strong> (keine Klardaten, siehe Ziffer 8), damit sie beim Löschen deines Kontos zugeordnet und mitentfernt werden können. Diese Daten speichern wir, damit du dich anmelden und deine Planung geräteübergreifend nutzen kannst.</p>
      <h4>3a. Kalorienrechner</h4>
      <p>Nutzt du den Kalorienrechner, gibst du freiwillig <strong>Geschlecht, Alter, Größe und Gewicht</strong> sowie deine Alltagsbewegung und dein Ziel ein. Optional legst du zusätzlich deine <strong>Trainingstage</strong> fest – also an welchen Wochentagen du trainierst, mit welcher Intensität und wie lange. Daraus berechnet die App direkt in deinem Browser deinen Tagesbedarf, deine Makronährstoffe und deinen BMI; an Trainingstagen zusätzlich den geschätzten Mehrbedarf durch die jeweilige Einheit. Speicherst du das Ergebnis („Als mein Ziel speichern"), werden diese Angaben wie deine übrigen Plandaten lokal und – bei Cloud-Nutzung – in deinem Nutzerkonto (Cloud Firestore, siehe Ziffer 5) gespeichert, um sie geräteübergreifend verfügbar zu halten. Rechtsgrundlage ist wie unter Ziffer 4 die Erfüllung des Nutzungsvertrags (Art. 6 Abs. 1 lit. b DSGVO). Die Eingabe ist freiwillig; lässt du den Rechner ungenutzt, entstehen keine dieser Daten. Diese Angaben werden <strong>nicht</strong> in Teilen-Links aufgenommen (siehe Ziffer 8).</p>
      <h4>4. Zweck &amp; Rechtsgrundlage</h4>
      <p>Wir verarbeiten die Daten zur Bereitstellung deines Nutzerkontos und der Planer-Funktionen (Art. 6 Abs. 1 lit. b DSGVO – Nutzungsvertrag). Die Bestätigungs-E-Mail dient der Sicherstellung, dass die Adresse dir gehört.</p>
      <h4>5. Cloud-Dienste (Google Firebase)</h4>
      <p>Für Anmeldung und Speicherung nutzen wir <strong>Google Firebase</strong> (Firebase Authentication und Cloud Firestore) der Google Ireland Ltd., Gordon House, Barrow Street, Dublin 4, Irland. Der Datenbank-Standort ist auf <strong>Europa</strong> eingestellt. Google verarbeitet die Daten in unserem Auftrag (Auftragsverarbeitung); eine Übermittlung in die USA kann nicht ausgeschlossen werden und stützt sich auf die EU-Standardvertragsklauseln bzw. das EU-US Data Privacy Framework. Datenschutz von Google: <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">policies.google.com/privacy</a>.</p>
      <h4>6. Anmeldung mit Google</h4>
      <p>Wenn du dich mit „Mit Google anmelden" einloggst, erhält Google die für die Anmeldung nötigen Informationen. Es gelten zusätzlich die Datenschutzbestimmungen von Google.</p>
      <h4>7. Speicherung im Browser</h4>
      <p>Zur Anmeldung und für den Offline-Betrieb speichert die App technisch notwendige Daten lokal in deinem Browser (localStorage/IndexedDB). Dafür ist keine Einwilligung erforderlich; ein Tracking findet nicht statt (Google Analytics ist deaktiviert).</p>
      <h4>7a. Barcode-Scan (Produktsuche)</h4>
      <p>Beim Anlegen von Zutaten kannst du einen Barcode scannen. Dafür fragt die App den Zugriff
         auf die <strong>Kamera</strong> deines Geräts an und zeigt das Kamerabild live an, bis ein
         Barcode erkannt oder der Scanner geschlossen wird; alternativ kannst du ein Einzelfoto
         aufnehmen. Das <strong>Kamerabild wird weder gespeichert noch übertragen</strong> und die
         Kamera wird beim Schließen des Scanners sofort wieder freigegeben. Die Erkennung des
         Barcodes läuft <strong>vollständig lokal in deinem Browser</strong> – Bild bzw. Foto
         verlassen dein Gerät nicht. Unterstützt dein Browser die dafür nötige Technik nicht selbst (z. B.
         auf iPhones), lädt die App beim ersten Scan die Open-Source-Bibliothek <strong>ZXing</strong>
         vom Content-Delivery-Netzwerk <strong>cdn.jsdelivr.net</strong> nach; dabei wird deine
         IP-Adresse an diesen Dienst übermittelt (Art. 6 Abs. 1 lit. f DSGVO – berechtigtes
         Interesse an der Bereitstellung der Funktion). Anschließend übermittelt die App die
         erkannte <strong>Barcode-Nummer</strong> (nicht das Foto) an <strong>Open Food
         Facts</strong> (Open Food Facts Association, Frankreich), um Name und Nährwerte des
         Produkts abzurufen; dabei wird ebenfalls deine IP-Adresse an diesen Dienst übermittelt
         (Art. 6 Abs. 1 lit. f DSGVO). Nutzt du den Barcode-Scan nicht, findet keiner dieser
         Abrufe statt.</p>
      <h4>8. Teilen-Funktion</h4>
      <p>Wenn du einen Teilen-Link erstellst, wird eine Kopie deines Wochenplans (die eingeplanten Meals, dein
         angezeigter Name und der Zeitpunkt) in der Cloud gespeichert. Sie ist ausschließlich über den Link abrufbar
         und nur für angemeldete Nutzer. Die Kennung im Link wird mit 80&nbsp;Bit Zufall erzeugt und ist praktisch
         nicht erratbar; ein Auflisten oder Durchsuchen der geteilten Pläne ist technisch unterbunden. Der Link ist
         damit der einzige Zugang – <strong>teile ihn nur mit Personen, die den Plan sehen dürfen</strong>, denn wer
         ihn hat, kann den Plan öffnen.</p>
      <h4>9. Verschlüsselung</h4>
      <p>Die Übertragung der Daten erfolgt verschlüsselt über HTTPS (SSL/TLS).</p>
      <h4>10. Speicherdauer &amp; Löschung</h4>
      <p>Wir speichern deine Daten, solange dein Konto besteht. Über „Konto löschen" im Profilmenü kannst du dein
         Konto und deine Daten <strong>jederzeit selbst und sofort</strong> unwiderruflich löschen; alternativ kannst
         du die Löschung auch per E-Mail an uns verlangen. Das schließt die geteilten Wochenpläne ein, die deinem
         Konto zugeordnet und diesem Gerät bzw. deinem synchronisierten Konto zum Löschzeitpunkt bekannt sind – sie
         werden automatisch mitentfernt; schlägt das für einen einzelnen Link fehl, bricht die Löschung ab, statt
         einen Rest zurückzulassen, und du kannst sie erneut anstoßen. Bis zur Löschung bleiben geteilte Pläne
         abrufbar – auch dann, wenn du den Link nicht mehr weitergibst. Nutzt du die App ohne Cloud-Konto (lokales
         Profil), kannst du ebenso über „Alle Daten löschen" im Profilmenü sämtliche auf diesem Gerät gespeicherten
         Daten sofort entfernen.</p>
      <h4>11. Deine Rechte</h4>
      <p>Du hast das Recht auf Auskunft, Berichtigung, Löschung, Einschränkung der Verarbeitung, Datenübertragbarkeit und Widerspruch. Soweit eine Verarbeitung auf deiner Einwilligung beruht, kannst du diese jederzeit mit Wirkung für die Zukunft widerrufen. Zudem hast du ein Beschwerderecht bei einer Datenschutz-Aufsichtsbehörde – für uns zuständig ist das Bayerische Landesamt für Datenschutzaufsicht (BayLDA), Promenade 18, 91522 Ansbach.</p>
      <h4>12. Automatisierte Entscheidungsfindung</h4>
      <p>Eine automatisierte Entscheidungsfindung oder ein Profiling im Sinne des Art. 22 DSGVO findet nicht statt.</p>`);

  function clearWeek() {
    if (planStats() === 0) { toast("Der Plan ist schon leer"); return; }
    confirmModal({
      title: "Woche leeren?",
      text: "Alle Zuordnungen im Wochenplan werden entfernt. Deine Meals bleiben erhalten.",
      okLabel: "Woche leeren",
      onConfirm: () => {
        DAYS.forEach(d => MEALS.forEach(m => { state.plan[d.key][m.key] = []; }));
        save(); render();
        toast(state.viewWeek === "next" ? "Nächste Woche geleert" : "Woche geleert");
      }
    });
  }

  // ---------- Toast ----------
  let toastTimer = null;
  function toast(msg) {
    const t = document.getElementById("toast");
    if (!t) return;   // wird u. a. aus save() gerufen, das sehr frueh laufen kann
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 1900);
  }

  // ---------- Event delegation ----------
  // Meal-Foto ueber das "+" auf der Karte (ein globales, wiederverwendetes file-input)
  const photoInput = document.createElement("input");
  photoInput.type = "file"; photoInput.accept = "image/*"; photoInput.className = "visually-hidden";
  document.body.appendChild(photoInput);
  let photoTargetId = null;
  photoInput.addEventListener("change", () => {
    const f = photoInput.files && photoInput.files[0];
    photoInput.value = "";
    const r = photoTargetId ? getRecipe(photoTargetId) : null;
    photoTargetId = null;
    if (!f || !r) return;
    if (!/^image\//.test(f.type)) { toast("Bitte ein Bild verwenden"); return; }
    readAndDownscale(f, dataUrl => { if (dataUrl) { r.image = dataUrl; save(); render(); toast("Foto übernommen"); } else toast("Bild konnte nicht geladen werden"); });
  });

  document.addEventListener("click", e => {
    const t = e.target.closest("[data-action]");
    if (!t) return;
    const a = t.dataset.action;
    if (a === "tab") { state.tab = t.dataset.tab; render(); }
    else if (a === "photo") { photoTargetId = t.dataset.id; photoInput.click(); }
    else if (a === "new-recipe") openRecipeForm(null);
    else if (a === "edit") openRecipeForm(t.dataset.id);
    else if (a === "view") openRecipeDetail(t.dataset.id);
    else if (a === "delete") deleteRecipe(t.dataset.id);
    else if (a === "clear-examples") clearExamples();
    else if (a === "toggle-cat") {
      const c = t.dataset.cat;
      if (collapsedCats.has(c)) collapsedCats.delete(c); else collapsedCats.add(c);
      render();
    }
    else if (a === "pick") openPicker(t.dataset.day, t.dataset.meal);
    else if (a === "unassign") { e.stopPropagation(); const [d, m, i] = t.dataset.slotSrc.split(":"); state.plan[d][m].splice(Number(i), 1); render(); }
    else if (a === "shopping") openShopping();
    else if (a === "week") { if ((t.dataset.week === "next") !== (state.viewWeek === "next")) { setViewWeek(t.dataset.week); render(); } }
    else if (a === "clear-week") clearWeek();
    else if (a === "share") openShare();
    else if (a === "profile-menu") toggleProfileMenu();
    else if (a === "impressum") openImpressum();
    else if (a === "datenschutz") openDatenschutz();
  });

  // ---------- Drag & drop between slots ----------
  let dragSrc = null;
  view.addEventListener("dragstart", e => {
    const f = e.target.closest(".filled[data-slot-src]");
    if (!f) return;
    dragSrc = f.dataset.slotSrc;
    f.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", dragSrc); } catch (err) {}
  });
  view.addEventListener("dragend", e => {
    const f = e.target.closest(".filled"); if (f) f.classList.remove("dragging");
    view.querySelectorAll(".slot.dragover, .slot.nodrop").forEach(s => s.classList.remove("dragover", "nodrop"));
    dragSrc = null;
  });
  // Kategorie des gerade gezogenen Meals – "day:meal:idx" -> Rezept
  function draggedCat() {
    if (!dragSrc) return null;
    const [d, m, i] = dragSrc.split(":");
    const r = getRecipe((state.plan[d] && state.plan[d][m] || [])[Number(i)]);
    return r ? r.category : null;
  }
  function dropAllowed(slot) {
    return catFitsMeal(draggedCat(), slot.dataset.meal);
  }
  view.addEventListener("dragover", e => {
    const slot = e.target.closest(".slot[data-slot]");
    if (!slot || !dragSrc) return;
    if (!dropAllowed(slot)) { e.dataTransfer.dropEffect = "none"; slot.classList.add("nodrop"); return; }
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    slot.classList.add("dragover");
  });
  view.addEventListener("dragleave", e => {
    const slot = e.target.closest(".slot[data-slot]");
    if (slot && !slot.contains(e.relatedTarget)) slot.classList.remove("dragover", "nodrop");
  });
  view.addEventListener("drop", e => {
    const slot = e.target.closest(".slot[data-slot]");
    if (!slot || !dragSrc || !dropAllowed(slot)) return;
    e.preventDefault();
    const target = slot.dataset.slot;
    const [sd, sm, si] = dragSrc.split(":");
    const [td, tm] = target.split(":");
    if (sd === td && sm === tm) { render(); return; } // gleicher Slot – nichts tun
    const moving = state.plan[sd][sm][Number(si)];
    if (moving == null) { render(); return; }
    state.plan[sd][sm].splice(Number(si), 1);
    state.plan[td][tm].push(moving);
    render();
    toast("Verschoben");
  });

  // ---------- Foto per Drag & Drop auf eine Meal-Karte (Desktop) ----------
  // Eigene Listener auf demselben "view" wie oben - stoeren sich nicht, weil
  // ".rcard" (Meals-Tab) und ".slot" (Plan-Tab) nie gleichzeitig im DOM stehen.
  function isFileDrag(e) { return !!(e.dataTransfer && e.dataTransfer.types && Array.prototype.includes.call(e.dataTransfer.types, "Files")); }
  view.addEventListener("dragover", e => {
    const card = e.target.closest(".rcard[data-rid]");
    if (!card || !isFileDrag(e)) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "copy";
    card.classList.add("dragover-file");
  });
  view.addEventListener("dragleave", e => {
    const card = e.target.closest(".rcard[data-rid]");
    if (card && !card.contains(e.relatedTarget)) card.classList.remove("dragover-file");
  });
  view.addEventListener("drop", e => {
    const card = e.target.closest(".rcard[data-rid]");
    if (!card || !isFileDrag(e)) return;
    e.preventDefault();
    card.classList.remove("dragover-file");
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    const r = getRecipe(card.dataset.rid);
    if (!f || !r) return;
    if (!/^image\//.test(f.type)) { toast("Bitte ein Bild verwenden"); return; }
    readAndDownscale(f, dataUrl => { if (dataUrl) { r.image = dataUrl; save(); render(); toast("Foto übernommen"); } else toast("Bild konnte nicht geladen werden"); });
  });

  // ---------- Foto per Strg+V auf eine Meal-Karte einfuegen ----------
  // Gleiches Ziel-Prinzip wie beim Datei-Drop: die gerade mit der Maus ueberfahrene
  // Karte. Ohne Hover-Ziel passiert nichts - kein Rateraten, welches Meal gemeint ist.
  let hoveredCardId = null;
  view.addEventListener("mouseover", e => {
    const card = e.target.closest(".rcard[data-rid]");
    if (card) hoveredCardId = card.dataset.rid;
  });
  view.addEventListener("mouseout", e => {
    const card = e.target.closest(".rcard[data-rid]");
    if (card && !card.contains(e.relatedTarget)) hoveredCardId = null;
  });
  document.addEventListener("paste", e => {
    // Bei offenem Dialog nie auf eine Karte einfuegen: hoveredCardId zeigt dann noch
    // auf die Karte hinter dem Overlay, und ein Screenshot-Einfuegen im
    // Bearbeiten-Formular wuerde unbemerkt dort landen statt im Formular.
    if (modalRoot.children.length) return;
    if (state.tab !== "recipes" || !hoveredCardId) return;
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    let file = null;
    for (const it of items) { if (it.type && it.type.indexOf("image/") === 0) { file = it.getAsFile(); break; } }
    if (!file) return; // kein Bild im Clipboard - normales Text-Einfuegen (z. B. im Namensfeld) unangetastet lassen
    e.preventDefault();
    const r = getRecipe(hoveredCardId);
    if (!r) return;
    readAndDownscale(file, dataUrl => { if (dataUrl) { r.image = dataUrl; save(); render(); toast("Foto eingefügt"); } else toast("Bild konnte nicht geladen werden"); });
  });

  // ---------- Profil (lokal) & Teilen ----------
  const PROFILE_KEY = "wochenkueche_profile_v1";
  const LAST_KEY = "wochenkueche_lastprofile_v1";
  function jget(key, fb) { try { const v = JSON.parse(localStorage.getItem(key)); return v == null ? fb : v; } catch (e) { return fb; } }
  let profile = jget(PROFILE_KEY, null);
  function saveProfile() { try { if (profile) localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); else localStorage.removeItem(PROFILE_KEY); } catch (e) {} }
  function rememberLast() { try { localStorage.setItem(LAST_KEY, JSON.stringify(profile)); } catch (e) {} }
  function initials(name) { return (name || "?").trim().split(/\s+/).slice(0, 2).map(w => w[0] ? w[0].toUpperCase() : "").join("") || "?"; }
  function validEmail(e) { return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e); }

  const appEl = document.querySelector(".app");
  const profileSlot = document.getElementById("profile-slot");

  let pendingShare = null;
  function readSharedFromUrl() {
    try {
      const m = (location.search || "").match(/[?&]s=([A-Za-z0-9_-]+)/);
      if (!m) return;
      pendingShare = m[1];
      history.replaceState(null, "", location.pathname);
    } catch (e) {}
  }
  let authMode = "local";
  let cloudSignalled = false;
  function enterLocalMode() {
    if (cloudSignalled) return;
    cloudSignalled = true; authMode = "local";
    if (!profile) renderAuthLocal(); else enterApp();
  }
  function handleCloudUser(user) {
    cloudSignalled = true; authMode = "cloud";
    if (user && user.emailVerified) {
      profile = {
        name: user.displayName || (user.email ? user.email.split("@")[0] : "Ich"),
        email: user.email || "", uid: user.uid, cloud: true
      };
      saveProfile(); rememberLast();
      enterApp();
      startCloudSync(user.uid);
    } else if (user && !user.emailVerified) {
      stopCloudSync();
      renderVerifyPending(user);
    } else {
      stopCloudSync();
      renderAuthCloud();
    }
  }
  function boot() {
    const fy = document.getElementById("foot-year"); if (fy) fy.textContent = new Date().getFullYear();
    readSharedFromUrl();
    window.__onCloudAuth = handleCloudUser;
    window.addEventListener("cloudauth:disabled", enterLocalMode);
    // Falls das Cloud-Modul (CDN blockiert / offline) nie antwortet: nach 6 s lokal weiter.
    setTimeout(function () { if (!cloudSignalled) enterLocalMode(); }, 6000);
    renderAuthLoading();
  }
  function enterApp() {
    appEl.classList.remove("authing");
    renderProfileChip();
    state.tab = "plan"; // Start immer im Wochenplan (Reload & Login)
    render();
    if (pendingShare) { const id = pendingShare; pendingShare = null; loadSharedById(id); }
  }
  function loadSharedById(id) {
    if (!window.CloudShare || !window.CloudShare.enabled) { toast("Geteilte Links brauchen ein Cloud-Konto"); return; }
    window.CloudShare.fetch(id).then(function (data) {
      if (data && Array.isArray(data.recipes)) openSharedImport(data);
      else toast("Geteilter Plan nicht gefunden (Link abgelaufen?)");
    }).catch(function () { toast("Geteilter Plan konnte nicht geladen werden"); });
  }
  function openSharedImport(d) {
    if (!d || !Array.isArray(d.recipes)) return;
    const who = d.by ? esc(d.by) : "Jemand";
    const nrec = d.recipes.length;
    const node = el(`<div class="modal" role="dialog" aria-modal="true" aria-label="Geteilter Plan">
      <div class="modal-head"><div style="flex:1"><div class="kicker">Einladung erhalten</div><h3 style="margin-top:2px">Geteilter Wochenplan</h3></div><button class="btn ghost sm" data-close>✕</button></div>
      <div class="modal-body"><p style="margin:0"><strong>${who}</strong> hat einen Wochenplan mit dir geteilt (${nrec} Meal${nrec === 1 ? "" : "s"}). Möchtest du ihn übernehmen? Deine eigenen Meals bleiben erhalten, neue kommen dazu – dein aktueller Wochenplan wird durch den geteilten ersetzt.</p></div>
      <div class="modal-foot"><button class="btn ghost" data-close>Später</button><button class="btn primary" data-take>Plan übernehmen</button></div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    node.querySelector("[data-take]").addEventListener("click", () => applySharedData(d, true));
    openModal(node);
  }

  function renderProfileChip() {
    const cloudDot = authMode === "cloud" ? `<span class="sync-dot chip off" data-sync-dot aria-hidden="true"></span>` : "";
    profileSlot.innerHTML = `<div class="profile">
      <button class="profile-btn" data-action="profile-menu" aria-haspopup="true" aria-label="Profilmenü">
        <span class="av-wrap"><span class="avatar" aria-hidden="true">${esc(initials(profile.name))}</span>${cloudDot}</span>
        <span class="pname">${esc(profile.name)}</span>
        <svg class="caret" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button></div>`;
    updateSyncUI();
  }

  function toggleProfileMenu() {
    const open = document.querySelector(".profile .menu");
    if (open) { open.remove(); return; }
    const wrap = document.querySelector(".profile");
    if (!wrap) return;
    const delLabel = authMode === "cloud" ? "Konto löschen" : "Alle Daten löschen";
    const menu = el(`<div class="menu" role="menu">
      <div class="mhead"><div class="mn">${esc(profile.name)}</div><div class="me">${esc(profile.email)}</div></div>
      <button data-mi="edit" role="menuitem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>Profil bearbeiten</button>
      <hr>
      <button data-mi="signout" class="danger" role="menuitem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5M21 12H9"/></svg>Abmelden</button>
      <hr>
      <button data-mi="delete" class="destructive" role="menuitem">${ACT_ICONS.del}${delLabel}</button>
    </div>`);
    wrap.appendChild(menu);
    updateSyncUI();
    menu.querySelector("[data-mi='edit']").addEventListener("click", () => { menu.remove(); openProfileForm(); });
    menu.querySelector("[data-mi='signout']").addEventListener("click", () => { menu.remove(); signOut(); });
    menu.querySelector("[data-mi='delete']").addEventListener("click", () => { menu.remove(); authMode === "cloud" ? deleteAccountFlow() : deleteLocalDataFlow(); });
    setTimeout(() => {
      const off = e => { if (!menu.contains(e.target) && !e.target.closest(".profile-btn")) { menu.remove(); document.removeEventListener("mousedown", off); } };
      document.addEventListener("mousedown", off);
    }, 0);
  }

  // ---------- Kalorienrechner (Baustein 1: Tages-/Wochenbedarf → state.goal) ----------
  // ACTIVITY, TRAIN_LEVELS und ihre Helfer stehen bewusst weit oben bei DAYS/MEALS und
  // nicht hier: sanitizeGoal() braucht sie, und das laeuft schon in `let state = load()`.
  // Von hier aus waeren sie dort noch in der temporalen Todeszone — die App wuerde beim
  // Start mit einem ReferenceError sterben, ohne dass ein catch greift.
  const MODE_LABEL = { lose: "Abnehmen", hold: "Gewicht halten", gain: "Zunehmen" };
  // Anpassung des Erhaltungsbedarfs je nach Ziel/Tempo (kcal/Tag).
  function paceAdjust(mode, pace) {
    if (mode === "lose") return ({ light: -250, moderate: -500, strong: -750 })[pace] || -500;
    if (mode === "gain") return ({ light: 250, moderate: 500 })[pace] || 500;
    return 0;
  }
  // Mifflin-St-Jeor → BMR × PAL = Alltagsbedarf → Ziel-Anpassung = RUHETAG-Ziel.
  // Der Alltagsbedarf gilt an jedem Tag; an Trainingstagen kommt der Trainingsverbrauch
  // obendrauf (siehe dayKcal). Am Ruhetag ist er der ganze Bedarf.
  // Makros: Protein 2 g/kg (ab BMI 27 auf das Gewicht bei BMI 27 gedeckelt),
  // Fett 25 % der Kalorien (weicht zurueck, wenn sonst die Summe nicht aufgeht), Rest KH.
  function computeGoal(inp) {
    const w = +inp.weight, h = +inp.height, age = +inp.age;
    const bmr = 10 * w + 6.25 * h - 5 * age + (inp.sex === "m" ? 5 : -161);
    const tdee = bmr * activityFactor(inp.activity);
    const adjust = paceAdjust(inp.mode, inp.pace);
    // Untergrenze geschlechtsabhaengig: die gaengigen Empfehlungen liegen bei 1200 kcal
    // (weiblich) bzw. 1500 kcal (maennlich). Ein pauschales Minimum von 1000 lag
    // darunter und haette bei kleinen Personen mit starkem Defizit gegriffen.
    // Sie greift auf dem Ruhetag, also dem niedrigsten Tag der Woche.
    const floor = inp.sex === "m" ? 1500 : 1200;
    const kcal = Math.max(floor, Math.round(tdee + adjust));
    const bmi = Math.round(w / ((h / 100) * (h / 100)) * 10) / 10;
    // Protein NICHT am tatsaechlichen Gewicht bemessen: bei starkem Uebergewicht
    // ergaeben 2 g/kg absurde Mengen (150 kg -> 300 g). Fett speichert kein Eiweiss,
    // deshalb wird ab einem BMI von 27 auf das Gewicht bei BMI 27 gedeckelt.
    // Bewusst 27 und nicht 25: Muskuloese Sportler liegen oft bei BMI 25-27, ohne
    // Fett anzusetzen - die sollen ihre vollen 2 g/kg behalten.
    const refW = bmi > 27 ? 27 * (h / 100) * (h / 100) : w;
    const protein = Math.round(2.0 * refW);
    let fat = Math.round(kcal * 0.25 / 9);
    let carbs = Math.round((kcal - protein * 4 - fat * 9) / 4);
    if (carbs < 0) {
      // Protein + Fett allein sprengen schon das Kalorienziel. Fett zurueckfahren
      // (Protein schuetzt im Defizit die Muskulatur), aber nicht unter das
      // essentielle Minimum von rund 0,5 g/kg.
      const minFat = Math.round(0.5 * refW);
      fat = Math.max(minFat, Math.round((kcal - protein * 4) / 9));
      carbs = Math.max(0, Math.round((kcal - protein * 4 - fat * 9) / 4));
    }
    return { sex: inp.sex, age: age, height: h, weight: w, activity: inp.activity, mode: inp.mode, pace: inp.pace,
             bmr: Math.round(bmr), tdee: Math.round(tdee), adjust: adjust, kcal: kcal,
             protein: protein, carbs: carbs, fat: fat, bmi: bmi,
             // Trainingsplan je Wochentag: { mon: { level, min } }. Leer = keine
             // Trainingstage, dann gilt das Ruhetag-Ziel an allen sieben Tagen.
             training: sanitizeTraining(inp.training),
             updatedAt: Date.now() };
  }
  // Welche Tempo-Stufen es zu einem Ziel gibt. Muss mit den Knoepfen in fillPace()
  // uebereinstimmen – beides aendern oder keines.
  function paceKeys(mode) {
    return mode === "lose" ? ["light", "moderate", "strong"]
         : mode === "gain" ? ["light", "moderate"] : [];
  }

  // Was fehlt noch, in Worten? Eine Quelle fuer beides: den Hinweis im Assistenten
  // und den Text der leeren Ergebniskarte. Reihenfolge wie im Formular, damit der
  // erste Eintrag auch das erste fehlende Feld ist.
  // Nichts ist mehr vorbelegt – Geschlecht, Alltagsbewegung, Ziel und Tempo muessen
  // bewusst gewaehlt werden. Eine Voreinstellung wird sonst leicht ueberlesen und
  // geht als bewusste Angabe in die Rechnung ein, was sie nicht ist.
  function missingCalc(i) {
    const m = [];
    if (i.sex !== "m" && i.sex !== "f") m.push("dein Geschlecht");
    if (!(i.age >= 10 && i.age <= 120)) m.push("dein Alter");
    if (!(i.height >= 100 && i.height <= 250)) m.push("deine Größe");
    if (!(i.weight >= 30 && i.weight <= 400)) m.push("dein Gewicht");
    if (!ACTIVITY.some(a => a.key === i.activity)) m.push("deine Bewegung im Alltag");
    if (["lose", "hold", "gain"].indexOf(i.mode) === -1) m.push("dein Ziel");
    else if (i.mode !== "hold" && paceKeys(i.mode).indexOf(i.pace) === -1) m.push("dein Tempo");
    return m;
  }
  function validCalcInput(i) { return missingCalc(i).length === 0; }
  function renderRechner() {
    const g = state.goal || {};
    // Ohne gespeichertes Ziel ist NICHTS vorbelegt (siehe missingCalc): eine
    // Voreinstellung wird ueberlesen und geht dann als bewusste Angabe in die
    // Rechnung ein. Mit gespeichertem Ziel stehen die eigenen Werte drin.
    let cur = { sex: g.sex || null, mode: g.mode || null, pace: g.pace || null,
                activity: ACTIVITY.some(a => a.key === g.activity) ? g.activity : null,
                training: sanitizeTraining(g.training) };
    // Eine Dauer fuer ALLE Trainingseinheiten (frueher ein Feld je Tag). Aus einem
    // gespeicherten Ziel wird der Wert des ersten Trainingstags uebernommen; standen
    // dort ausnahmsweise verschiedene Dauern, gleichen sie sich beim naechsten Aendern an.
    const tkeysInit = trainingKeys(cur.training);
    cur.trainMin = tkeysInit.length ? cur.training[tkeysInit[0]].min : trainLevel("mod").defMin;
    function applyTrainMin() { trainingKeys(cur.training).forEach(k => { cur.training[k].min = cur.trainMin; }); }
    applyTrainMin();

    // Haken, ueber den updateResult() den Fussknopf des Assistenten nachzieht. Als
    // Variable und nicht als direkter Aufruf, weil updateResult() schon einmal laeuft,
    // bevor der Assistent unten aufgebaut ist – vorher steht hier null und es passiert
    // nichts. Ein direkter Aufruf liefe dort in die zeitliche Totzone der Konstanten.
    let refreshStep = null;
    const segBtn = (grp, v, label, hint) => `<button type="button" data-v="${v}"${cur[grp] === v ? ' class="on"' : ''}>${label}${hint ? `<span class="seg-hint">${hint}</span>` : ""}</button>`;
    view.innerHTML = `
      <div class="section-head"><div class="title">
        <h2>Kalorienrechner</h2>
        <div class="sub">Berechne deinen Tages- und Wochenbedarf – abgestimmt auf Aktivität und Ziel.</div>
      </div></div>
      <nav class="calcbar" aria-label="Schritt wählen">
        ${["Körper", "Alltag", "Training", "Ziel"].map((s, i) =>
          `<button type="button" class="cb-b"><span class="cb-n">${i + 1}</span><span>${s}</span></button>`).join("")}
      </nav>
      <div class="calc">
        <div class="calc-form">
          <div class="calc-group">
            <div class="calc-group-h">Körperdaten</div>
            <div class="field"><label>Geschlecht</label>
              <div class="seg" data-seg="sex">${segBtn("sex", "f", "Weiblich")}${segBtn("sex", "m", "Männlich")}</div>
            </div>
            <div class="row3">
              <div class="field"><label for="c-age">Alter</label><input type="number" id="c-age" min="10" max="120" inputmode="numeric" placeholder="Jahre" value="${esc(g.age != null ? String(g.age) : "")}"></div>
              <div class="field"><label for="c-height">Größe</label><input type="number" id="c-height" min="100" max="250" inputmode="numeric" placeholder="cm" value="${esc(g.height != null ? String(g.height) : "")}"></div>
              <div class="field"><label for="c-weight">Gewicht</label><input type="number" id="c-weight" min="30" max="400" inputmode="numeric" placeholder="kg" value="${esc(g.weight != null ? String(g.weight) : "")}"></div>
            </div>
          </div>
          <div class="calc-group">
            <div class="calc-group-h">Alltag &amp; Ziel</div>
            <div class="field"><label>Bewegung im Alltag <span class="hint">– ohne Sport</span></label>
              <div class="seg seg-col" data-seg="activity">${ACTIVITY.map(a => segBtn("activity", a.key, a.label, a.hint)).join("")}</div>
              <p class="tdays-note">Nur Beruf und Alltag. Dein <b>Training zählt hier nicht mit</b> — das trägst du unten
                als Trainingstage ein und es wird auf den jeweiligen Tag aufgeschlagen.</p>
            </div>
            <div class="field"><label>Ziel</label>
              <div class="seg" data-seg="mode">${segBtn("mode", "lose", "Abnehmen")}${segBtn("mode", "hold", "Halten")}${segBtn("mode", "gain", "Zunehmen")}</div>
            </div>
            <div class="field" id="c-pace-field"><label>Tempo</label>
              <div class="seg" data-seg="pace"></div>
            </div>
          </div>
          <div class="calc-group">
            <div class="calc-group-h">Trainingstage</div>
            <div class="field">
              <label id="c-tdays-lbl">An welchen Tagen trainierst du?</label>
              <div class="tdays" role="group" aria-labelledby="c-tdays-lbl" id="c-tdays">
                ${DAYS.map(d => `<button type="button" data-day="${d.key}" aria-pressed="${cur.training[d.key] ? "true" : "false"}" aria-label="${d.label}">${d.short}</button>`).join("")}
              </div>
              <div id="c-tdetail"></div>
              <p class="tdays-note">Optional. Jede Einheit wird <b>auf ihren Tag aufgeschlagen</b> – nach Intensität,
                Dauer und deinem Gewicht. An Ruhetagen gilt dein Alltagsbedarf. Ohne Auswahl gilt er an allen sieben Tagen.</p>
            </div>
          </div>
        </div>
        <div class="calc-result" id="c-result"></div>
      </div>
      <div class="calcnav">
        <div class="cn-row">
          <button type="button" class="btn ghost" id="c-step-back">Zurück</button>
          <button type="button" class="btn primary" id="c-step-go">Weiter</button>
        </div>
      </div>
      <details class="calc-note">
        <summary>
          <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>
          <span>Rechnerische Richtwerte – keine ärztliche Beratung</span>
          <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
        </summary>
        <div class="cn-body">Alle Werte sind <strong>rechnerische Richtwerte</strong>: Grundumsatz nach der Mifflin-St-Jeor-Formel, Alltagsbedarf über einen Aktivitätsfaktor (PAL), der Mehrbedarf an Trainingstagen über MET-Schätzwerte. Der tatsächliche Verbrauch kann davon deutlich abweichen. Sie ersetzen keine ärztliche oder ernährungsmedizinische Beratung. Bei Erkrankungen, in Schwangerschaft und Stillzeit oder vor einer stärkeren Ernährungsumstellung sprich bitte mit einer Ärztin oder einem Arzt.</div>
      </details>`;

    const paceField = view.querySelector("#c-pace-field");
    const paceSeg = view.querySelector('.seg[data-seg="pace"]');
    function fillPace() {
      // Ohne gewaehltes Ziel gibt es noch kein Tempo – das Feld erscheint erst, wenn
      // die Frage davor beantwortet ist. Bei „Halten" gibt es keins.
      if (!cur.mode || cur.mode === "hold") { paceField.style.display = "none"; return; }
      paceField.style.display = "";
      // Die Schluessel hier muessen zu paceKeys() passen – beides aendern oder keines.
      const opts = cur.mode === "lose"
        ? [["light", "Leicht", "0,25 kg/Wo."], ["moderate", "Moderat", "0,5 kg/Wo."], ["strong", "Stark", "0,75 kg/Wo."]]
        : [["light", "Leicht", "0,25 kg/Wo."], ["moderate", "Moderat", "0,5 kg/Wo."]];
      // Passt das bisherige Tempo nicht zum neuen Ziel, bleibt es leer statt still auf
      // „Moderat" zu springen – auch das waere eine unbemerkte Voreinstellung.
      if (!opts.some(o => o[0] === cur.pace)) cur.pace = null;
      paceSeg.innerHTML = opts.map(o => `<button type="button" data-v="${o[0]}"${cur.pace === o[0] ? ' class="on"' : ''}>${o[1]}<span class="seg-hint">${o[2]}</span></button>`).join("");
    }
    function readInput() {
      return { sex: cur.sex, mode: cur.mode, pace: cur.pace, activity: cur.activity, training: cur.training,
               age: +view.querySelector("#c-age").value, height: +view.querySelector("#c-height").value, weight: +view.querySelector("#c-weight").value };
    }
    // Kurzform der gespeicherten Trainingstage („· Training: Mo, Mi, Fr“).
    function savedDaysTxt() {
      const keys = trainingKeys(state.goal && state.goal.training);
      if (!keys.length) return "";
      return " · Training: " + DAYS.filter(d => keys.indexOf(d.key) !== -1).map(d => d.short).join(", ");
    }
    // Je aktivem Trainingstag eine Zeile: Stufe, Dauer und der daraus folgende Aufschlag.
    // Der Aufschlag steht bewusst direkt daneben — sonst muesste der Nutzer raten, was
    // „Hart, 90 Min." fuer sein Ziel bedeutet.
    function fillTrainDetail() {
      const box = view.querySelector("#c-tdetail");
      const keys = trainingKeys(cur.training);
      if (!keys.length) { box.innerHTML = ""; return; }
      // Eine Dauer fuer alle Einheiten statt eines Feldes je Tag. Wer wirklich an jedem
      // Tag unterschiedlich lange trainiert, verliert etwas Genauigkeit – dafuer stehen
      // hier bei sieben Tagen ein Feld statt sieben. Das Datenmodell bleibt unveraendert
      // (je Tag { level, min }), der Wert wird nur auf alle Tage geschrieben; damit
      // bleiben gespeicherte Ziele und computeGoal() unberuehrt.
      box.innerHTML = `
        <div class="tmin">
          <label for="c-tmin">Dauer je Einheit</label>
          <div class="tmin-f">
            <input type="number" id="c-tmin" value="${cur.trainMin}" min="${TRAIN_MIN_MIN}" max="${TRAIN_MIN_MAX}"
                   step="5" inputmode="numeric"><span>Min.</span>
          </div>
        </div>` + keys.map(k => {
        const d = DAYS.filter(x => x.key === k)[0];
        const e = cur.training[k];
        const lvNow = trainLevel(e.level);
        return `<div class="trow" data-day="${k}">
          <div class="trow-d">${d.short}</div>
          <div class="seg trow-lv" data-tlevel="${k}" role="group" aria-label="Intensität am ${esc(d.label)}">${TRAIN_LEVELS.map(lv =>
            `<button type="button" data-v="${lv.key}"${e.level === lv.key ? ' class="on"' : ''} title="${esc(lv.ex)}">${lv.label}</button>`).join("")}</div>
          <div class="trow-def"><span>${esc(lvNow.ex)}</span></div>
        </div>`;
      }).join("");
    }
    // Der Assistent laeuft nur auf dem Handy – erkannt daran, dass .calc dort
    // tatsaechlich waagerecht scrollt. Als Funktionsdeklaration, damit updateResult
    // sie auch beim ersten Durchlauf schon aufrufen kann.
    function wizardActive() {
      const c = view.querySelector(".calc");
      return !!c && c.scrollWidth > c.clientWidth + 10;
    }

    function updateResult() {
      const res = view.querySelector("#c-result");
      const inp = readInput();
      // Ganz vorn, nicht am Ende: unten steht ein frueher return fuer den Fall
      // unvollstaendiger Eingaben – und genau dann muss der Fussknopf gesperrt werden.
      if (refreshStep) refreshStep();
      // Im Assistenten wurde das Ziel mit „Berechnen" schon gespeichert. Geht man
      // danach zurueck und aendert etwas, zieht es still mit – sonst liefe man nach
      // einer Korrektur mit einem veralteten Ziel weiter, ohne Hinweis darauf. Vor dem
      // ersten Speichern passiert nichts: wer nur herumprobiert, legt sich kein Ziel an.
      // Am Rechner bleibt es beim ausdruecklichen Knopf – dort ist die Ergebnisspalte
      // eine Vorschau zum Vergleichen, die nicht ungefragt Fakten schaffen soll.
      if (state.goal && validCalcInput(inp) && wizardActive()) {
        state.goal = computeGoal(inp);
        save();
      }
      const fehlt = missingCalc(inp);
      if (fehlt.length) {
        // Benennt das Fehlende statt allgemein „trag etwas ein" – seit nichts mehr
        // vorbelegt ist, koennen es auch Auswahlfelder sein, nicht nur die Zahlen.
        res.innerHTML = `<div class="calc-empty">Für deinen Tages- und Wochenbedarf fehlt noch:<br><b>${esc(fehlt.join(", "))}</b>.</div>`;
        return;
      }
      const r = computeGoal(inp);
      const adjStr = r.adjust === 0 ? "±0 kcal" : (r.adjust > 0 ? "+ " : "− ") + nfmt(Math.abs(r.adjust)) + " kcal";
      // Trainingstage-Vorschau. Zeigt jeden Tag einzeln statt eines Sammelwerts: die Tage
      // unterscheiden sich jetzt untereinander, „der Trainingstag" gibt es nicht mehr.
      const tKeys = trainingKeys(r.training);
      const rest = { kcal: r.kcal, carbs: r.carbs, protein: r.protein, fat: r.fat };
      const weekKcal = weekKcalOf(r);
      const trainPreview = tKeys.length ? `
        <div class="rest-macros">
          <div class="rm-h">${ICON_DUMBBELL}<span>An Trainingstagen</span></div>
          ${tKeys.map(k => {
            const d = DAYS.filter(x => x.key === k)[0];
            const e = r.training[k];
            const t = trainFromRest(rest, trainKcal(e.level, e.min, r.weight));
            return `<div class="tprev">
              <div class="tprev-d">${d.short}<span>${esc(trainLevel(e.level).label)} · ${e.min} Min.</span></div>
              <div class="tprev-v"><b>${nfmt(t.kcal)}</b> kcal<span>${nfmt(t.carbs)} g KH</span></div>
            </div>`;
          }).join("")}
          <div class="tdays-note" style="margin-bottom:0">Oben steht dein <b>Ruhetag</b> (${nfmt(r.kcal)} kcal).
            Eiweiß und Fett bleiben an allen Tagen gleich – die zusätzliche Energie kommt als
            Kohlenhydrate dazu, weil das Training genau die leert.</div>
        </div>` : "";
      res.innerHTML = `
        <div class="calc-goal-tag">${MODE_LABEL[r.mode] || "Ziel"}</div>
        <div class="calc-kcal">${nfmt(r.kcal)} <span class="u">kcal / ${tKeys.length ? "Ruhetag" : "Tag"}</span></div>
        <div class="breakdown">
          <div class="bd-row"><span>Grundumsatz</span><span>${nfmt(r.bmr)} kcal</span></div>
          <div class="bd-row"><span>Alltag &amp; Beruf</span><span>+ ${nfmt(r.tdee - r.bmr)} kcal</span></div>
          <div class="bd-row bd-mid"><span>Erhaltungsbedarf</span><span>${nfmt(r.tdee)} kcal</span></div>
          <div class="bd-row"><span>Ziel-Anpassung</span><span>${adjStr}</span></div>
        </div>
        <!-- "je Ruhetag" waere hier irrefuehrend: nur Kohlenhydrate aendern sich am
             Trainingstag (siehe rest-macros-Hinweis unten), Protein und Fett gelten
             an ALLEN Tagen gleich. Der Zusatz "je Ruhetag" steht deshalb nur bei der
             kcal-Zahl oben, wo er stimmt - hier nur, wenn es gar keine Trainingstage
             gibt und der Zusatz unstrittig fuer alle drei Makros gilt. -->
        <div class="macros-h">Makros${tKeys.length ? "" : ` <span>· je Tag</span>`}</div>
        <div class="macros">
          <div class="macro t-prot"><div class="mv">${nfmt(r.protein)} g</div><div class="ml">Protein</div></div>
          <div class="macro t-carb"><div class="mv">${nfmt(r.carbs)} g</div><div class="ml">Kohlenhydr.</div></div>
          <div class="macro t-fat"><div class="mv">${nfmt(r.fat)} g</div><div class="ml">Fett</div></div>
        </div>
        ${trainPreview}
        <div class="calc-meta"><span>Woche <b>${nfmt(weekKcal)} kcal</b></span><span>BMI <b>${String(r.bmi).replace(".", ",")}</b></span></div>
        <button class="btn primary" id="c-save">Als mein Ziel speichern</button>
        ${state.goal ? `<div class="calc-saved"><span>Gespeichertes Ziel: ${nfmt(state.goal.kcal)} kcal / ${trainingKeys(state.goal.training).length ? "Ruhetag" : "Tag"}${savedDaysTxt()}</span>
          <button class="btn ghost sm" id="c-del">Ziel zurücksetzen</button></div>` : ""}`;
      res.querySelector("#c-save").addEventListener("click", () => {
        state.goal = computeGoal(readInput());
        save();
        toast("Dein Ziel wurde gespeichert");
        updateResult();
      });
      const del = res.querySelector("#c-del");
      if (del) del.addEventListener("click", resetCalc);
    }

    // Nur die Einfachauswahl-Segmente des Formulars. Die Stufen-Segmente der Trainings-
    // zeilen tragen bewusst kein data-seg und haengen an ihrem eigenen Handler unten —
    // sie werden dynamisch neu erzeugt und wuerden hier sonst cur[undefined] setzen.
    view.querySelectorAll(".seg[data-seg]").forEach(seg => {
      seg.addEventListener("click", e => {
        const b = e.target.closest("button[data-v]"); if (!b) return;
        seg.querySelectorAll("button").forEach(x => x.classList.remove("on"));
        b.classList.add("on");
        cur[seg.dataset.seg] = b.dataset.v;
        if (seg.dataset.seg === "mode") fillPace();
        updateResult();
      });
    });
    // Trainingstage an/aus: Mehrfachauswahl, deshalb aria-pressed statt der .on-Logik.
    // Ein neu aktivierter Tag bekommt die Standardstufe („Moderat", 60 Min.), damit sofort
    // ein sinnvoller Wert dasteht und niemand erst drei Felder ausfuellen muss.
    view.querySelector("#c-tdays").addEventListener("click", e => {
      const b = e.target.closest("button[data-day]"); if (!b) return;
      const key = b.dataset.day;
      const on = !cur.training[key];
      if (on) cur.training[key] = { level: "mod", min: cur.trainMin };
      else delete cur.training[key];
      b.setAttribute("aria-pressed", on ? "true" : "false");
      fillTrainDetail();
      updateResult();
    });
    // Delegation, weil die Zeilen bei jeder Aenderung neu gebaut werden.
    const tdetail = view.querySelector("#c-tdetail");
    tdetail.addEventListener("click", e => {
      const b = e.target.closest(".trow-lv button[data-v]"); if (!b) return;
      const key = b.closest("[data-tlevel]").dataset.tlevel;
      if (!cur.training[key]) return;
      // Die Dauer haengt nicht mehr an der Stufe – sie gilt einmal fuer alle Einheiten.
      cur.training[key].level = b.dataset.v;
      fillTrainDetail();
      updateResult();
    });
    tdetail.addEventListener("input", e => {
      if (!e.target.closest("#c-tmin")) return;
      // Beim Tippen NICHT klemmen — sonst springt eine halb eingetippte „9" sofort auf 10
      // und man kann 90 gar nicht eintippen. Geklemmt wird beim Verlassen und in
      // sanitizeTraining, das ohnehin jeden Wert vor dem Speichern durchlaeuft.
      const v = Math.round(+e.target.value);
      if (isFinite(v) && v > 0) { cur.trainMin = v; applyTrainMin(); updateResult(); }
    });
    tdetail.addEventListener("change", e => {
      if (!e.target.closest("#c-tmin")) return;
      cur.training = sanitizeTraining(cur.training);
      // Nach dem Klemmen den gemeinsamen Wert aus dem Modell zurueckholen, damit Feld
      // und Daten nicht auseinanderlaufen (z. B. bei einer eingetippten 5).
      const ks = trainingKeys(cur.training);
      if (ks.length) cur.trainMin = cur.training[ks[0]].min;
      fillTrainDetail();
      updateResult();
    });
    // Die frueheren kcal-Zellen je Zeile sind entfallen (der Aufschlag steht im
    // Ergebnis), damit auch das gezielte Nachziehen dieser Zellen beim Tippen.
    ["c-age", "c-height", "c-weight"].forEach(id => view.querySelector("#" + id).addEventListener("input", updateResult));
    fillPace();
    fillTrainDetail();
    updateResult();

    // ---------- Assistent (nur Handy) ----------
    // Vier Karten: Koerperdaten, Alltag & Ziel, Trainingstage, Ergebnis. Der Weg ist
    // fest – gewischt wird nicht (siehe .calc { overflow: hidden }), weiter geht es nur
    // ueber den Fussknopf und nur, wenn der aktuelle Schritt vollstaendig ist. Zurueck
    // ist dagegen immer erlaubt, ebenso das Antippen bereits erreichter Schritte in der
    // Leiste: rueckwaerts laesst sich nichts kaputt machen.
    syncStickyOffsets(); // der Fussknopf klebt ueber der unteren Reiterleiste
    resetCarousels(); // Streifen des vorigen Tab-Besuchs sind gerade weggeworfen worden
    const calcEl = view.querySelector(".calc");
    const calcBar = view.querySelector(".calcbar");
    const goBtn = view.querySelector("#c-step-go");
    const backBtn = view.querySelector("#c-step-back");
    const stepPanels = Array.prototype.slice.call(view.querySelectorAll(".calc-group"))
      .concat([view.querySelector("#c-result")]);
    const LAST = stepPanels.length - 1;
    // Bis hierher darf zurueck- und wieder vorgesprungen werden. Mit gespeichertem Ziel
    // sind alle Schritte schon einmal durchlaufen worden.
    let maxStep = state.goal ? LAST : 0;

    // Was fehlt in Schritt i? Die Zuordnung folgt den Karten: Geschlecht und die drei
    // Zahlen stehen in Koerperdaten, Bewegung/Ziel/Tempo in Alltag & Ziel. Die
    // Trainingstage sind freiwillig und kommen deshalb hier nicht vor.
    const FELD_SCHRITT = {
      "dein Geschlecht": 0, "dein Alter": 0, "deine Größe": 0, "dein Gewicht": 0,
      "deine Bewegung im Alltag": 1, "dein Ziel": 1, "dein Tempo": 1,
    };
    function fehltIn(i) { return missingCalc(readInput()).filter(f => FELD_SCHRITT[f] === i); }

    // Was blockiert den Fussknopf auf Karte i? Auf den Eingabekarten nur deren eigene
    // Felder. Ab der Trainingskarte wird gerechnet, dort zaehlt alles – auch Angaben
    // aus frueheren Karten, falls jemand zurueckging und etwas geleert hat.
    function fehltFuer(i) {
      if (i === LAST && state.goal) return []; // dort steht „Ziel zuruecksetzen"
      return i >= 2 ? missingCalc(readInput()) : fehltIn(i);
    }

    // Sagt, was fehlt, und fuehrt hin. Nur zu melden, etwas sei unvollstaendig, liesse
    // jemanden suchen – bei den Zahlenfeldern springt deshalb der Fokus mit.
    function nag(fehlt) {
      if (!fehlt.length) return;
      toast("Wähle noch " + fehlt.join(" und "));
      const ziele = { "dein Alter": "#c-age", "deine Größe": "#c-height", "dein Gewicht": "#c-weight" };
      const sel = ziele[fehlt[0]];
      const feld = sel && view.querySelector(sel);
      if (feld) feld.focus();
    }

    function setStepBtn(i) {
      maxStep = Math.max(maxStep, i);
      Array.prototype.forEach.call(calcBar.children, (b, n) => {
        b.classList.toggle("done", n < i && !fehltIn(n).length);
        b.disabled = n > maxStep;
      });
      // Zurueck erst ab der zweiten Karte – auf der ersten gaebe es kein Ziel dafuer.
      backBtn.style.display = i > 0 ? "" : "none";

      if (i < 2) { goBtn.textContent = "Weiter"; goBtn.className = "btn primary"; }
      else if (i === 2) { goBtn.textContent = "Berechnen"; goBtn.className = "btn primary"; }
      // Auf der Ergebniskarte haengt die Beschriftung daran, ob schon etwas gespeichert
      // ist: ohne gespeichertes Ziel gaebe es nichts zurueckzusetzen.
      else if (state.goal) { goBtn.textContent = "Ziel zurücksetzen"; goBtn.className = "btn ghost"; }
      else { goBtn.textContent = "Berechnen"; goBtn.className = "btn primary"; }

      // ERST NACH den Beschriftungen: die setzen className komplett neu und wuerden
      // eine vorher gesetzte Klasse wieder abraeumen. (Genau so ist es passiert.)
      // Sieht gesperrt aus, bleibt aber anklickbar (siehe .btn.is-off) – erst der Klick
      // sagt, was fehlt. Ein echtes disabled wuerde den Klick und damit die Erklaerung
      // schlucken; aria-disabled sagt Sprachausgaben den Zustand trotzdem an.
      const sperren = fehltFuer(i).length > 0;
      goBtn.classList.toggle("is-off", sperren);
      goBtn.setAttribute("aria-disabled", sperren ? "true" : "false");
    }

    const calcCar = initCarousel(calcEl, calcBar, stepPanels, setStepBtn);
    function gehe(i) { if (calcCar) { calcCar.go(i); setStepBtn(i); } }

    backBtn.addEventListener("click", () => {
      const i = calcCar ? calcCar.index() : 0;
      if (i > 0) gehe(i - 1);
    });

    goBtn.addEventListener("click", () => {
      const i = calcCar ? calcCar.index() : 0;
      if (i === LAST && state.goal) { resetCalc(); return; }
      // Fehlt etwas, sagt der Klick es und fuehrt zu der Karte, auf der es fehlt.
      // Das ersetzt den frueheren Dauerhinweis ueber dem Knopf.
      const fehlt = fehltFuer(i);
      if (fehlt.length) {
        const ziel = FELD_SCHRITT[fehlt[0]];
        if (ziel !== i) gehe(ziel);
        nag(fehlt);
        return;
      }
      if (i < 2) { gehe(i + 1); return; }
      // „Berechnen": hier ist alles vollstaendig – die Pruefung oben deckt ueber
      // fehltFuer() auch die frueheren Karten ab.
      state.goal = computeGoal(readInput());
      save();
      updateResult();
      maxStep = LAST;
      gehe(LAST);
      toast("Dein Ziel wurde gespeichert");
    });

    // Beim Oeffnen mit gespeichertem Ziel gleich das Ergebnis zeigen – die Eingaben
    // stehen ja schon, und der haeufigste Grund fuer den Rechner ist dann Nachsehen.
    // Ab jetzt zieht jede Eingabe den Fussknopf mit – und die Hoehe des Streifens.
    // Die Hoehe ausdruecklich hier und nicht nur ueber den ResizeObserver: der meldet
    // erst im naechsten Bild, und eine Karte, die einen Moment lang abgeschnitten ist,
    // faellt sofort auf. Der Beobachter bleibt als Netz fuer alles, was nicht durch
    // updateResult() laeuft.
    refreshStep = () => {
      setStepBtn(calcCar ? calcCar.index() : 0);
      if (calcCar) calcCar.fit();
    };

    if (calcCar && state.goal && calcEl.scrollWidth > calcEl.clientWidth + 10) {
      gehe(LAST);
    } else {
      setStepBtn(0);
    }

  }

  // Setzt den Kalorienrechner vollstaendig zurueck: gespeichertes Ziel UND alle
  // Eingaben. Das Leeren des Formulars passiert ueber den Neuaufbau – renderRechner
  // liest jedes Feld aus state.goal, ohne Ziel steht dort ueberall der Ausgangswert.
  // Mit Rueckfrage, anders als frueher beim blossen Loeschen des Ziels: damals blieben
  // die Eingaben stehen und ein Klick stellte alles wieder her, jetzt sind sie weg.
  function resetCalc() {

  // Aktuelle Kalenderwoche + Datumsbereich, z. B. "Woche 29 · 13.–19. Juli"
  function weekLabel(offsetWeeks) {
    const MON = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];
    const now = new Date();
    if (offsetWeeks) now.setDate(now.getDate() + offsetWeeks * 7);
    const dow = now.getDay();                              // 0=So … 6=Sa
    const mon = new Date(now); mon.setHours(0, 0, 0, 0);
    mon.setDate(now.getDate() + (dow === 0 ? -6 : 1 - dow)); // Montag dieser Woche
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    // ISO-Kalenderwoche über den Donnerstag der Woche
    const thu = new Date(Date.UTC(mon.getFullYear(), mon.getMonth(), mon.getDate() + 3));
    const firstThu = new Date(Date.UTC(thu.getUTCFullYear(), 0, 4));
    firstThu.setUTCDate(firstThu.getUTCDate() - ((firstThu.getUTCDay() + 6) % 7) + 3);
    const week = 1 + Math.round((thu - firstThu) / 6048e5);  // 6048e5 ms = 1 Woche
    const range = mon.getMonth() === sun.getMonth()
      ? `${mon.getDate()}.–${sun.getDate()}. ${MON[sun.getMonth()]}`
      : `${mon.getDate()}. ${MON[mon.getMonth()]} – ${sun.getDate()}. ${MON[sun.getMonth()]}`;
    return `Woche ${week} · ${range}`;
  }

  // Intro-Hero über dem Wochenplan (nur im eingeloggten Bereich)
  // Der Begruessungstext steht nur, solange die Woche noch leer ist — da hilft er beim

  // Ziel-Uebersicht; dann bleibt nur die Wochenangabe stehen. Kein Zaehler noetig: der
  // Fuellstand des Plans sagt schon, ob jemand neu hier ist.
  function appHeroHtml(filled) {
    const wk = `<span class="eyebrow">${weekLabel(state.viewWeek === "next" ? 1 : 0)}</span>`;
    if (filled > 0) return `<div class="app-hero compact">${wk}</div>`;
    return `<div class="app-hero">

      <p class="hero-sub">Sieben Tage im Blick, jede Mahlzeit mit Kalorien und Makros. Gebaut fürs Training – und fürs Abnehmen.</p>

  // Alles, was dieses Geraet ueber den Nutzer lokal gespeichert hat, entfernen –
  // gemeinsame Endstrecke fuer beide Loesch-Wege (Cloud-Konto und lokales Profil).
  function wipeLocalData() {

  // Konto vollstaendig loeschen (Cloud-Konten, Art. 17 DSGVO / Datenschutz Ziffer 10).
  // Loescht zusaetzlich alle bekannten Teilen-Links, damit kein Snapshot verwaist zurueckbleibt.
  function deleteAccountFlow() {
    const user = (window.CloudAuth && window.CloudAuth.current) ? window.CloudAuth.current() : null;
    const pid = user && user.providerData[0] ? user.providerData[0].providerId : null;
    const isPw = pid === "password";
    const n = (state.shares || []).length;
    const node = el(`<div class="modal" role="dialog" aria-modal="true" aria-label="Konto löschen">
      <div class="modal-head"><h3>Konto endgültig löschen?</h3><button class="btn ghost sm" data-close>✕</button></div>
      <div class="modal-body">
        <p style="margin:0 0 12px">Dein Konto, dein Wochenplan, deine Meals und dein gespeichertes Ziel werden unwiderruflich gelöscht${n ? ` – ebenso ${n} geteilte${n === 1 ? "r" : ""} Wochenplan-Link${n === 1 ? "" : "e"}` : ""}. Das kann nicht rückgängig gemacht werden.</p>
        ${isPw
          ? `<div class="field"><label for="del-pw">Passwort zur Bestätigung</label><input type="password" id="del-pw" autocomplete="current-password" placeholder="Dein Passwort"></div>`
          : `<p class="share-hint" style="margin:0">Zur Bestätigung öffnet sich gleich noch einmal das Anmeldefenster.</p>`}
        <p class="auth-err" id="del-err" role="alert"></p>
      </div>
      <div class="modal-foot"><button class="btn ghost" data-close>Abbrechen</button><button class="btn danger" data-confirm>Konto löschen</button></div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    const btn = node.querySelector("[data-confirm]");
    const err = node.querySelector("#del-err");
    btn.addEventListener("click", async () => {
      const pw = isPw ? node.querySelector("#del-pw").value : null;
      if (isPw && !pw) { err.textContent = "Bitte gib dein Passwort ein."; return; }
      err.textContent = "";
      btn.disabled = true; btn.textContent = "Wird gelöscht …";
      try {
        await window.CloudAuth.deleteAccount({ password: pw, shareIds: state.shares || [] });
        closeModal();
        stopCloudSync();
        wipeLocalData();
        toast("Konto und Daten wurden gelöscht");
        // Neu laden statt nur weiterzurendern: wipeLocalData() leert nur den
        // localStorage, nicht das im Speicher gehaltene state-Objekt (Rezepte, Plan,
        // Ziel) - ohne Reload wuerde ein direkt danach neu registriertes Konto genau
        // diese stehengebliebenen Daten wieder hochsynchronisieren, als waeren sie neu.
        setTimeout(() => location.reload(), 900);
      } catch (e) {
        if (e && e.dataAlreadyDeleted) {
          // Firestore-Daten sind schon weg, nur das Loeschen des Login-Zugangs selbst
          // ist fehlgeschlagen. Sauber abmelden statt einen Zwischenzustand zu zeigen -
          // ein erneuter Versuch nach dem Wieder-Anmelden schliesst die Loeschung ab.
          closeModal();
          stopCloudSync();
          wipeLocalData();
          try { window.CloudAuth.logout(); } catch (er) {}
          toast("Deine Daten wurden gelöscht. Bitte melde dich einmal neu an und wiederhole „Konto löschen“, um auch den Zugang zu entfernen.");
          setTimeout(() => location.reload(), 900);
          return;
        }
        err.textContent = cloudErrMsg(e);
        btn.disabled = false; btn.textContent = "Konto löschen";
      }
    });
    openModal(node);
  }

  function sharePayload() {
    // Nur die Meals mitschicken, die im Wochenplan eingeplant sind (keine Beispiele/ungenutzten).
    const ids = planRecipeIds();
    const recipes = state.recipes.filter(r => ids.has(r.id));
    // uid mitschreiben: nur so laesst sich ein geteilter Snapshot spaeter dem Konto
    // zuordnen und auf Verlangen loeschen (Art. 17 DSGVO). Die Firestore-Regel
    // erlaubt Loeschen ausschliesslich dem Urheber.
    return { app: "wochenkueche", v: 1, uid: syncUid || "", by: profile ? profile.name : "", when: Date.now(), plan: state.plan, recipes: recipes };
  }
  // Der Link ist der einzige Schutz des geteilten Plans, also muss die ID unerratbar sein.
  // Math.random() ist dafuer ungeeignet (nicht kryptografisch) und ein Zeitstempel erst recht.
  // 16 Zeichen aus einem 32er-Alphabet = 80 Bit; 32 teilt 256 glatt, daher kein Modulo-Bias.
  function shareId() {
    const abc = "abcdefghijkmnpqrstuvwxyz23456789"; // ohne l/o/0/1 (verwechselbar)
    const c = window.crypto || window.msCrypto;
    const a = new Uint8Array(16);
    c.getRandomValues(a);
    let s = "";
    for (let i = 0; i < a.length; i++) s += abc[a[i] % abc.length];
    return s;
  }
  function copyToClipboard(text, okMsg) {

    else { try { const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); toast(okMsg || "Kopiert"); } catch (e) { toast("Kopieren nicht möglich"); } }
  }
  function planText() {

        const names = state.plan[d.key][m.key].map(rid => { const r = getRecipe(rid); return r ? r.name : null; }).filter(Boolean);
        return names.length ? m.label + ": " + names.join(", ") : null;
      }).filter(Boolean);
      return d.label + ": " + (parts.length ? parts.join(", ") : "–");
    }).join("\n");
  }

  // ----- PDF selbst erzeugen (kein window.print, sandbox-sicher) -----
  const WINANSI = { "ä":"344","ö":"366","ü":"374","Ä":"304","Ö":"326","Ü":"334","ß":"337","·":"267","–":"226","—":"227","…":"205","é":"351","è":"350","ê":"352","á":"341","à":"340","â":"342","ç":"347","ñ":"361","€":"200","°":"260","„":"204","“":"223","”":"224","‘":"221","’":"222" };
  function pdfEsc(str) {
    let out = "";
    for (const ch of String(str)) {
      const code = ch.codePointAt(0);
      if (ch === "\\") out += "\\\\";
      else if (ch === "(") out += "\\(";
      else if (ch === ")") out += "\\)";
      else if (code >= 32 && code < 127) out += ch;
      else if (WINANSI[ch]) out += "\\" + WINANSI[ch];
      else out += "?";
    }
    return out;
  }
  function trunc(s, n) { s = String(s); return s.length > n ? s.slice(0, n - 1) + "…" : s; }
  function planPdfString() {
    const L = 56, R = 539;
    const dateStr = new Date().toLocaleDateString("de-DE", { day: "numeric", month: "long", year: "numeric" });
    const name = profile ? profile.name : "";
    let cs = "0.208 0.439 0.290 RG 2 w " + L + " 752 m " + R + " 752 l S\nBT\n";
    cs += "0 0 0 rg /F2 24 Tf 1 0 0 1 " + L + " 786 Tm (" + pdfEsc("Wochenplan") + ") Tj\n";
    cs += "0.4 0.4 0.4 rg /F1 11 Tf 1 0 0 1 " + L + " 764 Tm (" + pdfEsc((name ? name + "   ·   " : "") + dateStr) + ") Tj\n";
    cs += "0 0 0 rg\n";
    let y = 722;
    DAYS.forEach(d => {
      cs += "/F2 13 Tf 1 0 0 1 " + L + " " + y + " Tm (" + pdfEsc(d.label) + ") Tj\n";
      MEALS.forEach((m, i) => {
        const names = state.plan[d.key][m.key].map(rid => { const r = getRecipe(rid); return r ? r.name : null; }).filter(Boolean);
        const yy = y - 17 - i * 15;
        cs += "/F1 11 Tf 1 0 0 1 74 " + yy + " Tm (" + pdfEsc(m.label + ":") + ") Tj\n";
        cs += (names.length ? "0 0 0" : "0.66 0.66 0.66") + " rg /F1 11 Tf 1 0 0 1 172 " + yy + " Tm (" + pdfEsc(names.length ? trunc(names.join(", "), 52) : "–") + ") Tj\n0 0 0 rg\n";
      });
      y -= 74;
    });
    cs += "0.6 0.6 0.6 rg /F1 9 Tf 1 0 0 1 " + L + " 44 Tm (" + pdfEsc("Erstellt mit Paddy’s Mealplan") + ") Tj\nET\n";

    const objs = [];
    objs.push("<< /Type /Catalog /Pages 2 0 R >>");
    objs.push("<< /Type /Pages /Kids [3 0 R] /Count 1 >>");
    objs.push("<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 5 0 R /F2 6 0 R >> >> /Contents 4 0 R >>");
    objs.push("<< /Length " + cs.length + " >>\nstream\n" + cs + "endstream");
    objs.push("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>");
    objs.push("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>");
    let pdf = "%PDF-1.4\n";
    const offsets = [];
    objs.forEach((o, i) => { offsets.push(pdf.length); pdf += (i + 1) + " 0 obj\n" + o + "\nendobj\n"; });
    const xref = pdf.length;
    pdf += "xref\n0 " + (objs.length + 1) + "\n0000000000 65535 f \n";
    offsets.forEach(off => { pdf += String(off).padStart(10, "0") + " 00000 n \n"; });
    pdf += "trailer\n<< /Size " + (objs.length + 1) + " /Root 1 0 R >>\nstartxref\n" + xref + "\n%%EOF";
    return pdf;
  }
  function downloadPdf() {
    try {
      const pdf = planPdfString();
      const bytes = new Uint8Array(pdf.length);
      for (let i = 0; i < pdf.length; i++) bytes[i] = pdf.charCodeAt(i) & 0xff;
      const blob = new Blob([bytes], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);
      const who = (profile ? profile.name : "plan").replace(/[^\wäöüßÄÖÜ-]+/g, "_");
      const a = document.createElement("a"); a.href = url; a.download = "wochenplan-" + who + ".pdf"; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
      toast("PDF gespeichert");
    } catch (e) { toast("PDF konnte nicht erstellt werden"); }
  }

            <button class="btn primary" id="mk-link" style="width:100%;justify-content:center">Teilen-Link erstellen</button>

            btn.disabled = true; btn.textContent = "Erstelle Link …"; note.className = "share-mini"; note.textContent = "";
            const id = shareId();
            window.CloudShare.publish(id, payload).then(() => {
              // ID merken, damit "Konto löschen" den Snapshot spaeter wiederfindet.
              if (!(state.shares || []).includes(id)) { state.shares = (state.shares || []).concat(id); save(); }
              createdUrl = location.origin + location.pathname + "?s=" + id; paint();
            })
              .catch(() => { btn.disabled = false; btn.textContent = "Teilen-Link erstellen"; note.className = "share-mini warn"; note.textContent = "Link konnte nicht erstellt werden. Bist du online und angemeldet?"; });
          });
        }
      } else if (mode === "pdf") {
        segBody.innerHTML = `
          <p class="share-hint">Erzeuge aus deiner Woche ein <b>PDF</b> und verschick es per E-Mail – so teilst du deinen fertigen Plan.</p>
          <button class="btn primary" id="pdf-btn" style="width:100%;justify-content:center">Wochenplan als PDF speichern</button>
          <p class="share-mini">Lädt eine PDF-Datei mit deinem kompletten Wochenplan herunter.</p>
          <span class="share-sub" style="display:block;margin-top:18px">Per E-Mail senden</span>
          <div class="field"><input type="email" class="share-link" id="mail-to" placeholder="empfaenger@beispiel.de (optional)"></div>
          <div class="share-actions">
            <button class="btn primary" id="mail-copy">E-Mail-Text kopieren</button>
            <a class="btn" id="mail-open" href="#" target="_blank" rel="noopener">Mail-App öffnen</a>
          </div>
          <p class="share-mini">Am zuverlässigsten: <b>Text kopieren</b> und in deine Mail einfügen. „Mail-App öffnen" startet dein Mail-Programm in einem neuen Tab (klappt je nach Umgebung nicht immer). Die zuvor gespeicherte PDF hängst du in der Mail an.</p>`;
        segBody.querySelector("#pdf-btn").addEventListener("click", downloadPdf);
        const mailTo = segBody.querySelector("#mail-to");
        const mailOpen = segBody.querySelector("#mail-open");
        const updateMailHref = () => { mailOpen.href = buildMailto(mailTo.value.trim()); };
        mailTo.addEventListener("input", updateMailHref);
        updateMailHref();
        segBody.querySelector("#mail-copy").addEventListener("click", () => copyToClipboard(emailText(mailTo.value.trim()), "E-Mail-Text kopiert"));
      }
    }
    segBtns.forEach(b => b.addEventListener("click", () => { mode = b.dataset.seg; paint(); }));
    paint();
    openModal(node);
  }

  function applySharedData(data, takePlan) {
    if (!data || !Array.isArray(data.recipes)) { toast("Geteilter Plan nicht lesbar"); return; }
    const idMap = {};
    let added = 0;
    data.recipes.forEach(ir => {
      if (!ir || !ir.name) return;
      const existing = state.recipes.find(r => r.name.trim().toLowerCase() === ir.name.trim().toLowerCase());
      if (existing) { idMap[ir.id] = existing.id; return; }
      const nid = uid();
      idMap[ir.id] = nid;
      // image bewusst durch safeImage(): der Snapshot stammt von einer fremden Person,
      // und nur hier kaeme ein manipulierter Wert ungeprueft in den eigenen Bestand.
      state.recipes.push({ id: nid, name: ir.name, category: ir.category || "Gericht", nutrition: (ir.nutrition && typeof ir.nutrition === "object") ? ir.nutrition : null, ingredients: Array.isArray(ir.ingredients) ? ir.ingredients.map(sanitizeIng).filter(Boolean) : [], steps: ir.steps || "", image: safeImage(ir.image) });
      added++;
    });
    if (takePlan && data.plan) {
      const np = makeEmptyPlan();
      DAYS.forEach(d => MEALS.forEach(m => {
        const raw = data.plan[d.key] && data.plan[d.key][m.key];
        np[d.key][m.key] = asIdList(raw).map(v => idMap[v]).filter(Boolean);
      }));
      state.plans[activeWeekKey()] = np;   // in die gerade angezeigte Woche importieren
      state.plan = np;
    }
    save(); closeModal();
    state.tab = "plan"; render();
    toast("Importiert" + (data.by ? " von " + data.by : "") + ": " + added + " neue Meal" + (added === 1 ? "" : "s"));
  }

  // ---------- Boot ----------
  boot();
})();
</script>

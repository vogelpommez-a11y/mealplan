  @media (prefers-color-scheme: dark) {
    :root {
      --logo: var(--logoD);
      --bg: #15170F;
      --surface: #1D1F17;
      --surface-2: #262920;
      --text: #ECEDE3;
      --text-muted: #9BA192;
      --border: #33372C;
      --border-strong: #414636;

      --accent: #74BA8B;
      --accent-strong: #8ECBA1;
      --accent-contrast: #14170F;

      --danger: #E08072;

      --fr: #E0A94A;
      --mi: #58B49E;
      --ab: #AC93E0;

      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"] {
    --logo: var(--logoL);
    --bg: #FBFAF6; --surface: #FFFFFF; --surface-2: #F3F1E9;
    --text: #242A22; --text-muted: #6E7469; --border: #E6E4DA; --border-strong: #D6D3C6;
    --accent: #35704A; --accent-strong: #2A5A3B; --accent-contrast: #FFFFFF; --danger: #B0473A;
    --fr: #A96E12; --mi: #2E7D6B; --ab: #6E5A9E;
    --shadow: 0 1px 2px rgba(30,32,26,.05), 0 6px 20px rgba(30,32,26,.06);
  }
  :root[data-theme="dark"] {
    --logo: var(--logoD);
    --bg: #15170F; --surface: #1D1F17; --surface-2: #262920;
    --text: #ECEDE3; --text-muted: #9BA192; --border: #33372C; --border-strong: #414636;
    --accent: #74BA8B; --accent-strong: #8ECBA1; --accent-contrast: #14170F; --danger: #E08072;
    --fr: #E0A94A; --mi: #58B49E; --ab: #AC93E0;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; }
  body { margin: 0; }

  .app {
    font-family: var(--font-body);
    color: var(--text);
    background:
      radial-gradient(1200px 400px at 10% -8%, color-mix(in srgb, var(--accent) 9%, transparent), transparent),
      var(--bg);
    min-height: 100vh;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 20px; }

  /* ---------- Header ---------- */
  header.site {
    position: sticky; top: 0; z-index: 30;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .head-inner { display: flex; align-items: center; gap: 18px; padding: 14px 0; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 12px; margin-right: auto; }
  .brand .mark {
    width: 44px; height: 44px; border-radius: 50%; flex: none;
    overflow: hidden;
    background: center / cover no-repeat var(--logo);
  }
  .brand h1 {
    font-family: var(--font-display); font-weight: 600;
    font-size: 22px; margin: 0; letter-spacing: .2px;
  }
  .brand p { margin: 0; font-size: 12.5px; color: var(--text-muted); }

  .tabs { display: flex; gap: 4px; background: var(--surface-2); padding: 4px; border-radius: 999px; border: 1px solid var(--border); }
  .tab {
    font: inherit; font-size: 14px; font-weight: 550;
    border: 0; background: transparent; color: var(--text-muted);
    padding: 8px 18px; border-radius: 999px; cursor: pointer;
    display: flex; align-items: center; gap: 7px; transition: color .15s, background .15s;
  }
  .tab:hover { color: var(--text); }
  .tab[aria-selected="true"] { background: var(--surface); color: var(--accent-strong); box-shadow: var(--shadow); }
  .tab .count { font-size: 11.5px; background: color-mix(in srgb, var(--accent) 16%, var(--surface)); color: var(--accent-strong); border-radius: 999px; padding: 1px 7px; font-variant-numeric: tabular-nums; }

  main { padding: 28px 0 80px; }

  /* ---------- Section head ---------- */
  .section-head { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
  .section-head .title { margin-right: auto; }
  .section-head h2 { font-family: var(--font-display); font-weight: 600; font-size: 27px; margin: 0 0 2px; letter-spacing: .2px; }
  .section-head .sub { color: var(--text-muted); font-size: 14px; }

  /* ---------- Buttons ---------- */
  .btn {
    font: inherit; font-size: 14px; font-weight: 550; cursor: pointer;
    border: 1px solid var(--border-strong); background: var(--surface); color: var(--text);
    padding: 9px 15px; border-radius: var(--radius-sm);
    display: inline-flex; align-items: center; gap: 8px; transition: border-color .15s, background .15s, transform .05s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-contrast); }
  .btn.primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--text-muted); }
  .btn.ghost:hover { color: var(--text); background: var(--surface-2); border-color: transparent; }
  .btn.danger { color: var(--danger); border-color: transparent; }
  .btn.danger:hover { background: color-mix(in srgb, var(--danger) 12%, var(--surface)); border-color: transparent; }
  .btn svg { width: 16px; height: 16px; }
  .btn.sm { padding: 6px 11px; font-size: 13px; }

  /* ---------- Week grid ---------- */
  .week { display: grid; grid-template-columns: repeat(auto-fill, minmax(232px, 1fr)); gap: 16px; }
  .day {
    position: relative;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column;
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  .day::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; z-index: 1;
    background: linear-gradient(90deg, var(--accent), #2fb6ac 55%, #4aa8e0);
  }
  .day:hover {
    transform: translateY(-3px);
    border-color: color-mix(in srgb, var(--accent) 42%, var(--border));
    box-shadow: 0 12px 30px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  .day.today { border-color: color-mix(in srgb, var(--accent) 55%, var(--border)); box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 40%, transparent), var(--shadow); }
  .day.today::before { height: 5px; }
  .day > .day-head {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 15px 15px 12px;
    background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 12%, var(--surface)), var(--surface));
    border-bottom: 1px solid var(--border);
  }
  .day-head .dname { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: .2px; }
  .day-head .dtag {
    font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
    color: var(--accent-contrast); background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    padding: 3px 10px; border-radius: 999px; box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 38%, transparent);
  }
  .day.today .dtag { background: linear-gradient(135deg, #2fb6ac, var(--accent)); }
  .day-head .dnum { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .slots { display: flex; flex-direction: column; gap: 2px; padding: 8px; flex: 1; }

  /* Tages-Nährwerte (Fuß der Tageskarte) */
  .day-nut { display: flex; align-items: baseline; flex-wrap: wrap; gap: 4px 12px; padding: 9px 14px 12px; border-top: 1px dashed var(--border); background: color-mix(in srgb, var(--surface-2) 55%, var(--surface)); }
  .day-nut .kcal { font-weight: 700; font-size: 13px; color: var(--accent); font-variant-numeric: tabular-nums; }
  .day-nut .kcal small { font-weight: 600; color: var(--text-muted); }
  .day-nut .macros { display: flex; gap: 9px; margin-left: auto; font-size: 11.5px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .day-nut .macros b { font-weight: 650; color: var(--text); }
  .day-nut .m::before { content: ""; display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; vertical-align: baseline; background: var(--mc, var(--accent)); }
  .m.carb { --mc: #E9A03B; } .m.prot { --mc: #C74B78; } .m.fat { --mc: #4AA8E0; }

  /* Wochen-Gesamtübersicht */
  .week-nut { position: relative; overflow: hidden; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 18px; margin-bottom: 20px; }
  .week-nut::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--accent), #2fb6ac 55%, #4AA8E0); }
  .week-nut .wn-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .week-nut .wn-head h3 { font-family: var(--font-display); font-size: 18px; font-weight: 600; margin: 0; }
  .week-nut .wn-head .wn-sub { color: var(--text-muted); font-size: 12.5px; }
  .wn-tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .wn-tile { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .wn-tile .val { font-family: var(--font-display); font-size: 24px; font-weight: 600; line-height: 1; font-variant-numeric: tabular-nums; }
  .wn-tile .val .u { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-left: 3px; font-family: var(--font-body); }
  .wn-tile .lbl { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .wn-tile .lbl::before { content: ""; width: 9px; height: 9px; border-radius: 50%; background: var(--tc, var(--accent)); }
  .wn-tile.t-kcal { --tc: var(--accent); } .wn-tile.t-kcal .val { color: var(--accent); }
  .wn-tile.t-carb { --tc: #E9A03B; } .wn-tile.t-prot { --tc: #C74B78; } .wn-tile.t-fat { --tc: #4AA8E0; }
  .week-nut .wn-empty { color: var(--text-muted); font-size: 13.5px; margin: 2px 0 0; }
  @media (max-width: 560px) { .wn-tiles { grid-template-columns: repeat(2, 1fr); } }

  /* Nährwerte in der Rezept-Detailansicht */
  .nutfacts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .nutfacts .nf { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 11px; }
  .nutfacts .nf .v { font-weight: 700; font-size: 16px; font-variant-numeric: tabular-nums; }
  .nutfacts .nf .v .u { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-left: 2px; }
  .nutfacts .nf .k { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .nutfacts .nf .k::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--tc, var(--accent)); }
  .nutfacts .nf.t-kcal { --tc: var(--accent); } .nutfacts .nf.t-carb { --tc: #E9A03B; } .nutfacts .nf.t-prot { --tc: #C74B78; } .nutfacts .nf.t-fat { --tc: #4AA8E0; }
  @media (max-width: 560px) { .nutfacts { grid-template-columns: repeat(2, 1fr); } }

  .slot { position: relative; border-radius: var(--radius-sm); padding: 8px 10px 9px 12px; transition: background .12s; }
  .slot::before { content:""; position:absolute; left:5px; top:10px; bottom:10px; width:3px; border-radius:3px; background: var(--slot-c); opacity:.9; }
  .slot[data-meal="fr"] { --slot-c: var(--fr); }
  .slot[data-meal="mi"] { --slot-c: var(--mi); }
  .slot[data-meal="ab"] { --slot-c: var(--ab); }
  .slot .mlabel { font-size: 11px; font-weight: 650; letter-spacing: .04em; text-transform: uppercase; color: var(--slot-c); margin-bottom: 3px; }
  .slot .add {
    font: inherit; font-size: 13px; width: 100%; text-align: left; cursor: pointer;
    border: 1px dashed var(--border-strong); background: transparent; color: var(--text-muted);
    padding: 7px 10px; border-radius: var(--radius-sm); transition: border-color .12s, color .12s, background .12s;
  }
  .slot .add:hover { border-color: var(--slot-c); color: var(--text); background: color-mix(in srgb, var(--slot-c) 7%, transparent); }
  .slot .add.more { font-size: 12px; padding: 5px 10px; opacity: .8; }
  .slot .filled + .filled, .slot .filled + .add, .slot .add + .filled { margin-top: 4px; }
  .slot .filled {
    display: flex; align-items: flex-start; gap: 8px;
    background: color-mix(in srgb, var(--slot-c) 9%, var(--surface));
    border: 1px solid color-mix(in srgb, var(--slot-c) 24%, var(--surface));
    border-radius: var(--radius-sm); padding: 8px 8px 8px 10px; cursor: grab;
  }
  .slot .filled:active { cursor: grabbing; }
  .slot .filled span.r-thumb { font-size: 19px; line-height: 1; flex: none; margin-top: 1px; }
  .slot .filled img.r-thumb { width: 28px; height: 28px; border-radius: 6px; object-fit: cover; flex: none; margin-top: 1px; }
  .slot .filled .r-name { font-size: 13.5px; font-weight: 550; line-height: 1.3; flex: 1; word-break: break-word; }
  .slot .filled .r-meta { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }
  .slot .filled .x {
    flex: none; border: 0; background: transparent; color: var(--text-muted); cursor: pointer;
    width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center; font-size: 15px; line-height: 1;
  }
  .slot .filled .x:hover { background: color-mix(in srgb, var(--danger) 14%, transparent); color: var(--danger); }
  .slot.dragover { background: color-mix(in srgb, var(--accent) 12%, transparent); outline: 2px dashed var(--accent); outline-offset: -2px; }
  .filled.dragging { opacity: .4; }

  /* ---------- Recipe grid ---------- */
  .recipes { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .rcard {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 0; display: flex; flex-direction: column; overflow: hidden;
  }
  .rimg { position: relative; height: 116px; display: grid; place-items: center; overflow: hidden; }
  .rimg::after { content: ""; position: absolute; inset: 0; background: radial-gradient(130px 66px at 78% 16%, rgba(255,255,255,.30), transparent); pointer-events: none; }
  .rimg.has-photo::after { display: none; }
  .rimg .emoji { font-size: 3.3rem; line-height: 1; filter: drop-shadow(0 3px 6px rgba(0,0,0,.22)); }
  .rphoto { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .rimg.has-photo .cchip { background: rgba(16,18,13,.62); }
  .rimg .cchip { position: absolute; left: 11px; bottom: 10px; z-index: 1; font-size: 11px; font-weight: 650; letter-spacing: .03em; text-transform: uppercase; color: #fff; background: rgba(16,18,13,.5); backdrop-filter: blur(4px); padding: 3px 10px; border-radius: 999px; }
  .rbody { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .rcard .top { display: flex; align-items: flex-start; gap: 10px; }
  .rcard h3 { font-family: var(--font-display); font-size: 18px; font-weight: 600; margin: 0; flex: 1; line-height: 1.25; word-break: break-word; }
  .chip { font-size: 11px; font-weight: 650; letter-spacing: .03em; text-transform: uppercase; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .chip.cat-fr { color: var(--fr); background: color-mix(in srgb, var(--fr) 14%, var(--surface)); }
  .chip.cat-mi { color: var(--mi); background: color-mix(in srgb, var(--mi) 14%, var(--surface)); }
  .chip.cat-ab { color: var(--ab); background: color-mix(in srgb, var(--ab) 14%, var(--surface)); }
  .chip.cat-x { color: var(--accent-strong); background: color-mix(in srgb, var(--accent) 14%, var(--surface)); }
  .rcard .meta { display: flex; gap: 14px; flex-wrap: wrap; color: var(--text-muted); font-size: 12.5px; }
  .rcard .meta span { display: inline-flex; align-items: center; gap: 5px; }
  .rcard .meta svg { width: 14px; height: 14px; opacity: .8; }
  .rcard .ingredients { font-size: 13px; color: var(--text-muted); border-top: 1px dashed var(--border); padding-top: 10px; line-height: 1.5; }
  .rcard .actions { display: flex; gap: 4px; margin-top: auto; padding-top: 4px; }

  /* ---------- Empty state ---------- */
  .empty { text-align: center; padding: 60px 24px; border: 1.5px dashed var(--border-strong); border-radius: var(--radius); color: var(--text-muted); background: var(--surface); }
  .empty .em-ico { width: 52px; height: 52px; margin: 0 auto 14px; color: var(--accent); opacity: .85; }
  .empty h3 { font-family: var(--font-display); color: var(--text); font-size: 20px; margin: 0 0 6px; }
  .empty p { margin: 0 auto 18px; max-width: 42ch; }

  /* ---------- Modal ---------- */
  .overlay { position: fixed; inset: 0; z-index: 60; background: color-mix(in srgb, #0a0c07 55%, transparent); display: grid; place-items: start center; padding: 5vh 16px 16px; overflow-y: auto; color: var(--text); font-family: var(--font-body); }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 24px 70px rgba(0,0,0,.35); width: 100%; max-width: 540px; overflow: hidden; animation: pop .16s ease-out; }
  @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.99);} to { opacity: 1; transform: none; } }
  .modal-head { display: flex; align-items: center; gap: 12px; padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .modal-head h3 { font-family: var(--font-display); font-size: 19px; margin: 0; flex: 1; }
  .modal-head .kicker { font-size: 11.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
  .modal-body { padding: 18px; }
  .modal-foot { display: flex; gap: 8px; justify-content: flex-end; padding: 14px 18px; border-top: 1px solid var(--border); background: var(--surface-2); flex-wrap: wrap; }

  .field { margin-bottom: 15px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; color: var(--text); letter-spacing: .01em; }
  .field .hint { font-weight: 400; color: var(--text-muted); }
  input[type="text"], input[type="number"], input[type="email"], input[type="password"], input[type="search"], select, textarea {
    font: inherit; font-size: 14px; width: 100%; color: var(--text);
    background: var(--bg); border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
    padding: 9px 11px; transition: border-color .12s, box-shadow .12s;
  }
  textarea { resize: vertical; min-height: 74px; line-height: 1.5; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .imgfield { display: flex; gap: 14px; align-items: center; }
  .imgprev { width: 156px; min-height: 96px; flex: none; border-radius: 10px; border: 1.5px dashed var(--border-strong); background-color: var(--surface-2); background-size: cover; background-position: center; overflow: hidden; display: grid; place-items: center; text-align: center; color: var(--text-muted); cursor: pointer; transition: border-color .12s, background-color .12s; }
  .imgprev.has-img { border-style: solid; border-color: var(--border); }
  .imgprev:hover { border-color: var(--accent); }
  .imgprev.dragover { border-color: var(--accent); background-color: color-mix(in srgb, var(--accent) 13%, var(--surface-2)); }
  .imgprev:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .imgprev-hint { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 11px; line-height: 1.3; padding: 8px; pointer-events: none; }
  .imgprev-hint svg { opacity: .8; }
  .imgprev-hint b { color: var(--text); font-weight: 600; }
  .imgbtns { display: flex; flex-direction: column; gap: 7px; align-items: flex-start; }
  .imgbtns label.btn { cursor: pointer; }

  /* Picker list */
  .picker-search { margin-bottom: 12px; }
  .plist { display: flex; flex-direction: column; gap: 4px; max-height: 46vh; overflow-y: auto; margin: 0 -4px; padding: 0 4px; }
  .pitem { display: flex; align-items: center; gap: 11px; text-align: left; width: 100%; font: inherit; cursor: pointer;
    background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); padding: 9px 11px; color: var(--text); }
  .pitem:hover { background: var(--surface-2); border-color: var(--border); }
  .pitem .pdot { width: 9px; height: 9px; border-radius: 3px; flex: none; }
  .pitem span.pemoji { font-size: 20px; line-height: 1; width: 26px; text-align: center; flex: none; }
  .pitem img.pemoji { width: 38px; height: 28px; border-radius: 5px; object-fit: cover; flex: none; }
  .pitem .pn { font-size: 14px; font-weight: 550; flex: 1; }
  .pitem .pc { font-size: 11.5px; color: var(--text-muted); }
  .pitem.suggest { border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: color-mix(in srgb, var(--accent) 6%, transparent); }

  /* Detail / shopping */
  .detail .dbanner { height: 150px; border-radius: 12px; display: grid; place-items: center; position: relative; margin-bottom: 16px; overflow: hidden; }
  .detail .dbanner::after { content: ""; position: absolute; inset: 0; background: radial-gradient(180px 90px at 80% 14%, rgba(255,255,255,.30), transparent); }
  .detail .dbanner.has-photo::after { display: none; }
  .detail .dbanner .emoji { font-size: 4.6rem; line-height: 1; filter: drop-shadow(0 4px 9px rgba(0,0,0,.26)); z-index: 1; }
  .detail dl { margin: 0; }
  .detail .dsec { margin-top: 14px; }
  .detail .dsec h4 { font-size: 12.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin: 0 0 6px; }
  .detail ul { margin: 0; padding-left: 18px; line-height: 1.6; }
  .detail .steps { white-space: pre-wrap; line-height: 1.6; font-size: 14px; }
  .shop-head { display: flex; align-items: center; gap: 13px; }
  .shop-head .cart { flex: none; width: 42px; height: 42px; border-radius: 12px; display: grid; place-items: center; color: var(--accent-contrast); background: linear-gradient(150deg, var(--accent), var(--accent-strong)); box-shadow: var(--shadow); }
  .shop-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
  .shop-progress .bar { flex: 1; height: 7px; border-radius: 99px; background: var(--surface-2); overflow: hidden; }
  .shop-progress .bar > i { display: block; height: 100%; width: 0; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent-strong)); transition: width .3s ease; }
  .shop-progress .ptext { font-size: 12.5px; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .shop-progress .toggle-all { font: inherit; font-size: 12.5px; font-weight: 550; color: var(--accent-strong); background: none; border: 0; cursor: pointer; padding: 3px 7px; border-radius: 6px; white-space: nowrap; }
  .shop-progress .toggle-all:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); }
  .shop-list { display: flex; flex-direction: column; gap: 7px; max-height: 46vh; overflow-y: auto; margin: 0 -6px; padding: 2px 6px; }
  .shop-item { display: flex; align-items: center; gap: 13px; padding: 11px 13px; border-radius: 11px; background: var(--surface-2); border: 1px solid var(--border); cursor: pointer; transition: border-color .12s, background .12s; }
  .shop-item:hover { border-color: var(--border-strong); }
  .shop-item:has(.shop-check:checked) { background: color-mix(in srgb, var(--accent) 6%, var(--surface)); border-color: color-mix(in srgb, var(--accent) 24%, var(--border)); }
  .shop-check { position: absolute; opacity: 0; width: 1px; height: 1px; }
  .shop-item .box { flex: none; width: 23px; height: 23px; border-radius: 7px; border: 2px solid var(--border-strong); display: grid; place-items: center; color: #fff; transition: background .15s, border-color .15s; }
  .shop-item .box svg { width: 13px; height: 13px; opacity: 0; transform: scale(.5); transition: opacity .12s, transform .15s; }
  .shop-check:checked + .box { background: var(--accent); border-color: var(--accent); }
  .shop-check:checked + .box svg { opacity: 1; transform: none; }
  .shop-check:focus-visible + .box { outline: 2px solid var(--accent); outline-offset: 2px; }
  .shop-item .lbl { flex: 1; font-size: 14.5px; line-height: 1.35; word-break: break-word; }
  .shop-check:checked ~ .lbl { text-decoration: line-through; color: var(--text-muted); }
  .shop-item .qty { flex: none; font-size: 11.5px; font-weight: 650; color: var(--accent-strong); background: color-mix(in srgb, var(--accent) 14%, var(--surface)); border-radius: 99px; padding: 3px 9px; font-variant-numeric: tabular-nums; }
  .shop-check:checked ~ .qty { opacity: .5; }
  .shop-empty { text-align: center; padding: 20px 10px 4px; color: var(--text-muted); }
  .shop-empty .ic { width: 46px; height: 46px; margin: 0 auto 12px; color: var(--accent); opacity: .85; }
  .shop-empty p { margin: 0 auto; max-width: 34ch; line-height: 1.5; }

  /* Toast */
  #toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px); z-index: 90;
    background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 999px; font-size: 14px; font-weight: 550;
    box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .visually-hidden { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); border:0; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  /* ---------- Profil (Login) & Teilen ---------- */
  .app.authing .tabs, .app.authing #profile-slot { display: none; }
  .profile { position: relative; }
  .profile-btn { display: flex; align-items: center; gap: 9px; font: inherit; cursor: pointer; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px 4px 4px; color: var(--text); transition: border-color .12s; }
  .profile-btn:hover { border-color: var(--accent); }
  .avatar { width: 30px; height: 30px; border-radius: 50%; flex: none; display: grid; place-items: center; font-size: 12.5px; font-weight: 700; color: var(--accent-contrast); background: linear-gradient(150deg, var(--accent), var(--accent-strong)); }
  .profile-btn .pname { font-size: 13.5px; font-weight: 550; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .profile-btn .caret { color: var(--text-muted); }
  .menu { position: absolute; right: 0; top: calc(100% + 8px); z-index: 40; min-width: 216px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 18px 50px rgba(0,0,0,.28); padding: 6px; animation: pop .14s ease-out; }
  .menu .mhead { padding: 8px 11px 11px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
  .menu .mhead .mn { font-weight: 650; font-size: 14px; }
  .menu .mhead .me { font-size: 12px; color: var(--text-muted); word-break: break-all; }
  .menu button { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; font: inherit; font-size: 13.5px; cursor: pointer; background: transparent; border: 0; border-radius: 8px; padding: 9px 11px; color: var(--text); }
  .menu button:hover { background: var(--surface-2); }
  .menu button svg { width: 16px; height: 16px; color: var(--text-muted); flex: none; }
  .menu button.danger, .menu button.danger svg { color: var(--danger); }
  .menu hr { border: 0; border-top: 1px solid var(--border); margin: 6px 4px; }
  .sync-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: var(--border-strong); flex: none; }
  .sync-dot.ok { background: var(--accent); }
  .sync-dot.busy { background: var(--fr); animation: syncpulse 1s ease-in-out infinite; }
  .sync-dot.err { background: var(--danger); }
  .sync-dot.off { background: var(--border-strong); }
  .av-wrap { position: relative; display: inline-flex; }
  .sync-dot.chip { position: absolute; right: -1px; bottom: -1px; width: 11px; height: 11px; border: 2px solid var(--surface); box-sizing: border-box; }
  .menu .msync { display: flex; align-items: center; gap: 7px; margin-top: 9px; font-size: 12px; color: var(--text-muted); }
  @keyframes syncpulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }

<!-- ============================================================
     Cloud-Anmeldung (Firebase) — lädt als ES-Modul.
     Solange die Config unten Platzhalter enthält ODER das CDN
     blockiert ist (z. B. im Claude-Artifact), fällt die App
     automatisch auf den lokalen Login zurück – es bricht nichts.
     ============================================================ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, createUserWithEmailAndPassword,
    signInWithEmailAndPassword, sendEmailVerification, signOut,
    updateProfile, sendPasswordResetEmail, setPersistence,
    browserLocalPersistence, GoogleAuthProvider, OAuthProvider, signInWithPopup
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc, onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  /* ▼▼▼ HIER die Werte aus der Firebase-Konsole eintragen ▼▼▼
     (Projekt-Einstellungen → Deine Apps → Web-App → SDK-Konfiguration) */
  const firebaseConfig = {
    apiKey: "AIzaSyAr6kx7lByKgoUrnNJsRD06PKSs3ivplLE",
    authDomain: "paddys-mealplan.firebaseapp.com",
    projectId: "paddys-mealplan",
    storageBucket: "paddys-mealplan.firebasestorage.app",
    messagingSenderId: "1045496121634",
    appId: "1:1045496121634:web:c43390145fe7b52789bd7b"
  };
  /* ▲▲▲ ------------------------------------------------------- ▲▲▲ */

  const CONFIGURED = firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf("DEIN_") !== 0;
  window.CloudAuth = { configured: !!CONFIGURED };

  if (!CONFIGURED) {
    window.dispatchEvent(new CustomEvent("cloudauth:disabled"));
  } else {
    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      auth.languageCode = "de";
      setPersistence(auth, browserLocalPersistence).catch(function () {});

      Object.assign(window.CloudAuth, {
        registerEmail: async function (name, email, pw) {
          const cred = await createUserWithEmailAndPassword(auth, email, pw);
          if (name) { try { await updateProfile(cred.user, { displayName: name }); } catch (e) {} }
          await sendEmailVerification(cred.user);
          return cred.user;
        },
        loginEmail: function (email, pw) { return signInWithEmailAndPassword(auth, email, pw); },
        loginGoogle: function () {
          const p = new GoogleAuthProvider(); p.setCustomParameters({ prompt: "select_account" });
          return signInWithPopup(auth, p);
        },
        loginApple: function () {
          const p = new OAuthProvider("apple.com"); p.addScope("email"); p.addScope("name");
          return signInWithPopup(auth, p);
        },
        resendVerification: function () {
          return auth.currentUser ? sendEmailVerification(auth.currentUser) : Promise.reject(new Error("no-user"));
        },
        resetPassword: function (email) { return sendPasswordResetEmail(auth, email); },
        updateName: function (name) {
          return auth.currentUser ? updateProfile(auth.currentUser, { displayName: name }) : Promise.reject(new Error("no-user"));
        },
        reloadUser: function () {
          return auth.currentUser ? auth.currentUser.reload().then(function () { return auth.currentUser; }) : Promise.resolve(null);
        },
        logout: function () { return signOut(auth); },
        current: function () { return auth.currentUser; }
      });

      // ----- Cloud-Sync (Firestore): pro Nutzer ein Dokument users/{uid} -----
      const db = getFirestore(app);
      window.CloudSync = {
        enabled: true,
        load: function (uid) {
          return getDoc(doc(db, "users", uid)).then(function (snap) {
            return snap.exists() ? snap.data() : null;
          });
        },
        save: function (uid, data) {
          return setDoc(doc(db, "users", uid), data);
        },
        watch: function (uid, cb) {
          return onSnapshot(doc(db, "users", uid), function (snap) {
            if (snap.exists()) cb(snap.data(), snap.metadata.hasPendingWrites);
          }, function () {});
        }
      };

      // ----- Teilen per Cloud-Link: öffentlich lesbare Snapshots in shared/{id} -----
      window.CloudShare = {
        enabled: true,
        publish: function (id, data) { return setDoc(doc(db, "shared", id), data); },
        fetch: function (id) {
          return getDoc(doc(db, "shared", id)).then(function (s) { return s.exists() ? s.data() : null; });
        }
      };

      onAuthStateChanged(auth, function (user) {
        if (typeof window.__onCloudAuth === "function") window.__onCloudAuth(user);
      });
    } catch (e) {
      window.dispatchEvent(new CustomEvent("cloudauth:disabled"));
    }
  }
</script>

<script>
(function () {
  "use strict";

  const STORE_KEY = "wochenkueche_v1";

  const DAYS = [
    { key: "mon", label: "Montag",     short: "Mo" },
    { key: "tue", label: "Dienstag",   short: "Di" },
    { key: "wed", label: "Mittwoch",   short: "Mi" },
    { key: "thu", label: "Donnerstag", short: "Do" },
    { key: "fri", label: "Freitag",    short: "Fr" },
    { key: "sat", label: "Samstag",    short: "Sa" },
    { key: "sun", label: "Sonntag",    short: "So" },
  ];
  const MEALS = [
    { key: "fr", label: "Frühstück"  },
    { key: "mi", label: "Mittagessen" },
    { key: "ab", label: "Abendessen"  },
  ];
  const CATEGORIES = ["Frühstück", "Mittagessen", "Abendessen", "Snack", "Dessert", "Beilage"];
  const CAT_CLASS = { "Frühstück": "cat-fr", "Mittagessen": "cat-mi", "Abendessen": "cat-ab" };
  const CAT_TO_MEAL = { "Frühstück": "fr", "Mittagessen": "mi", "Abendessen": "ab" };

  const SEED = [
    { name: "Haferbrei mit Beeren", category: "Frühstück", portions: 1, time: 10,
      nutrition: { kcal: 320, carbs: 52, protein: 12, fat: 7 },
      ingredients: ["50 g Haferflocken", "200 ml Milch", "1 Handvoll Beeren", "1 TL Honig", "Prise Zimt"],
      steps: "Haferflocken mit Milch aufkochen und 3 Min. quellen lassen. In eine Schale geben, mit Beeren, Honig und Zimt toppen." },
    { name: "Spaghetti Bolognese", category: "Abendessen", portions: 4, time: 40,
      nutrition: { kcal: 620, carbs: 72, protein: 34, fat: 20 },
      ingredients: ["500 g Spaghetti", "400 g Hackfleisch", "1 Zwiebel", "2 Knoblauchzehen", "1 Dose gehackte Tomaten", "2 EL Tomatenmark", "Olivenöl", "Salz, Pfeffer, Oregano"],
      steps: "Zwiebel und Knoblauch anschwitzen, Hackfleisch krümelig anbraten. Tomatenmark kurz mitrösten, Tomaten zugeben und 25 Min. köcheln. Spaghetti bissfest kochen und servieren." },
    { name: "Gemüsecurry mit Reis", category: "Mittagessen", portions: 3, time: 30,
      nutrition: { kcal: 480, carbs: 68, protein: 9, fat: 17 },
      ingredients: ["250 g Basmatireis", "1 Dose Kokosmilch", "2 EL rote Currypaste", "1 Paprika", "1 Zucchini", "1 Karotte", "Sojasauce", "frischer Koriander"],
      steps: "Reis kochen. Gemüse in Streifen schneiden. Currypaste kurz anbraten, Kokosmilch angießen, Gemüse zugeben und 12 Min. köcheln. Mit Sojasauce abschmecken, mit Reis und Koriander servieren." },
    { name: "Griechischer Salat", category: "Beilage", portions: 2, time: 15,
      nutrition: { kcal: 290, carbs: 12, protein: 9, fat: 23 },
      ingredients: ["3 Tomaten", "1 Gurke", "1 rote Zwiebel", "150 g Feta", "Oliven", "Olivenöl", "Oregano"],
      steps: "Tomaten, Gurke und Zwiebel grob schneiden. Mit Oliven mischen, Feta darüber bröseln, mit Olivenöl und Oregano beträufeln." },
  ];

  // ---------- State ----------
  let state = load();

  function makeEmptyPlan() {
    const p = {};
    DAYS.forEach(d => { p[d.key] = { fr: [], mi: [], ab: [] }; });
    return p;
  }
  // Ein Slot ist eine Liste von Rezept-IDs. Alte Pläne speicherten eine
  // einzelne ID (oder null) – asIdList normalisiert beide Formen.
  function asIdList(v) { return Array.isArray(v) ? v.slice() : (v ? [v] : []); }

  function load() {
    let data = null;
    try { data = JSON.parse(localStorage.getItem(STORE_KEY)); } catch (e) { data = null; }
    if (!data || !Array.isArray(data.recipes)) {
      const recipes = SEED.map(r => Object.assign({ id: uid() }, r));
      return { recipes, plan: makeEmptyPlan(), tab: "plan" };
    }
    // repair plan shape
    const plan = makeEmptyPlan();
    if (data.plan) {
      DAYS.forEach(d => {
        MEALS.forEach(m => {
          const raw = data.plan[d.key] && data.plan[d.key][m.key];
          plan[d.key][m.key] = asIdList(raw).filter(id => data.recipes.some(r => r.id === id));
        });
      });
    }
    return { recipes: data.recipes, plan, tab: data.tab === "recipes" ? "recipes" : "plan" };
  }

  function save() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify({ recipes: state.recipes, plan: state.plan, tab: state.tab })); }
    catch (e) { /* storage full / unavailable */ }
    scheduleCloudPush();
  }

  // ---------- Cloud-Sync (Firestore) ----------
  let syncUid = null, syncUnsub = null, pushTimer = null, lastPushedJSON = null;

  function normalizePlan(rawPlan, recipes) {
    const plan = makeEmptyPlan();
    const ids = new Set((recipes || []).map(r => r.id));
    if (rawPlan) DAYS.forEach(d => MEALS.forEach(m => {
      const raw = rawPlan[d.key] && rawPlan[d.key][m.key];
      plan[d.key][m.key] = asIdList(raw).filter(id => ids.has(id));
    }));
    return plan;
  }
  // Vergleichs-Signatur ohne "tab" – ein reiner Tab-Wechsel soll keinen Cloud-Write auslösen.
  function dataJSON(d) { return JSON.stringify({ recipes: (d && d.recipes) || [], plan: (d && d.plan) || {} }); }

  function scheduleCloudPush() {
    if (!syncUid) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(pushNow, 800);
  }
  async function pushNow() {
    if (!syncUid || !window.CloudSync) return;
    const d = { recipes: state.recipes, plan: state.plan, tab: state.tab };
    const j = dataJSON(d);
    if (j === lastPushedJSON) return;
    lastPushedJSON = j;
    setSyncStatus("saving");
    try {
      await window.CloudSync.save(syncUid, Object.assign({}, d, { updatedAt: Date.now() }));
      setSyncStatus("synced");
    } catch (e) {
      lastPushedJSON = null; setSyncStatus("offline"); /* z. B. offline – nächster Save versucht es erneut */
    }
  }
  function onRemote(data, pending) {
    if (pending || !data || !Array.isArray(data.recipes)) return; // eigener Schreibvorgang → ignorieren
    const j = dataJSON(data);
    if (j === dataJSON(state) || j === lastPushedJSON) return; // nichts Neues
    state.recipes = data.recipes;
    state.plan = normalizePlan(data.plan, data.recipes);
    lastPushedJSON = j;
    save(); render();
    setSyncStatus("synced");
    toast("Von anderem Gerät aktualisiert");
  }
  async function startCloudSync(uid) {
    if (!window.CloudSync || !window.CloudSync.enabled) return;
    if (syncUid === uid) return;                 // läuft schon
    stopCloudSync();
    syncUid = uid;
    setSyncStatus("connecting");
    try {
      const remote = await window.CloudSync.load(uid);
      if (remote && Array.isArray(remote.recipes) && remote.recipes.length) {
        // Rezepte zusammenführen (Cloud + lokale, die es dort noch nicht gibt)
        const map = {};
        remote.recipes.forEach(r => { if (r && r.id) map[r.id] = r; });
        state.recipes.forEach(r => { if (r && r.id && !map[r.id]) map[r.id] = r; });
        state.recipes = Object.values(map);
        state.plan = normalizePlan(remote.plan, state.recipes);
        if (remote.tab === "recipes" || remote.tab === "plan") state.tab = remote.tab;
        save(); render();
      }
      lastPushedJSON = null;
      await pushNow();                            // zusammengeführten Stand als Baseline hochschreiben
      syncUnsub = window.CloudSync.watch(uid, onRemote);
      setSyncStatus("synced");
      toast("Mit deiner Cloud verbunden");
    } catch (e) { setSyncStatus("offline"); /* offline: App läuft lokal weiter, Sync greift beim nächsten Mal */ }
  }
  function stopCloudSync() {
    if (syncUnsub) { try { syncUnsub(); } catch (e) {} syncUnsub = null; }
    clearTimeout(pushTimer);
    syncUid = null; lastPushedJSON = null;
    setSyncStatus("off");
  }

  // Sync-Status für die Anzeige: "off" | "connecting" | "synced" | "saving" | "offline"
  let syncStatus = "off";
  function syncStatusInfo() {
    return ({
      connecting: { cls: "busy", label: "Verbinde …" },
      synced:     { cls: "ok",   label: "Synchronisiert" },
      saving:     { cls: "busy", label: "Wird gespeichert …" },
      offline:    { cls: "err",  label: "Offline – lokal gespeichert" },
      off:        { cls: "off",  label: "Nicht verbunden" }
    })[syncStatus] || { cls: "off", label: "Nicht verbunden" };
  }
  function setSyncStatus(s) {
    if (syncStatus === s) return;
    syncStatus = s;
    updateSyncUI();
  }
  function updateSyncUI() {
    const info = syncStatusInfo();
    document.querySelectorAll("[data-sync-dot]").forEach(elm => {
      elm.classList.remove("ok", "busy", "err", "off");
      elm.classList.add(info.cls);
      elm.title = "Cloud-Sync: " + info.label;
    });
    document.querySelectorAll("[data-sync-label]").forEach(elm => { elm.textContent = info.label; });
  }

  function uid() { return "r" + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3); }
  function getRecipe(id) { return state.recipes.find(r => r.id === id) || null; }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c])); }

  // ---------- Auto image (emoji + gradient), self-contained ----------

  const PHOTO_RULES = [

    [["kuchen","torte","cake","brownie","muffin","cupcake","dessert","schokolade","tiramisu","gebäck","gebaeck"], "cake"],
  ];
  function photoFor(r) {
    if (r.image) return r.image;                    // eigenes Foto hat Vorrang
    const n = (r.name || "").toLowerCase();
    for (const [keys, key] of PHOTO_RULES) { if (keys.some(k => n.includes(k))) return PHOTOS[key] || null; }
    return null;
  }
  function cardImageHtml(r) {
    const cat = esc(r.category || "Gericht");
    const photo = photoFor(r);
    if (photo) return `<div class="rimg has-photo"><img class="rphoto" src="${photo}" alt="${esc(r.name)}" loading="lazy"><span class="cchip">${cat}</span></div>`;
    const v = visualFor(r);
    return `<div class="rimg" style="background:${v.grad}"><span class="emoji" role="img" aria-label="${cat}">${v.emoji}</span><span class="cchip">${cat}</span></div>`;
  }
  function thumbHtml(r, cls) {
    const photo = photoFor(r);
    if (photo) return `<img class="${cls}" src="${photo}" alt="" loading="lazy">`;
    return `<span class="${cls}" aria-hidden="true">${pickEmoji(r)}</span>`;
  }
  // read a file and downscale to <=640px JPEG data URL (keeps localStorage small)
  function readAndDownscale(file, cb) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const maxW = 640, scale = Math.min(1, maxW / img.width);
        const w = Math.max(1, Math.round(img.width * scale)), h = Math.max(1, Math.round(img.height * scale));
        const c = document.createElement("canvas"); c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        try { cb(c.toDataURL("image/jpeg", 0.82)); } catch (err) { cb(null); }
      };
      img.onerror = () => cb(null);
      img.src = e.target.result;
    };
    reader.onerror = () => cb(null);
    reader.readAsDataURL(file);
  }

  // ---------- Rendering ----------
  const view = document.getElementById("view");

  function render() {
    document.getElementById("recipe-count").textContent = state.recipes.length;
    document.querySelectorAll(".tab").forEach(t => t.setAttribute("aria-selected", String(t.dataset.tab === state.tab)));
    if (state.tab === "plan") renderPlan(); else renderRecipes();
    save();
  }

  function planStats() {
    let filled = 0;
    DAYS.forEach(d => MEALS.forEach(m => { if (state.plan[d.key][m.key].length) filled++; }));
    return filled;
  }

  // ---------- Nährwerte ----------
  function nutNum(x) { const n = Number(x); return isFinite(n) && n > 0 ? n : 0; }
  function nutParse(v) { const n = parseFloat(String(v == null ? "" : v).replace(",", ".")); return isFinite(n) && n >= 0 ? n : null; }
  function recipeNut(r) { const n = (r && r.nutrition) || {}; return { kcal: nutNum(n.kcal), carbs: nutNum(n.carbs), protein: nutNum(n.protein), fat: nutNum(n.fat) }; }
  function addNut(a, b) { return { kcal: a.kcal + b.kcal, carbs: a.carbs + b.carbs, protein: a.protein + b.protein, fat: a.fat + b.fat }; }
  function dayNut(dayKey) { let s = { kcal: 0, carbs: 0, protein: 0, fat: 0 }; MEALS.forEach(m => { state.plan[dayKey][m.key].forEach(rid => { const r = getRecipe(rid); if (r) s = addNut(s, recipeNut(r)); }); }); return s; }
  function weekNut() { let s = { kcal: 0, carbs: 0, protein: 0, fat: 0 }; DAYS.forEach(d => { s = addNut(s, dayNut(d.key)); }); return s; }
  function hasNut(s) { return !!(s.kcal || s.carbs || s.protein || s.fat); }
  function nfmt(n) { return Math.round(n).toLocaleString("de-DE"); }

  function dayNutHtml(s) {
    if (!hasNut(s)) return "";
    return `<div class="day-nut">
        <span class="kcal">${nfmt(s.kcal)} <small>kcal</small></span>
        <span class="macros">
          <span class="m carb"><b>${nfmt(s.carbs)}</b>&nbsp;g KH</span>
          <span class="m prot"><b>${nfmt(s.protein)}</b>&nbsp;g Eiw.</span>
          <span class="m fat"><b>${nfmt(s.fat)}</b>&nbsp;g Fett</span>
        </span>
      </div>`;
  }

  function weekNutHtml() {
    const w = weekNut();
    const activeDays = DAYS.filter(d => hasNut(dayNut(d.key))).length;
    const avg = activeDays ? ` · ⌀ ${nfmt(w.kcal / activeDays)} kcal an ${activeDays} Tag${activeDays === 1 ? "" : "en"}` : "";
    const tiles = `
        <div class="wn-tile t-kcal"><div class="val">${nfmt(w.kcal)}<span class="u">kcal</span></div><div class="lbl">Kalorien</div></div>
        <div class="wn-tile t-carb"><div class="val">${nfmt(w.carbs)}<span class="u">g</span></div><div class="lbl">Kohlenhydrate</div></div>
        <div class="wn-tile t-prot"><div class="val">${nfmt(w.protein)}<span class="u">g</span></div><div class="lbl">Proteine</div></div>
        <div class="wn-tile t-fat"><div class="val">${nfmt(w.fat)}<span class="u">g</span></div><div class="lbl">Fett</div></div>`;
    return `<div class="week-nut">
        <div class="wn-head"><h3>Nährwerte der Woche</h3><span class="wn-sub">Summe aller eingeplanten Meals (je Portion)${avg}</span></div>
        ${hasNut(w)
          ? `<div class="wn-tiles">${tiles}</div>`
          : `<p class="wn-empty">Trage bei deinen Meals Nährwerte ein (Kalorien, Kohlenhydrate, Proteine, Fett) – dann erscheint hier die Tages- und Wochenbilanz.</p>`}
      </div>`;
  }

  function nutFactsHtml(r) {
    const n = recipeNut(r);
    if (!hasNut(n)) return "";
    return `<div class="dsec"><h4>Nährwerte <span style="text-transform:none;letter-spacing:0;font-weight:400">· je Portion</span></h4>
        <div class="nutfacts">
          <div class="nf t-kcal"><div class="v">${nfmt(n.kcal)}<span class="u">kcal</span></div><div class="k">Kalorien</div></div>
          <div class="nf t-carb"><div class="v">${nfmt(n.carbs)}<span class="u">g</span></div><div class="k">Kohlenhydrate</div></div>
          <div class="nf t-prot"><div class="v">${nfmt(n.protein)}<span class="u">g</span></div><div class="k">Proteine</div></div>
          <div class="nf t-fat"><div class="v">${nfmt(n.fat)}<span class="u">g</span></div><div class="k">Fett</div></div>
        </div></div>`;
  }

  function renderPlan() {
    const filled = planStats();
    let html = `
      <div class="section-head">
        <div class="title">
          <h2>Dein Wochenplan</h2>
          <div class="sub">${filled} von 21 Mahlzeiten geplant · tippe auf eine Mahlzeit, um ein Meal zu wählen</div>
        </div>
        <button class="btn" data-action="shopping">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 2H2"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg>
          Einkaufsliste
        </button>
        <button class="btn" data-action="share">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg>
          Teilen
        </button>
        <button class="btn ghost" data-action="clear-week">Woche leeren</button>
      </div>
      ${weekNutHtml()}
      <div class="week">`;

    const todayKey = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"][new Date().getDay()];
    DAYS.forEach(d => {
      const isToday = d.key === todayKey;
      html += `<section class="day${isToday ? " today" : ""}"><div class="day-head"><span class="dname">${d.label}</span><span class="dtag">${isToday ? "Heute" : d.short}</span></div><div class="slots">`;
      MEALS.forEach(m => {
        const ids = state.plan[d.key][m.key];
        html += `<div class="slot" data-meal="${m.key}" data-slot="${d.key}:${m.key}">
          <div class="mlabel">${m.label}</div>`;
        let shown = 0;
        ids.forEach((rid, idx) => {
          const r = getRecipe(rid);
          if (!r) return;
          shown++;
          html += `<div class="filled" draggable="true" data-action="view" data-id="${r.id}" data-slot-src="${d.key}:${m.key}:${idx}" title="${esc(r.name)} – ziehen zum Verschieben">
              ${thumbHtml(r, "r-thumb")}
              <div><div class="r-name">${esc(r.name)}</div>${r.time ? `<div class="r-meta">${r.portions ? esc(r.portions)+" Port. · " : ""}${esc(r.time)} Min.</div>` : (r.portions ? `<div class="r-meta">${esc(r.portions)} Port.</div>` : "")}</div>
              <button class="x" data-action="unassign" data-slot-src="${d.key}:${m.key}:${idx}" aria-label="Entfernen" title="Entfernen">✕</button>
            </div>`;
        });
        html += `<button class="add${shown ? " more" : ""}" data-action="pick" data-day="${d.key}" data-meal="${m.key}">+ ${shown ? "Noch ein Meal" : "Meal wählen"}</button>`;
        html += `</div>`;
      });
      html += `</div>${dayNutHtml(dayNut(d.key))}</section>`;
    });

    html += `</div>`;
    view.innerHTML = html;
  }

  function renderRecipes() {
    let html = `
      <div class="section-head">
        <div class="title">
          <h2>Meine Meals</h2>
          <div class="sub">${state.recipes.length} Meal${state.recipes.length === 1 ? "" : "s"} · pflege hier deine Meals ein</div>
        </div>
        <button class="btn primary" data-action="new-recipe">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Neues Meal
        </button>
      </div>`;

    if (state.recipes.length === 0) {
      html += `<div class="empty">
        <svg class="em-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V7l-4-3H5a1 1 0 0 0-1 1Z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
        <h3>Noch keine Meals</h3>
        <p>Lege dein erstes Meal an – danach kannst du es im Wochenplan auf die Tage verteilen.</p>
        <button class="btn primary" data-action="new-recipe">Erstes Meal anlegen</button>
      </div>`;
    } else {
      html += `<div class="recipes">`;
      const sorted = state.recipes.slice().sort((a, b) => a.name.localeCompare(b.name, "de"));
      sorted.forEach(r => {
        const ing = (r.ingredients || []);
        const ingPreview = ing.length ? esc(ing.slice(0, 4).join(" · ")) + (ing.length > 4 ? " …" : "") : "Keine Zutaten hinterlegt";
        html += `<article class="rcard">
          ${cardImageHtml(r)}
          <div class="rbody">
          <div class="top">
            <h3>${esc(r.name)}</h3>
          </div>
          <div class="meta">
            ${r.portions ? `<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><path d="M16 5a3 3 0 0 1 0 6M21 20a6 6 0 0 0-5-5.9"/></svg>${esc(r.portions)} Portion${r.portions == 1 ? "" : "en"}</span>` : ""}
            ${r.time ? `<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>${esc(r.time)} Min.</span>` : ""}
            ${recipeNut(r).kcal ? `<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c1 3 4 4.4 4 8a4 4 0 0 1-8 0c0-1.3.4-2.1 1-3 .3 1 .8 1.6 1.5 1.9C10 8 10.4 5.4 12 3Z"/></svg>${nfmt(recipeNut(r).kcal)} kcal</span>` : ""}
            <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h10"/></svg>${ing.length} Zutat${ing.length === 1 ? "" : "en"}</span>
          </div>
          <div class="ingredients">${ingPreview}</div>
          <div class="actions">
            <button class="btn ghost sm" data-action="view" data-id="${r.id}">Ansehen</button>
            <button class="btn ghost sm" data-action="edit" data-id="${r.id}">Bearbeiten</button>
            <button class="btn danger sm" data-action="delete" data-id="${r.id}" style="margin-left:auto">Löschen</button>
          </div>
          </div>
        </article>`;
      });
      html += `</div>`;
    }
    view.innerHTML = html;
  }

  // ---------- Modal ----------
  const modalRoot = document.getElementById("modal-root");
  function closeModal() { modalRoot.innerHTML = ""; document.removeEventListener("keydown", escClose); }
  function escClose(e) { if (e.key === "Escape") closeModal(); }
  function openModal(node) {
    const overlay = document.createElement("div");
    overlay.className = "overlay";
    overlay.addEventListener("mousedown", e => { if (e.target === overlay) closeModal(); });
    overlay.appendChild(node);
    modalRoot.innerHTML = "";
    modalRoot.appendChild(overlay);
    document.addEventListener("keydown", escClose);
    const focusEl = node.querySelector("input, textarea, select, button");
    if (focusEl) setTimeout(() => focusEl.focus(), 30);
  }
  function el(html) { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstElementChild; }

  // ---------- Recipe form ----------
  function openRecipeForm(id) {
    const r = id ? getRecipe(id) : null;
    let formImage = r ? (r.image || null) : null;
    const opts = CATEGORIES.map(c => `<option value="${c}" ${r && r.category === c ? "selected" : ""}>${c}</option>`).join("");
    const node = el(`<div class="modal detail" role="dialog" aria-modal="true" aria-label="${r ? "Meal bearbeiten" : "Neues Meal"}">
      <div class="modal-head"><h3>${r ? "Meal bearbeiten" : "Neues Meal"}</h3><button class="btn ghost sm" data-close>✕</button></div>
      <div class="modal-body">
        <div class="field">
          <label for="f-name">Name des Meals</label>
          <input type="text" id="f-name" placeholder="z. B. Ofengemüse mit Feta" value="${r ? esc(r.name) : ""}" maxlength="80">
        </div>
        <div class="row2">
          <div class="field"><label for="f-cat">Kategorie</label><select id="f-cat">${opts}</select></div>
          <div class="row2" style="gap:12px">
            <div class="field"><label for="f-port">Portionen</label><input type="number" id="f-port" min="1" max="99" value="${r && r.portions ? esc(r.portions) : ""}" placeholder="2"></div>
            <div class="field"><label for="f-time">Minuten</label><input type="number" id="f-time" min="1" max="999" value="${r && r.time ? esc(r.time) : ""}" placeholder="30"></div>
          </div>
        </div>
        <div class="field">
          <label>Foto <span class="hint">– optional; ziehen, einfügen (Strg/⌘+V) oder wählen. Ohne Bild wird automatisch eins zum Namen gewählt</span></label>
          <div class="imgfield">
            <div class="imgprev" id="f-imgprev" tabindex="0" role="button" aria-label="Bild wählen, hierher ziehen oder einfügen"></div>
            <div class="imgbtns">
              <label class="btn sm" for="f-imgfile">Bild wählen …</label>
              <input type="file" id="f-imgfile" accept="image/*" class="visually-hidden">
              <button type="button" class="btn ghost sm" id="f-imgclear">Zurücksetzen</button>
            </div>
          </div>
        </div>
        <div class="field">
          <label>Nährwerte <span class="hint">– optional, je Portion</span></label>
          <div class="row2" style="gap:12px">
            <div class="row2" style="gap:12px">
              <div class="field"><label for="f-kcal" class="hint">Kalorien (kcal)</label><input type="number" id="f-kcal" min="0" max="99999" step="1" value="${r && r.nutrition && r.nutrition.kcal != null ? esc(r.nutrition.kcal) : ""}" placeholder="520"></div>
              <div class="field"><label for="f-carbs" class="hint">Kohlenhydrate (g)</label><input type="number" id="f-carbs" min="0" max="9999" step="0.1" value="${r && r.nutrition && r.nutrition.carbs != null ? esc(r.nutrition.carbs) : ""}" placeholder="60"></div>
            </div>
            <div class="row2" style="gap:12px">
              <div class="field"><label for="f-protein" class="hint">Proteine (g)</label><input type="number" id="f-protein" min="0" max="9999" step="0.1" value="${r && r.nutrition && r.nutrition.protein != null ? esc(r.nutrition.protein) : ""}" placeholder="30"></div>
              <div class="field"><label for="f-fat" class="hint">Fett (g)</label><input type="number" id="f-fat" min="0" max="9999" step="0.1" value="${r && r.nutrition && r.nutrition.fat != null ? esc(r.nutrition.fat) : ""}" placeholder="18"></div>
            </div>
          </div>
        </div>
        <div class="field">
          <label for="f-ing">Zutaten <span class="hint">– eine pro Zeile</span></label>
          <textarea id="f-ing" placeholder="200 g Mehl&#10;2 Eier&#10;1 Prise Salz">${r && r.ingredients ? esc(r.ingredients.join("\n")) : ""}</textarea>
        </div>
        <div class="field">
          <label for="f-steps">Zubereitung <span class="hint">– optional</span></label>
          <textarea id="f-steps" placeholder="Beschreibe die Schritte …">${r && r.steps ? esc(r.steps) : ""}</textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" data-close>Abbrechen</button>
        <button class="btn primary" data-save>${r ? "Speichern" : "Meal anlegen"}</button>
      </div>
    </div>`);

    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));

    const fileInput = node.querySelector("#f-imgfile");
    const prev = node.querySelector("#f-imgprev");
    function renderImgPreview() {
      if (formImage) {
        prev.classList.add("has-img");
        prev.style.backgroundImage = `url(${formImage})`;
        prev.innerHTML = "";
      } else {
        prev.classList.remove("has-img");
        prev.style.backgroundImage = "none";
        prev.innerHTML = `<span class="imgprev-hint"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4M8 8l4-4 4 4"/><path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg><span><b>Ziehen</b> · <b>Einfügen</b> · <b>Wählen</b></span></span>`;
      }
    }
    function applyImageFile(file) {
      if (!file || !/^image\//.test(file.type)) { toast("Bitte ein Bild verwenden"); return; }
      readAndDownscale(file, dataUrl => { if (dataUrl) { formImage = dataUrl; renderImgPreview(); toast("Bild übernommen"); } else toast("Bild konnte nicht geladen werden"); });
    }
    fileInput.addEventListener("change", () => { const f = fileInput.files && fileInput.files[0]; if (f) applyImageFile(f); });
    node.querySelector("#f-imgclear").addEventListener("click", () => { formImage = null; fileInput.value = ""; renderImgPreview(); });
    // Klick / Tastatur → Dateiauswahl
    prev.addEventListener("click", () => fileInput.click());
    prev.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileInput.click(); } });
    // Drag & Drop einer Bilddatei
    prev.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "copy"; prev.classList.add("dragover"); });
    prev.addEventListener("dragleave", e => { if (!prev.contains(e.relatedTarget)) prev.classList.remove("dragover"); });
    prev.addEventListener("drop", e => {
      e.preventDefault(); prev.classList.remove("dragover");
      const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) applyImageFile(f);
    });
    // Eingefügtes Bild (Strg/⌘+V) – nur echte Bild-Inhalte abfangen, Text bleibt normal
    node.addEventListener("paste", e => {
      const items = (e.clipboardData && e.clipboardData.items) || [];
      for (let i = 0; i < items.length; i++) {
        if (items[i].type && items[i].type.indexOf("image") === 0) {
          const f = items[i].getAsFile();
          if (f) { e.preventDefault(); applyImageFile(f); return; }
        }
      }
    });
    renderImgPreview();

    node.querySelector("[data-save]").addEventListener("click", () => {
      const name = node.querySelector("#f-name").value.trim();
      if (!name) { node.querySelector("#f-name").focus(); node.querySelector("#f-name").style.borderColor = "var(--danger)"; toast("Bitte gib einen Namen ein"); return; }
      const ingredients = node.querySelector("#f-ing").value.split("\n").map(s => s.trim()).filter(Boolean);
      const portions = parseInt(node.querySelector("#f-port").value, 10);
      const time = parseInt(node.querySelector("#f-time").value, 10);
      const nutrition = {
        kcal: nutParse(node.querySelector("#f-kcal").value),
        carbs: nutParse(node.querySelector("#f-carbs").value),
        protein: nutParse(node.querySelector("#f-protein").value),
        fat: nutParse(node.querySelector("#f-fat").value),
      };
      const hasAnyNut = nutrition.kcal != null || nutrition.carbs != null || nutrition.protein != null || nutrition.fat != null;
      const data = {
        name,
        category: node.querySelector("#f-cat").value,
        portions: portions > 0 ? portions : null,
        time: time > 0 ? time : null,
        nutrition: hasAnyNut ? nutrition : null,
        ingredients,
        steps: node.querySelector("#f-steps").value.trim(),
        image: formImage || null,
      };
      if (r) { Object.assign(r, data); toast("Meal gespeichert"); }
      else { state.recipes.push(Object.assign({ id: uid() }, data)); toast("Meal angelegt"); }
      closeModal(); render();
    });
    openModal(node);
  }

  // ---------- Recipe detail ----------
  function openRecipeDetail(id) {
    const r = getRecipe(id); if (!r) return;
    const cls = CAT_CLASS[r.category] || "cat-x";
    const v = visualFor(r);
    const ing = r.ingredients && r.ingredients.length
      ? `<ul>${r.ingredients.map(i => `<li>${esc(i)}</li>`).join("")}</ul>`
      : `<p style="color:var(--text-muted);margin:0">Keine Zutaten hinterlegt.</p>`;
    const node = el(`<div class="modal detail" role="dialog" aria-modal="true" aria-label="${esc(r.name)}">
      <div class="modal-head">
        <div style="flex:1"><div class="kicker">Meal</div><h3 style="margin-top:2px">${esc(r.name)}</h3></div>
        <span class="chip ${cls}">${esc(r.category || "Gericht")}</span>
        <button class="btn ghost sm" data-close>✕</button>
      </div>
      <div class="modal-body">
        ${photoFor(r)
          ? `<div class="dbanner has-photo"><img class="rphoto" src="${photoFor(r)}" alt="${esc(r.name)}"></div>`
          : `<div class="dbanner" style="background:${v.grad}"><span class="emoji" role="img" aria-label="${esc(r.category || "Gericht")}">${v.emoji}</span></div>`}
        <div class="meta" style="display:flex;gap:16px;color:var(--text-muted);font-size:13px">
          ${r.portions ? `<span>🍽 ${esc(r.portions)} Portion${r.portions==1?"":"en"}</span>` : ""}
          ${r.time ? `<span>⏱ ${esc(r.time)} Min.</span>` : ""}
        </div>
        ${nutFactsHtml(r)}
        <div class="dsec"><h4>Zutaten</h4>${ing}</div>
        ${r.steps ? `<div class="dsec"><h4>Zubereitung</h4><div class="steps">${esc(r.steps)}</div></div>` : ""}
      </div>
      <div class="modal-foot">
        <button class="btn danger" data-del>Löschen</button>
        <button class="btn" data-edit>Bearbeiten</button>
        <button class="btn primary" data-close>Schließen</button>
      </div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    node.querySelector("[data-edit]").addEventListener("click", () => { closeModal(); openRecipeForm(r.id); });
    node.querySelector("[data-del]").addEventListener("click", () => { closeModal(); deleteRecipe(r.id); });
    openModal(node);
  }

  // ---------- Picker ----------
  function openPicker(day, meal) {
    const dLabel = DAYS.find(d => d.key === day).label;
    const mLabel = MEALS.find(m => m.key === meal).label;
    if (state.recipes.length === 0) {
      const node = el(`<div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head"><h3>Noch keine Meals</h3><button class="btn ghost sm" data-close>✕</button></div>
        <div class="modal-body"><p style="margin:0;color:var(--text-muted)">Du hast noch keine Meals angelegt. Wechsle in den Reiter <strong>Meals</strong> und leg zuerst ein Meal an.</p></div>
        <div class="modal-foot"><button class="btn ghost" data-close>Abbrechen</button><button class="btn primary" data-go>Zu den Meals</button></div>
      </div>`);
      node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
      node.querySelector("[data-go]").addEventListener("click", () => { closeModal(); state.tab = "recipes"; render(); openRecipeForm(null); });
      openModal(node);
      return;
    }
    const node = el(`<div class="modal" role="dialog" aria-modal="true" aria-label="Meal wählen">
      <div class="modal-head"><div style="flex:1"><div class="kicker">${esc(dLabel)} · ${esc(mLabel)}</div><h3 style="margin-top:2px">Meal wählen</h3></div><button class="btn ghost sm" data-close>✕</button></div>
      <div class="modal-body">
        <div class="picker-search"><input type="text" id="p-search" placeholder="Meal suchen …" autocomplete="off"></div>
        <div class="plist" id="p-list"></div>
      </div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));

    const listEl = node.querySelector("#p-list");
    const searchEl = node.querySelector("#p-search");
    const mealCat = MEALS.find(m => m.key === meal).label;

    function paint(q) {
      const query = (q || "").toLowerCase().trim();
      let list = state.recipes.slice().sort((a, b) => a.name.localeCompare(b.name, "de"));
      if (query) list = list.filter(r => r.name.toLowerCase().includes(query) || (r.category || "").toLowerCase().includes(query));
      // suggest matching category first
      list.sort((a, b) => {
        const sa = a.category === mealCat ? 0 : 1, sb = b.category === mealCat ? 0 : 1;
        return sa - sb;
      });
      if (list.length === 0) { listEl.innerHTML = `<p style="color:var(--text-muted);padding:8px 4px;margin:0">Kein Meal gefunden.</p>`; return; }
      listEl.innerHTML = list.map(r => {
        const suggest = r.category === mealCat ? " suggest" : "";
        return `<button class="pitem${suggest}" data-assign="${r.id}">
          ${thumbHtml(r, "pemoji")}
          <span class="pn">${esc(r.name)}</span>
          <span class="pc">${esc(r.category || "")}</span>
        </button>`;
      }).join("");
      listEl.querySelectorAll("[data-assign]").forEach(b => b.addEventListener("click", () => {
        state.plan[day][meal].push(b.dataset.assign);
        closeModal(); render(); toast("Zum Plan hinzugefügt");
      }));
    }
    searchEl.addEventListener("input", () => paint(searchEl.value));
    paint("");
    openModal(node);
  }

  // ---------- Shopping list ----------
  function openShopping() {
    const map = new Map(); // normalized -> {label, count}
    DAYS.forEach(d => MEALS.forEach(m => state.plan[d.key][m.key].forEach(rid => {
      const r = getRecipe(rid);
      if (!r || !r.ingredients) return;
      r.ingredients.forEach(i => {
        const norm = i.toLowerCase().trim();
        if (!norm) return;
        if (map.has(norm)) map.get(norm).count++;
        else map.set(norm, { label: i.trim(), count: 1 });
      });
    })));
    const items = Array.from(map.values()).sort((a, b) => a.label.localeCompare(b.label, "de"));

    const checkSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`;
    let body;
    if (items.length === 0) {
      body = `<div class="shop-empty">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 2H2"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/></svg>
        <p>Noch keine Zutaten – plane zuerst ein paar Mahlzeiten im Wochenplan, dann sammeln wir die Zutaten hier automatisch.</p>
      </div>`;
    } else {
      body = `
        <div class="shop-progress">
          <span class="ptext" id="shop-count">0 von ${items.length} erledigt</span>
          <div class="bar"><i id="shop-bar"></i></div>
          <button class="toggle-all" id="shop-toggle" type="button">Alle abhaken</button>
        </div>
        <div class="shop-list">${items.map((it, idx) => `
          <label class="shop-item">
            <input type="checkbox" class="shop-check" id="s${idx}">
            <span class="box" aria-hidden="true">${checkSvg}</span>
            <span class="lbl">${esc(it.label)}</span>
            ${it.count > 1 ? `<span class="qty" title="in ${it.count} Meals der Woche">×${it.count}</span>` : ""}
          </label>`).join("")}</div>`;
    }

    const node = el(`<div class="modal" role="dialog" aria-modal="true" aria-label="Einkaufsliste">
      <div class="modal-head">
        <div class="shop-head" style="flex:1">
          <div class="cart" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 2H2"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg></div>
          <div><div class="kicker">${items.length} Position${items.length===1?"":"en"} · diese Woche</div><h3 style="margin:2px 0 0">Einkaufsliste der Woche</h3></div>
        </div>
        <button class="btn ghost sm" data-close>✕</button>
      </div>
      <div class="modal-body">${body}</div>
      <div class="modal-foot">
        ${items.length ? `<button class="btn" data-copy>Als Text kopieren</button>` : ""}
        <button class="btn primary" data-close>Schließen</button>
      </div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    if (items.length) {
      const checks = Array.from(node.querySelectorAll(".shop-check"));
      const bar = node.querySelector("#shop-bar");
      const countEl = node.querySelector("#shop-count");
      const toggleBtn = node.querySelector("#shop-toggle");
      const updateProgress = () => {
        const done = checks.filter(c => c.checked).length;
        bar.style.width = Math.round(done / checks.length * 100) + "%";
        countEl.textContent = done + " von " + checks.length + " erledigt";
        toggleBtn.textContent = done === checks.length ? "Zurücksetzen" : "Alle abhaken";
      };
      checks.forEach(c => c.addEventListener("change", updateProgress));
      toggleBtn.addEventListener("click", () => { const allDone = checks.every(c => c.checked); checks.forEach(c => { c.checked = !allDone; }); updateProgress(); });
      updateProgress();
    }
    const copyBtn = node.querySelector("[data-copy]");
    if (copyBtn) copyBtn.addEventListener("click", () => {
      const text = items.map(it => "• " + it.label + (it.count > 1 ? " (×" + it.count + ")" : "")).join("\n");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => toast("Liste kopiert")).catch(() => toast("Kopieren nicht möglich"));
      } else toast("Kopieren nicht möglich");
    });
    openModal(node);
  }

  // ---------- Actions ----------
  function deleteRecipe(id) {
    const r = getRecipe(id); if (!r) return;
    const node = el(`<div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head"><h3>Meal löschen?</h3><button class="btn ghost sm" data-close>✕</button></div>
      <div class="modal-body"><p style="margin:0">„<strong>${esc(r.name)}</strong>" wird dauerhaft entfernt und aus dem Wochenplan gelöscht.</p></div>
      <div class="modal-foot"><button class="btn ghost" data-close>Abbrechen</button><button class="btn danger" data-confirm>Löschen</button></div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    node.querySelector("[data-confirm]").addEventListener("click", () => {
      state.recipes = state.recipes.filter(x => x.id !== id);
      DAYS.forEach(d => MEALS.forEach(m => { state.plan[d.key][m.key] = state.plan[d.key][m.key].filter(x => x !== id); }));

    });

  }

  function clearWeek() {
    if (planStats() === 0) { toast("Der Plan ist schon leer"); return; }
    const node = el(`<div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head"><h3>Woche leeren?</h3><button class="btn ghost sm" data-close>✕</button></div>

  // ---------- Toast ----------
  let toastTimer = null;
  function toast(msg) {
    const t = document.getElementById("toast");

  // ---------- Event delegation ----------

    const t = e.target.closest("[data-action]");
    if (!t) return;
    const a = t.dataset.action;
    if (a === "tab") { state.tab = t.dataset.tab; render(); }
    else if (a === "new-recipe") openRecipeForm(null);
    else if (a === "edit") openRecipeForm(t.dataset.id);
    else if (a === "view") openRecipeDetail(t.dataset.id);
    else if (a === "delete") deleteRecipe(t.dataset.id);
    else if (a === "pick") openPicker(t.dataset.day, t.dataset.meal);
    else if (a === "unassign") { e.stopPropagation(); const [d, m, i] = t.dataset.slotSrc.split(":"); state.plan[d][m].splice(Number(i), 1); render(); }
    else if (a === "shopping") openShopping();
    else if (a === "clear-week") clearWeek();
    else if (a === "share") openShare();
    else if (a === "profile-menu") toggleProfileMenu();

  // ---------- Drag & drop between slots ----------
  let dragSrc = null;
  view.addEventListener("dragstart", e => {
    const f = e.target.closest(".filled[data-slot-src]");
    if (!f) return;
    dragSrc = f.dataset.slotSrc;
    f.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", dragSrc); } catch (err) {}
  });
  view.addEventListener("dragend", e => {
    const f = e.target.closest(".filled"); if (f) f.classList.remove("dragging");
    view.querySelectorAll(".slot.dragover").forEach(s => s.classList.remove("dragover"));
    dragSrc = null;
  });
  view.addEventListener("dragover", e => {
    const slot = e.target.closest(".slot[data-slot]");
    if (!slot || !dragSrc) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    slot.classList.add("dragover");
  });
  view.addEventListener("dragleave", e => {
    const slot = e.target.closest(".slot[data-slot]");
    if (slot && !slot.contains(e.relatedTarget)) slot.classList.remove("dragover");
  });
  view.addEventListener("drop", e => {
    const slot = e.target.closest(".slot[data-slot]");
    if (!slot || !dragSrc) return;
    e.preventDefault();
    const target = slot.dataset.slot;
    const [sd, sm, si] = dragSrc.split(":");
    const [td, tm] = target.split(":");
    if (sd === td && sm === tm) { render(); return; } // gleicher Slot – nichts tun
    const moving = state.plan[sd][sm][Number(si)];
    if (moving == null) { render(); return; }
    state.plan[sd][sm].splice(Number(si), 1);
    state.plan[td][tm].push(moving);
    render();
    toast("Verschoben");
  });

  // ---------- Profil (lokal) & Teilen ----------
  const PROFILE_KEY = "wochenkueche_profile_v1";
  const LAST_KEY = "wochenkueche_lastprofile_v1";
  function jget(key, fb) { try { const v = JSON.parse(localStorage.getItem(key)); return v == null ? fb : v; } catch (e) { return fb; } }
  let profile = jget(PROFILE_KEY, null);
  function saveProfile() { try { if (profile) localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); else localStorage.removeItem(PROFILE_KEY); } catch (e) {} }
  function rememberLast() { try { localStorage.setItem(LAST_KEY, JSON.stringify(profile)); } catch (e) {} }
  function initials(name) { return (name || "?").trim().split(/\s+/).slice(0, 2).map(w => w[0] ? w[0].toUpperCase() : "").join("") || "?"; }
  function validEmail(e) { return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e); }

  const appEl = document.querySelector(".app");
  const profileSlot = document.getElementById("profile-slot");

  let pendingShare = null;
  function readSharedFromUrl() {
    try {
      const m = (location.search || "").match(/[?&]s=([A-Za-z0-9_-]+)/);
      if (!m) return;
      pendingShare = m[1];
      history.replaceState(null, "", location.pathname);
    } catch (e) {}
  }
  let authMode = "local";
  let cloudSignalled = false;
  function enterLocalMode() {
    if (cloudSignalled) return;
    cloudSignalled = true; authMode = "local";
    if (!profile) renderAuthLocal(); else enterApp();
  }
  function handleCloudUser(user) {
    cloudSignalled = true; authMode = "cloud";
    if (user && user.emailVerified) {
      profile = {
        name: user.displayName || (user.email ? user.email.split("@")[0] : "Ich"),
        email: user.email || "", uid: user.uid, cloud: true
      };
      saveProfile(); rememberLast();
      enterApp();
      startCloudSync(user.uid);
    } else if (user && !user.emailVerified) {
      stopCloudSync();
      renderVerifyPending(user);
    } else {
      stopCloudSync();
      renderAuthCloud();
    }
  }
  function boot() {
    readSharedFromUrl();
    window.__onCloudAuth = handleCloudUser;
    window.addEventListener("cloudauth:disabled", enterLocalMode);
    // Falls das Cloud-Modul (CDN blockiert / offline) nie antwortet: nach 6 s lokal weiter.
    setTimeout(function () { if (!cloudSignalled) enterLocalMode(); }, 6000);
    renderAuthLoading();
  }
  function enterApp() {
    appEl.classList.remove("authing");

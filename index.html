  // Produktname: die deutschen Felder zuerst — "product_name" ist bei hier ueblichen
  // Produkten haeufig die englische oder kleingeschriebene Fassung ("coca-cola"),
  // waehrend "product_name_de" den Namen liefert, den man auf der Packung liest.
  // Beschreibende generic_name-Felder als letzter Ausweg, damit lieber "Nuss-Nugat-Creme"
  // im Feld steht als gar nichts. Laenge auf das maxlength des Eingabefelds gekappt.
  function offName(p) {
    const cands = [p.product_name_de, p.product_name, p.generic_name_de, p.generic_name];
    for (let i = 0; i < cands.length; i++) {
      const s = String(cands[i] == null ? "" : cands[i]).replace(/\s+/g, " ").trim();
      if (s) return s.slice(0, 60);
    }
    return null;
  }
  async function fetchOffNutrition(code) {
    const url = "https://world.openfoodfacts.org/api/v2/product/" + encodeURIComponent(code) +
      ".json?fields=product_name,product_name_de,generic_name,generic_name_de,nutriments,status";
    const res = await fetch(url);
    if (!res.ok) throw new Error("off-http-" + res.status);
    const data = await res.json();
    if (data.status !== 1 || !data.product) return null;
    const n = data.product.nutriments || {};
    const num = v => (typeof v === "number" && isFinite(v) && v >= 0) ? v : null;
    const kcal = num(n["energy-kcal_100g"]), carbs = num(n.carbohydrates_100g),
          protein = num(n.proteins_100g), fat = num(n.fat_100g);
    if (kcal == null && carbs == null && protein == null && fat == null) return null;
    return { name: offName(data.product), kcal, carbs, protein, fat };
  }

  // Live-Scanner: Kamerabild statt Einzelfoto — man haelt den Barcode in den Rahmen,
  // die Suche startet von selbst. Der Kamera-Lifecycle ist hier die heikelste Stelle:
  // eine weiterlaufende Kamera ist ein Vertrauensbruch, kein Schoenheitsfehler. Deshalb
  // gibt es genau EINE Abbaustelle (cleanup), sie ist mehrfach aufrufbar, und jeder
  // Ausgang laeuft durch sie — Treffer, Abbruch, Fehler, Tabwechsel, Seite verlassen.
  // Aufloesung: { code } bei Treffer, { photo:true } bei Ausweichen aufs Foto,
  // { cancelled:true } bei Abbruch.
  let liveScanStop = null;
  function scanBarcodeLive() {
    return new Promise(resolve => {
      let stream = null, reader = null, timer = 0, done = false;
      const node = el(`<div class="scanwrap" role="dialog" aria-modal="true" aria-label="Barcode scannen">
        <div class="scanbox">
          <div class="scanhead">
            <h3>Barcode scannen</h3>
            <button type="button" class="btn ghost sm" data-x aria-label="Scanner schließen">✕</button>
          </div>
          <div class="scanvid"><video playsinline muted autoplay></video><div class="scanframe"></div></div>
          <p class="scanhint" role="status">Kamera wird gestartet …</p>
          <div class="scanfoot">
            <button type="button" class="btn ghost" data-photo>Stattdessen Foto aufnehmen</button>
          </div>
        </div>
      </div>`);
      const video = node.querySelector("video");
      const hint = node.querySelector(".scanhint");

      function cleanup() {
        if (timer) { clearTimeout(timer); timer = 0; }
        if (reader) { try { reader.reset(); } catch (e) {} reader = null; }
        // Eigene Stream-Referenz, weil ZXings stopStreams() nur die Video-Tracks beendet
        if (stream) { stream.getTracks().forEach(t => { try { t.stop(); } catch (e) {} }); stream = null; }
        try { video.pause(); video.srcObject = null; } catch (e) {}
        document.removeEventListener("keydown", onKey, true);
        document.removeEventListener("visibilitychange", onHide);
        window.removeEventListener("pagehide", onHide);
        if (node.parentNode) node.remove();
        liveScanStop = null;
      }
      function finish(res) { if (done) return; done = true; cleanup(); resolve(res); }
      // Escape darf NUR den Scanner schliessen. Ohne capture + stopPropagation wuerde
      // modalKeys() darunter greifen und das Meal-Formular samt Eingaben mitschliessen.
      function onKey(e) {
        if (e.key !== "Escape") return;
        e.preventDefault(); e.stopPropagation();
        finish({ cancelled: true });
      }
      function onHide(e) { if (e.type === "pagehide" || document.hidden) finish({ cancelled: true }); }
      function fail(msg) {
        if (done) return;
        hint.textContent = msg;
        hint.classList.add("err");
        hint.setAttribute("role", "alert"); // Fehler muss auch vorgelesen werden
      }

      node.querySelector("[data-x]").addEventListener("click", () => finish({ cancelled: true }));
      node.querySelector("[data-photo]").addEventListener("click", () => finish({ photo: true }));
      document.body.appendChild(node);
      liveScanStop = () => finish({ cancelled: true });
      document.addEventListener("keydown", onKey, true);
      document.addEventListener("visibilitychange", onHide);
      window.addEventListener("pagehide", onHide);
      node.querySelector("[data-x]").focus();

      (async () => {
        // getUserMedia gibt es nur im sicheren Kontext: HTTPS oder localhost. Ueber eine
        // http://-Adresse im WLAN (Handy-Test gegen den PC) blockiert der Browser die Kamera.
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          fail("Die Kamera braucht eine sichere Verbindung (HTTPS). Nimm stattdessen ein Foto auf.");
          return;
        }
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 960 } },
            audio: false
          });
        } catch (e) {
          const n = e && e.name;
          fail(n === "NotAllowedError" || n === "SecurityError"
              ? "Kamerazugriff wurde abgelehnt. Erlaube ihn in den Browser-Einstellungen – oder nimm ein Foto auf."
            : n === "NotFoundError" || n === "OverconstrainedError"
              ? "Keine passende Kamera gefunden. Nimm stattdessen ein Foto auf."
              : "Die Kamera lässt sich nicht starten. Nimm stattdessen ein Foto auf.");
          return;
        }
        // Abbruch waehrend der Berechtigungsabfrage: cleanup lief mit stream===null,
        // die Kamera wuerde sonst unbemerkt weiterlaufen.
        if (done) { stream.getTracks().forEach(t => { try { t.stop(); } catch (e) {} }); stream = null; return; }

        video.srcObject = stream;
        // play() bewusst NICHT abwarten: das Promise loest auf manchen Geraeten nie auf,
        // dann haenge der Scanner dauerhaft in "Kamera wird gestartet". Die Erkennung
        // vertraegt ein noch nicht bereites Video — sie versucht es im naechsten
        // Durchlauf einfach erneut. (playsinline + muted decken die Autoplay-Regeln ab.)
        const playing = video.play();
        if (playing && playing.catch) playing.catch(() => {});
        if (done) return;
        hint.textContent = "Halte den Barcode in den Rahmen …";

        // Schneller Weg: native API (Chrome/Edge, Android). Auf dem iPhone gibt es sie
        // nicht — auch nicht in Chrome, das dort WebKit nutzt. Dann uebernimmt ZXing.
        if (window.BarcodeDetector) {
          try {
            const det = new window.BarcodeDetector({ formats: BARCODE_FORMATS });
            const tick = async () => {
              if (done) return;
              try {
                const hits = await det.detect(video);
                if (done) return;
                if (hits && hits[0] && hits[0].rawValue) { finish({ code: hits[0].rawValue }); return; }
              } catch (e) { /* einzelner Frame unlesbar — einfach weiter */ }
              timer = setTimeout(tick, 160); // ~6 Versuche/s reichen und schonen den Akku
            };
            tick();
            return;
          } catch (e) { /* Formate nicht unterstuetzt — faellt auf ZXing durch */ }
        }
        try { await loadZXing(); }
        catch (e) { fail("Der Scanner konnte nicht geladen werden (offline?). Nimm stattdessen ein Foto auf."); return; }
        if (done) return;
        reader = new window.ZXing.BrowserMultiFormatReader();
        // Callback feuert pro Frame; ohne Treffer kommt eine NotFoundException, die hier
        // bewusst ignoriert wird — nur ein echtes Ergebnis beendet den Scan.
        reader.decodeFromStream(stream, video, res => {
          if (done || !res || !res.getText) return;
          finish({ code: res.getText() });
        });
      })();
    });
  }

  // Ruhetag-Ziel aus dem Kalorienrechner (state.goal), hochgerechnet auf `days` Tage.
  // Null, solange der Nutzer noch kein Ergebnis gespeichert hat.
  // Das gespeicherte Ziel ist der RUHETAG-Wert: Alltagsbedarf (BMR × PAL) plus Ziel-
  // Anpassung, ohne Training. An Trainingstagen kommt der Verbrauch der Einheit obendrauf
  // (siehe trainTargets) — deshalb ist der Ruhetag der niedrigste Tag der Woche.
  function goalTargets(days) {
    const g = state.goal;
    if (!g || !nutNum(g.kcal)) return null;
    const n = days || 1;
    return { kcal: nutNum(g.kcal) * n, carbs: nutNum(g.carbs) * n, protein: nutNum(g.protein) * n, fat: nutNum(g.fat) * n };
  }

  // ---------- Trainingstage (Verbrauch je Einheit) ----------
  //
  // Der Trainingsplan haengt an state.goal.training — ein Objekt { mon: {level, min} } —
  // und wird mit dem Ziel zusammen gespeichert und synchronisiert. Bewusst NICHT pro
  // Kalenderwoche: die App haelt ohnehin nur die aktuelle und die naechste Woche vor
  // (pruneWeeks), aeltere verfallen beim Laden. Ein einziger Plan erfuellt „gilt fuer
  // aktuelle + naechste Woche" damit von selbst — und rueckt beim Wochenwechsel
  // automatisch mit, weil der Wochenschluessel wandert, der Plan aber bleibt.
  //
  // Rechenweg je Trainingstag:
  //   kcal   = Ruhetag-kcal + (netto-MET × Gewicht × Stunden)
  //   Eiweiss und Fett bleiben in GRAMM gleich wie am Ruhetag
  //   die gesamte Zusatzenergie geht in die Kohlenhydrate
  // Letzteres ist Absicht und nicht bloss die einfachste Loesung: Kohlenhydrate fuellen
  // die Glykogenspeicher, die die Einheit gerade geleert hat. Eiweiss am Trainingstag
  // zusaetzlich zu erhoehen braeuchte es nicht — der Bedarf richtet sich nach Koerper-
  // gewicht, nicht nach Tagesform.
  function goalTraining() {
    const g = state.goal;
    return (g && g.training && typeof g.training === "object") ? g.training : {};
  }
  function isTrainingDay(dayKey) { return !!goalTraining()[dayKey]; }
  function anyTraining() { return trainingKeys(goalTraining()).length > 0; }

  // Zusatzverbrauch eines Tages in kcal (0 am Ruhetag). Braucht das Koerpergewicht aus
  // dem Ziel — fehlt es (Alt-Daten), gibt es keinen Aufschlag statt eines Fantasiewerts.
  function dayTrainKcal(dayKey) {
    const g = state.goal;
    const e = goalTraining()[dayKey];
    if (!g || !e || !nutNum(g.weight)) return 0;
    return trainKcal(e.level, e.min, nutNum(g.weight));
  }
  // Reine Rechnung auf dem Ruhetag-Wert. Getrennt gehalten, damit der Rechner die
  // Trainingstag-Werte schon in der Vorschau zeigen kann — dort gibt es noch kein
  // gespeichertes state.goal, und zwei getrennte Formeln wuerden auseinanderlaufen.
  function trainFromRest(rest, extraKcal) {
    const add = Math.max(0, Math.round(extraKcal || 0));
    return { kcal: rest.kcal + add, carbs: rest.carbs + Math.round(add / 4),
             protein: rest.protein, fat: rest.fat };
  }
  // Das Ziel EINES Tages, je nach Tagestyp.
  function goalTargetsForDay(dayKey) {
    const rest = goalTargets(1);
    if (!rest) return null;
    if (!isTrainingDay(dayKey)) return rest;
    return trainFromRest(rest, dayTrainKcal(dayKey));
  }
  // Summe der Ziele mehrerer Tage. Ersetzt goalTargets(n) ueberall dort, wo ueber Tage
  // aggregiert wird: die Tage unterscheiden sich jetzt in kcal UND Kohlenhydraten, ein
  // „Tagesziel x 7" waere schlicht falsch.
  function goalTargetsForDays(dayKeys) {
    if (!goalTargets(1)) return null;
    return (dayKeys || []).reduce((a, k) => {
      const t = goalTargetsForDay(k);
      return { kcal: a.kcal + t.kcal, carbs: a.carbs + t.carbs, protein: a.protein + t.protein, fat: a.fat + t.fat };
    }, { kcal: 0, carbs: 0, protein: 0, fat: 0 });
  }
  // Wochensumme der Kalorien fuer EIN Ziel-Objekt — bewusst mit Parameter statt aus
  // state.goal: der Rechner zeigt die Woche fuer ein gerade berechnetes, noch nicht
  // gespeichertes Ziel an, alles andere fuer das gespeicherte. Ohne diesen Parameter
  // gaebe es zwangslaeufig zwei Additionen derselben Sache, die beim naechsten Feature
  // auseinanderlaufen. Geht ueber trainFromRest, damit eine spaetere Regel dort (etwa
  // ein Deckel gegen Ausreisser) hier automatisch mitzieht.
  function weekKcalOf(g) {
    if (!g || !nutNum(g.kcal)) return 0;
    const t = sanitizeTraining(g.training);
    const rest = { kcal: nutNum(g.kcal), carbs: nutNum(g.carbs), protein: nutNum(g.protein), fat: nutNum(g.fat) };
    return DAYS.reduce((s, d) => {
      const e = t[d.key];
      return s + (e ? trainFromRest(rest, trainKcal(e.level, e.min, nutNum(g.weight))).kcal : rest.kcal);
    }, 0);
  }

  // Markierung fuer die Tages-Kopfzeile. Farbe allein traegt die Information nicht
  // (Rot und Blau liegen bei 1,07:1) — deshalb immer Icon UND Wort.
  function trainBadgeHtml(dayKey) {
    const e = goalTraining()[dayKey];
    if (!e) return "";
    const lv = trainLevel(e.level);
    const add = dayTrainKcal(dayKey);
    const title = `Trainingstag: ${lv.label}, ${e.min} Min.${add ? ` · +${nfmt(add)} kcal` : ""}`;
    return `<span class="dtrain" title="${esc(title)}">${ICON_DUMBBELL}${esc(lv.label)}</span>`;
  }

  // Ab diesem Anteil des Ziels gilt der Korridor als getroffen. Darunter ist nicht
  // „gut, weil nicht ueberschritten“, sondern schlicht noch offen – deutlich zu wenig
  // zu essen ist im Defizit ein Fehler, kein Erfolg.
  const GOAL_BAND = 0.9;

  // Zustand gegen ein Ziel: "under" | "ok" | "over".
  // dir "min" (Protein): das Ziel ist eine Untergrenze – darueber ist gut, nie eine
  // Warnung. Alles andere ist eine Obergrenze.
  function goalState(ist, ziel, dir) {
    if (!ziel) return "under";
    const r = ist / ziel;
    if (dir === "min") return r >= 1 ? "ok" : "under";
    if (r > 1) return "over";
    return r >= GOAL_BAND ? "ok" : "under";
  }

  // Ein Fortschrittsbalken. Optionen:
  //   label, ist, ziel, unit – Beschriftung und Werte
  //   cls        – Makro-Farbe des Punktes (t-carb / t-prot / t-fat); der Balken selbst
  //                zeigt immer den Zustand, nicht die Kategorie
  //   dir        – "min" = Untergrenze (Protein), sonst Obergrenze
  //   rest       – true = Restzeile immer, "attention" = nur wenn nicht im Ziel, false = nie
  //   unitInline – Einheit in der Zahlenzeile zeigen
  function goalBarHtml(o) {
    if (!o.ziel) return "";
    const rest = Math.round(o.ziel - o.ist);
    const st = goalState(o.ist, o.ziel, o.dir);
    const pct = Math.max(0, Math.min(100, Math.round(o.ist / o.ziel * 100)));
    const showRest = o.rest === true || (o.rest === "attention" && st !== "ok");
    // Der Zustand steht immer auch als Text da – Farbe allein traegt keine Information.
    // Wortwahl nach Richtung: Protein ist eine Untergrenze, die man erreichen SOLL
    // („noch 33 g“ ist eine Aufforderung). Fett und Kohlenhydrate sind ein Budget, das
    // man beim Abnehmen gerade nicht ausschoepfen muss – „noch 42 g Fett“ laese sich
    // dort wie die Aufforderung, sie noch zu essen. Deshalb „übrig“ — das ist neutral
    // und kurz genug fuer die schmalen Tageskarten („Spielraum“ brach dort um).
    const restTxt = rest < 0
      ? `${nfmt(-rest)} ${o.unit} ${o.dir === "min" ? "über Ziel" : "drüber"}`
      : o.dir === "min"
        ? `noch ${nfmt(rest)} ${o.unit}`
        : `${nfmt(rest)} ${o.unit} übrig`;
    return `<div class="gm ${o.cls || ""} is-${st}">
        <div class="gm-r"><span class="gm-n">${o.label}</span><span class="gm-v"><b>${nfmt(o.ist)}</b>&thinsp;/&thinsp;${nfmt(o.ziel)}${o.unitInline && o.unit ? " " + o.unit : ""}</span></div>
        <div class="gm-bar" role="progressbar" aria-valuenow="${Math.round(o.ist)}" aria-valuemin="0" aria-valuemax="${Math.round(o.ziel)}" aria-label="${esc(o.label)}"><span style="width:${pct}%"></span></div>
        ${showRest ? `<div class="gm-left">${restTxt}</div>` : ""}
      </div>`;
  }

  // Kalorien breit in einer Zeile, darunter die Makros – ueber goalMacrosHtml()
  // genau derselbe Baustein wie bei "Ziele dieser Woche": ausgeschriebene Namen,
  // Label ueber dem Wert. Frueher hatte die Tageskarte eine eigene, engere Variante
  // mit Kuerzeln (P/KH/F) in einem starren Drei-Spalten-Raster - auf schmalen
  // Desktop-Karten (~232px) blieb dafuer kein Platz und Wert/Kuerzel standen in zwei
  // Zeilen uebereinander statt wie hier als Label+Wert PRO Makro. goalMacrosHtml()
  // wickelt stattdessen jedes Makro einzeln (flex-wrap) und schrumpft dadurch von
  // selbst auf ein Makro pro Zeile, sobald der Platz fuer drei nicht reicht.
  function dayGoalsHtml(s, t) {
    return `<div class="day-goals">
        ${goalBarHtml({ label: "Kalorien", ist: s.kcal, ziel: t.kcal, unit: "kcal", rest: true, unitInline: true })}
        ${goalMacrosHtml(s, t)}
      </div>`;
  }

  function dayNutHtml(s, dayKey) {
    if (!hasNut(s)) return "";
    // Ziel des konkreten Tages: am Ruhetag weniger Kohlenhydrate, dafuer mehr Fett.
    const t = goalTargetsForDay(dayKey);
    // Mit gespeichertem Ziel ersetzen die Balken die Textzeile – sonst staende alles doppelt.
    if (t) return dayGoalsHtml(s, t);
    return `<div class="day-nut">
        <span class="kcal">${nfmt(s.kcal)} <small>kcal</small></span>
        <span class="macros">
          <span class="m carb"><b>${nfmt(s.carbs)}</b>&nbsp;g KH</span>
          <span class="m prot"><b>${nfmt(s.protein)}</b>&nbsp;g Eiw.</span>
          <span class="m fat"><b>${nfmt(s.fat)}</b>&nbsp;g Fett</span>
        </span>
      </div>`;
  }

  function weekNutHtml() {
    const w = weekNut();
    const activeDays = DAYS.filter(d => hasNut(dayNut(d.key))).length;
    // „an x Tagen“ steht jetzt als Kennzeichen in der Wochenspalte, hier reicht der Schnitt.
    const avg = activeDays ? ` · ⌀ ${nfmt(w.kcal / activeDays)} kcal pro geplantem Tag` : "";
    // Wochenziel = Summe aller sieben Tagesziele. Bewusst summiert statt „Tagesziel x 7“:
    // mit Carb-Cycling unterscheiden sich Kohlenhydrate und Fett je Tagestyp, die Woche
    // haengt dann davon ab, WELCHE Tage Trainingstage sind. Dass ein Teil davon noch
    // ungeplant ist, sagt das Kennzeichen „x von 7 Tagen geplant“.
    const t = goalTargetsForDays(DAYS.map(d => d.key));
    // Das Wochenziel steht mit Ziel schon in der Wochenspalte („11.900 / 15.400 kcal“) —
    // in der Kopfzeile waere es ein drittes Kleingedrucktes, das mobil umbricht.
    const goalSub = "";
    const tiles = `
        <div class="wn-tile t-kcal"><div class="val">${nfmt(w.kcal)}<span class="u">kcal</span></div><div class="lbl">Kalorien</div></div>
        <div class="wn-tile t-carb"><div class="val">${nfmt(w.carbs)}<span class="u">g</span></div><div class="lbl">Kohlenhydrate</div></div>
        <div class="wn-tile t-prot"><div class="val">${nfmt(w.protein)}<span class="u">g</span></div><div class="lbl">Proteine</div></div>
        <div class="wn-tile t-fat"><div class="val">${nfmt(w.fat)}<span class="u">g</span></div><div class="lbl">Fett</div></div>`;
    const body = t && hasNut(w) ? weekGoalHtml(w, t) : `<div class="wn-tiles">${tiles}</div>`;
    return `<div class="week-nut">
        <div class="wn-head"><h3>${t ? "Ziele dieser Woche" : "Wochenbilanz"}</h3><span class="wn-sub">Summe aller eingeplanten Meals (je Portion)${avg}${goalSub}</span></div>
        ${hasNut(w)
          ? body
          : `<p class="wn-empty">Trage bei deinen Meals Makros ein (Kalorien, Kohlenhydrate, Proteine, Fett) – dann erscheint hier die Tages- und Wochenbilanz.</p>`}
      </div>`;
  }

  // Eine flache Statusleiste: Ring links, Text daneben, Makros rechts. `headHtml` ist
  // die Titelzeile (Zeitraum + Kennzeichen) und sitzt IM Textblock statt als eigene
  // Ueberschrift darueber — das spart genau die Hoehe, die den Block vorher so wuchtig
  // gemacht hat. `ringLbl` steht in der Ringmitte unter dem Prozentwert.
  const RING_C = 201; // Umfang bei r=32 (2 × π × 32)
  function goalRingHtml(ist, ziel, ringLbl, headHtml, macrosHtml) {
    const rest = Math.round(ziel - ist);
    const st = goalState(ist, ziel);
    const ratio = ziel ? ist / ziel : 0;
    const pct = Math.round(ratio * 100);
    const off = Math.max(0, RING_C * (1 - Math.min(1, ratio)));
    // Zustand immer als Text, nicht nur ueber die Ringfarbe.
    const stTxt = st === "over" ? "drüber" : st === "ok" ? "im Ziel" : "übrig";
    return `<div class="wg is-${st}">
        <div class="wg-ring">
          <svg viewBox="0 0 78 78" width="78" height="78" aria-hidden="true">
            <circle class="wg-track" cx="39" cy="39" r="32"/>
            <circle class="wg-fill" cx="39" cy="39" r="32" stroke-dasharray="${RING_C}" stroke-dashoffset="${off}"/>
          </svg>
          <div class="wg-c"><b>${pct}%</b><span>${ringLbl}</span></div>
        </div>
        <div class="wg-txt">
          <span class="wg-lbl">${headHtml}</span>
          <span class="wg-big">${nfmt(Math.abs(rest))} <em>kcal ${stTxt}</em></span>
          <span class="wg-base">${nfmt(ist)} / ${nfmt(ziel)} kcal</span>
        </div>
        ${macrosHtml || ""}
      </div>`;
  }

  // Die drei Makrobalken einer Spalte. Protein ist eine Untergrenze (dir "min"),
  // Kohlenhydrate und Fett sind ein Budget — daher unterschiedliche Bewertung.
  // Hier stehen die Makros ausgeschrieben — anders als in den schmalen Tageskarten
  // des Plans (dayGoalsHtml), wo nur Kuerzel hineinpassen.
  function goalMacrosHtml(s, t) {
    return `<div class="wg-macros">
        ${goalBarHtml({ label: "Proteine", ist: s.protein, ziel: t.protein, unit: "g", cls: "t-prot", dir: "min", rest: "attention", unitInline: true })}
        ${goalBarHtml({ label: "Kohlenhydrate", ist: s.carbs, ziel: t.carbs, unit: "g", cls: "t-carb", rest: "attention", unitInline: true })}
        ${goalBarHtml({ label: "Fett", ist: s.fat, ziel: t.fat, unit: "g", cls: "t-fat", rest: "attention", unitInline: true })}
      </div>`;
  }

  // Zwei flache Leisten untereinander: heutiger Tag und ganze Woche, beide mit
  // Kalorienring UND Makros. Untereinander statt nebeneinander, weil jede Leiste so
  // die volle Breite nutzt — die Makros passen dann rechts daneben statt darunter,
  // und der ganze Block bleibt flach.
  function weekGoalHtml(w, t) {
    const d = DAYS.filter(x => x.key === todayDayKey())[0] || DAYS[0];
    const day = goalTargetsForDay(d.key);
    const s = dayNut(d.key);
    const mode = state.goal && MODE_LABEL[state.goal.mode];
    // In der Naechste-Woche-Ansicht ist „heute“ nur der gleiche Wochentag – dann
    // steht der Tagesname allein, damit die Spalte nicht das Falsche behauptet.
    const dayHead = state.viewWeek === "next" ? esc(d.label) : `Heute · ${esc(d.label)}`;
    const plannedKeys = DAYS.filter(x => hasNut(dayNut(x.key))).map(x => x.key);
    const planned = plannedKeys.length;
    const open = 7 - planned;
    // Verglichen wird gegen das Ziel der GEPLANTEN Tage, nicht gegen Tagesziel x 7.
    // Sonst meldet die Leiste bei 5 geplanten Tagen „3.500 kcal übrig“, obwohl der
    // Nutzer auf diesen 5 Tagen bereits ueber seinem Schnitt liegt — die fehlenden
    // 2 Tage sehen dann wie Spielraum aus, statt schlicht ungeplant zu sein.
    // Summiert ueber die konkreten Tage, weil Kohlenhydrate und Fett am Ruhetag anders
    // liegen — welche fuenf Tage geplant sind, entscheidet dann ueber das Wochenziel.
    const wt = planned ? goalTargetsForDays(plannedKeys) : t;
    const scope = planned === 7 ? "ganze Woche" : `${planned} geplante Tag${planned === 1 ? "" : "e"}`;
    // Trainings-Kennzeichen auch in der Tagesspalte der Uebersicht — sonst erklaert
    // sich das abweichende Kohlenhydrat-Ziel dort nicht.
    const dayTrainAdd = isTrainingDay(d.key) ? dayTrainKcal(d.key) : 0;
    const dayTrain = isTrainingDay(d.key)
      ? `<span class="wg-train" title="Trainingstag: ${esc(trainLevel((goalTraining()[d.key] || {}).level).label)}">${ICON_DUMBBELL}${dayTrainAdd ? `+${nfmt(dayTrainAdd)} kcal` : "Training"}</span>` : "";
    const dayHeadHtml = `${dayHead}${dayTrain}${mode ? `<span class="wg-chip">${esc(mode)}</span>` : ""}`;
    const weekHeadHtml = `Diese Woche<span class="wg-chip plain">${scope}</span>`;
    // Was bleibt fuer die noch leeren Tage? Das ist beim Planen die eigentlich
    // gesuchte Zahl — der blosse Wochenrest sagt nicht, wie viel pro Tag noch geht.
    const restKcal = t.kcal - w.kcal;
    const perOpen = open > 0 && restKcal > 0
      ? `<div class="wg-open">Für die ${open} offenen Tage bleiben ⌀ <b>${nfmt(restKcal / open)} kcal</b> pro Tag</div>`
      : "";
    // Auf dem Handy liegen die beiden Leisten nebeneinander und werden gewischt
    // (siehe CSS) – die Knopfleiste sagt, welche gerade zu sehen ist. Am Rechner
    // ist sie ausgeblendet, dort stehen beide untereinander wie bisher.
    return `<div class="wgbar" role="group" aria-label="Zielansicht wählen">
        <button type="button" class="wg-b">${state.viewWeek === "next" ? esc(d.label) : "Heute"}</button>
        <button type="button" class="wg-b">Diese Woche</button>
      </div>
      <div class="wg-cols">
        <div class="wg-col">${goalRingHtml(s.kcal, day.kcal, "Tag", dayHeadHtml, goalMacrosHtml(s, day))}</div>
        <div class="wg-col">${goalRingHtml(w.kcal, wt.kcal, "Woche", weekHeadHtml, goalMacrosHtml(w, wt))}${perOpen}</div>
      </div>`;
  }

  // Wochentag von heute – geteilt von der Uebersicht und der „Heute“-Markierung im Plan.
  function todayDayKey() { return ["sun", "mon", "tue", "wed", "thu", "fri", "sat"][new Date().getDay()]; }

  function nutFactsHtml(r) {
    const n = recipeNut(r);
    if (!hasNut(n)) return "";
    return `<div class="dsec"><h4>Makros <span style="text-transform:none;letter-spacing:0;font-weight:400">· je Portion</span></h4>
        <div class="nutfacts">
          <div class="nf t-kcal"><div class="v">${nfmt(n.kcal)}<span class="u">kcal</span></div><div class="k">Kalorien</div></div>
          <div class="nf t-carb"><div class="v">${nfmt(n.carbs)}<span class="u">g</span></div><div class="k">Kohlenhydrate</div></div>
          <div class="nf t-prot"><div class="v">${nfmt(n.protein)}<span class="u">g</span></div><div class="k">Proteine</div></div>
          <div class="nf t-fat"><div class="v">${nfmt(n.fat)}<span class="u">g</span></div><div class="k">Fett</div></div>
        </div></div>`;
  }

  // ---------- Handy-Karussell (Wochenplan, Wochenziele, Rechner) ----------
  // Die Hoehenanpassungen der gerade aufgebauten Streifen UND deren ResizeObserver.
  // Bewusst Listen hier statt eines window-Listeners/Observers je Karussell: die
  // Streifen werden bei jedem render() neu gebaut, ein Listener pro Durchlauf waere
  // ein Leck. resetCarousels() leert beide Listen vor dem Neuaufbau und trennt die
  // alten Observer ausdruecklich (sonst haelt ein ResizeObserver seine beobachteten,
  // laengst aus dem DOM entfernten Knoten weiter am Leben). Steht VOR initCarousel,
  // damit die Zuweisung sicher vor dem ersten Aufruf lief.
  const fits = [];
  const carouselObservers = [];
  function resetCarousels() {
    carouselObservers.forEach(ro => ro.disconnect());
    carouselObservers.length = 0;
    fits.length = 0;
  }
  window.addEventListener("resize", () => fits.forEach(f => f()));

  // Bindet einen waagerecht schnappenden Streifen an die Knopfleiste darueber. Die
  // Kopplung laeuft ueber scrollLeft und NICHT ueber scrollIntoView: letzteres
  // verschiebt die Seite auch senkrecht, man wuerde beim Tagwechsel also
  // ungewollt nach oben oder unten springen.
  // Am Rechner steht die Leiste auf display:none, der Streifen ist ein normales
  // Raster – dann laeuft hier nur ein Klick-Handler mit, der nie ausgeloest wird.
  // panelList: nur noetig, wenn die Karten keine direkten Kinder des Streifens sind.
  // Beim Rechner ist das so – dort flacht display:contents die Zwischenebene nur fuer
  // die Darstellung ein, im DOM bleibt sie stehen, und .children liefe daneben.
  // onChange meldet jeden Kartenwechsel; der Rechner haengt daran seinen Fussknopf.
  function initCarousel(scroller, bar, panelList, onChange) {
    if (!scroller || !bar) return null;
    const panels = panelList || Array.prototype.slice.call(scroller.children);
    const btns = Array.prototype.slice.call(bar.children);
    if (!panels.length || !btns.length) return null;

    let activeIdx = -1;
    function setActive(idx) {
      btns.forEach((b, i) => {
        const on = i === idx;
        b.classList.toggle("active", on);
        if (on) b.setAttribute("aria-current", "true"); else b.removeAttribute("aria-current");
      });
      if (idx !== activeIdx) { activeIdx = idx; if (onChange) onChange(idx); }
    }

    // Aktiv ist die Karte, deren linke Kante zuletzt vor der Mitte des Fensters lag –
    // das trifft auch waehrend eines halb gewischten Uebergangs das Richtige.
    function currentIndex() {
      const mid = scroller.scrollLeft + scroller.clientWidth / 2;
      let idx = 0;
      panels.forEach((p, i) => { if (p.offsetLeft - panels[0].offsetLeft <= mid) idx = i; });
      return idx;
    }

    function markActive() { setActive(currentIndex()); }

    // Der Streifen ist von sich aus so hoch wie die hoechste Karte. Mit
    // align-items: flex-start behaelt zwar jede Karte ihre eigene Hoehe, der
    // Streifen bliebe aber trotzdem auf Maximalhoehe stehen – die Luecke waere dann
    // nur nach draussen gewandert, vor die Einkaufsliste. Also die Hoehe der gerade
    // sichtbaren Karten nachfuehren. Beim Wischen zaehlt das Maximum der angerissenen
    // Karten, sonst wuerde die hereinkommende hoehere Karte unterwegs abgeschnitten.
    function fitHeight() {
      // Am Rechner ist .week ein Raster und scrollt nicht – dort nichts anfassen.
      if (scroller.scrollWidth <= scroller.clientWidth + 10) { scroller.style.height = ""; return; }
      const left = scroller.scrollLeft, right = left + scroller.clientWidth;
      let h = 0;
      panels.forEach(p => {
        const a = p.offsetLeft - panels[0].offsetLeft;
        if (a + p.offsetWidth > left + 1 && a < right - 1) h = Math.max(h, p.offsetHeight);
      });
      if (h) scroller.style.height = h + "px";
    }
    fits.push(fitHeight);

    // Karten koennen nach dem Aufbau wachsen: waehlt man im Rechner ein Ziel, klappt
    // das Tempo-Feld auf; setzt man Trainingstage, kommen Zeilen dazu. Ohne Nachmessen
    // behaelt der Streifen seine alte Hoehe und schneidet das Neue mit overflow:hidden
    // ab – der untere Teil der Karte war dann nicht mehr erreichbar. Ein Beobachter auf
    // den Karten faengt jede Ursache ab, statt jede einzelne Stelle von Hand nachzuziehen.
    if (window.ResizeObserver) {
      const ro = new ResizeObserver(() => fitHeight());
      panels.forEach(p => ro.observe(p));
      carouselObservers.push(ro);
    }

    let ticking = false;
    scroller.addEventListener("scroll", () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => { ticking = false; markActive(); fitHeight(); });
    }, { passive: true });

    function go(i) {
      const p = panels[i];
      if (!p) return;
      // Markierung sofort umsetzen, nicht erst wenn das Scroll-Ereignis kommt: beim
      // Sanftlauf dauert das mehrere hundert Millisekunden, und ein Knopf, der nach
      // dem Tippen noch tot aussieht, wird ein zweites Mal getippt.
      const from = currentIndex();
      setActive(i);
      // Der Sanftlauf animiert stur ueber die gesamte Strecke – von Montag auf Samstag
      // hiesse das, durch alle Zwischentage zu rauschen. Das ist keine Bewegung, die
      // etwas erklaert, sondern nur Wartezeit. Deshalb: nur zum Nachbartag sanft
      // gleiten (dort zeigt die Bewegung, in welche Richtung es ging), sonst direkt
      // setzen. Bei mehr als einer Karte Abstand springt es also sofort.
      const neighbour = Math.abs(i - from) <= 1;
      scroller.scrollTo({
        left: p.offsetLeft - panels[0].offsetLeft,
        behavior: (neighbour && !reducedMotion()) ? "smooth" : "auto",
      });
      // Beim Direktsprung steht die neue Position schon – dann die Hoehe sofort
      // mitziehen, statt einen Frame lang die alte stehen zu lassen. Beim Sanftlauf
      // rechnet das Scroll-Ereignis unterwegs ohnehin laufend nach.
      fitHeight();
    }

    btns.forEach((b, i) => b.addEventListener("click", () => go(i)));

    markActive();
    fitHeight();
    return { go: go, fit: fitHeight, index: currentIndex };
  }

  function reducedMotion() {
    return !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
  }

  // Die Tagesleiste klebt unter dem Seitenkopf. Dessen Hoehe haengt an Schriftgroesse
  // und Bildschirmbreite (Slogan bricht um, Reiter wandern nach unten) – deshalb
  // gemessen und als --head-h gesetzt, statt im CSS eine Zahl zu raten.
  function syncStickyOffsets() {
    const root = document.documentElement;
    const head = document.querySelector("header.site");
    if (head) root.style.setProperty("--head-h", head.offsetHeight + "px");
    // Untere Reiterleiste: auf dem Handy fest am Bildschirmrand. Der klebende
    // Fussknopf des Rechners muss darueber sitzen, sonst laege er dahinter. Am Rechner
    // steht die Leiste im Kopf, dann ist der Abstand 0.
    const tabs = document.querySelector(".tabs");
    const fixed = tabs && getComputedStyle(tabs).position === "fixed";
    root.style.setProperty("--tabbar-h", fixed ? tabs.offsetHeight + "px" : "0px");
  }
  window.addEventListener("resize", syncStickyOffsets);

  function renderPlan() {
    const filled = planStats();
    // Die Ziel-Uebersicht steht bewusst UEBER dem Plan: der Stand soll beim Oeffnen
    // sofort sichtbar sein. (Unter dem Plan war sie kurzzeitig, hat sich aber nicht
    // bewaehrt — nicht erneut verschieben ohne Ruecksprache.)
    let html = `${appHeroHtml(filled)}
      ${weekNutHtml()}
      <div class="section-head plan-head">
        <div class="title">
          <h2>Dein Wochenplan</h2>
          <div class="sub">${filled} von 21 Mahlzeiten geplant · tippe auf eine Mahlzeit, um ein Meal zu wählen</div>
        </div>
        <div class="plan-tools">
          <div class="week-switch" role="tablist" aria-label="Woche wählen">
            <button class="ws-btn${state.viewWeek === "next" ? "" : " active"}" data-action="week" data-week="cur" role="tab" aria-selected="${state.viewWeek === "next" ? "false" : "true"}">Aktuelle Woche</button>
            <button class="ws-btn${state.viewWeek === "next" ? " active" : ""}" data-action="week" data-week="next" role="tab" aria-selected="${state.viewWeek === "next" ? "true" : "false"}">Nächste Woche</button>
          </div>
          <button class="btn ghost grow" data-action="share">${TOOL_ICONS.share}Woche teilen</button>
          <button class="btn ghost" data-action="clear-week">${TOOL_ICONS.clear}Woche leeren</button>
        </div>
      </div>`;

    // In der Naechste-Woche-Ansicht gibt es kein „heute“ – sonst wuerde derselbe
    // Wochentag faelschlich als heutiger markiert.
    const todayKey = state.viewWeek === "next" ? null : todayDayKey();

    // Tagesleiste: nur auf dem Handy sichtbar (CSS), dort Anzeige und Sprungziel des
    // Karussells. Kein role="tablist" – es sind keine Reiter, sondern Sprungmarken
    // in einen Streifen, der auch gewischt werden kann. Die Kurzform steht sichtbar,
    // der volle Wochentag im aria-label; sonst laese eine Sprachausgabe nur „Mo“.
    html += `<nav class="daybar" aria-label="Zum Wochentag springen">`;
    DAYS.forEach(d => {
      const isToday = d.key === todayKey;
      html += `<button type="button" class="db-b${isToday ? " is-today" : ""}" aria-label="${esc(d.label)}${isToday ? " (heute)" : ""}"><span>${d.short}</span><span class="db-dot" aria-hidden="true"></span></button>`;
    });
    html += `</nav><div class="week">`;

    DAYS.forEach(d => {
      const isToday = d.key === todayKey;
      // Warnzeichen direkt in der Kopfzeile: sonst sieht man erst beim Scrollen zur
      // Fussbilanz, welcher Tag den Korridor sprengt. Beim Ueberfliegen der Woche ist
      // aber genau das die Frage — welchen Tag muss ich nachjustieren?
      const dTarget = goalTargetsForDay(d.key);
      const dSum = dayNut(d.key);
      const dOver = dTarget && hasNut(dSum) && goalState(dSum.kcal, dTarget.kcal) === "over";
      // Die Trainings-Markierung haengt am gespeicherten Ziel: ohne Ziel gibt es auch
      // keine Tagestypen, dann bleibt die Karte wie bisher.
      const isTrain = !!state.goal && isTrainingDay(d.key);
      html += `<section class="day${isToday ? " today" : ""}${dOver ? " over" : ""}${isTrain ? " training" : ""}"><div class="day-head"><span class="dname">${d.label}</span>${isTrain ? trainBadgeHtml(d.key) : ""}${dOver ? `<span class="dover" title="Über dem Tagesziel">${nfmt(dSum.kcal - dTarget.kcal)} kcal drüber</span>` : ""}<span class="dtag">${isToday ? "Heute" : d.short}</span></div><div class="slots">`;
      MEALS.forEach(m => {
        const ids = state.plan[d.key][m.key];
        html += `<div class="slot" data-meal="${m.key}" data-slot="${d.key}:${m.key}">
          <div class="mlabel">${m.label}</div>`;
        let shown = 0;
        ids.forEach((rid, idx) => {
          const r = getRecipe(rid);
          if (!r) return;
          shown++;
          html += `<div class="filled" draggable="true" data-action="view" data-id="${r.id}" data-slot-src="${d.key}:${m.key}:${idx}" title="${esc(r.name)} – ziehen zum Verschieben">
              ${thumbHtml(r, "r-thumb")}
              <div><div class="r-name">${esc(r.name)}</div>${recipeNut(r).kcal ? `<div class="r-meta">${nfmt(recipeNut(r).kcal)} kcal</div>` : ""}</div>
              <button class="x" data-action="unassign" data-slot-src="${d.key}:${m.key}:${idx}" aria-label="Entfernen" title="Entfernen">✕</button>
            </div>`;
        });
        html += `<button class="add${shown ? " more" : ""}" data-action="pick" data-day="${d.key}" data-meal="${m.key}">+ ${shown ? "Noch ein Meal" : "Meal wählen"}</button>`;
        html += `</div>`;
      });
      html += `</div>${dayNutHtml(dayNut(d.key), d.key)}</section>`;
    });

    html += `</div>
      <button class="shop-cta" data-action="shopping">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6 5 2H2"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/></svg>
        Einkaufsliste der Woche
      </button>`;
    view.innerHTML = html;
    syncStickyOffsets();
    resetCarousels(); // die Streifen des vorigen Durchlaufs sind gerade weggeworfen worden
    initCarousel(view.querySelector(".week"), view.querySelector(".daybar"));
    // Nur vorhanden, wenn ein Ziel gespeichert ist – initCarousel faengt null ab.
    initCarousel(view.querySelector(".wg-cols"), view.querySelector(".wgbar"));
  }

  // Bewusst nicht gespeichert: beim Neuladen sind alle Kategorien wieder offen.
  const collapsedCats = new Set();

  function renderRecipes() {
    let html = `
      <div class="section-head">
        <div class="title">
          <h2>Meine Meals</h2>
          <div class="sub">${state.recipes.length} Meal${state.recipes.length === 1 ? "" : "s"} · pflege hier deine Meals ein</div>
        </div>
        ${state.recipes.some(isExample) ? `<button class="btn ghost sm" data-action="clear-examples">Beispiele entfernen</button>` : ""}
        <button class="btn primary" data-action="new-recipe">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Neues Meal
        </button>
      </div>`;

    if (state.recipes.length === 0) {
      html += `<div class="empty">
        <svg class="em-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V7l-4-3H5a1 1 0 0 0-1 1Z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
        <h3>Noch keine Meals</h3>
        <p>Lege dein erstes Meal an – danach kannst du es im Wochenplan auf die Tage verteilen.</p>
        <button class="btn primary" data-action="new-recipe">Erstes Meal anlegen</button>
      </div>`;
    } else {
      const groups = new Map(CATEGORIES.map(c => [c, []]));
      state.recipes.forEach(r => {
        const c = groups.has(r.category) ? r.category : "Sonstige";
        if (!groups.has(c)) groups.set(c, []);
        groups.get(c).push(r);
      });

      for (const [cat, items] of groups) {
        if (items.length === 0) continue;
        items.sort((a, b) => a.name.localeCompare(b.name, "de"));
        const open = !collapsedCats.has(cat);
        html += `<section class="catgroup">
          <button class="cathead" data-action="toggle-cat" data-cat="${esc(cat)}" aria-expanded="${open}">
            <svg class="caret${open ? " open" : ""}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            <span class="cname">${iconSvg(CAT_ICON[cat] || "pot", "cicon")}${esc(cat)}</span>
            <span class="ccount">${items.length}</span>
          </button>`;
        if (!open) { html += `</section>`; continue; }
        html += `<div class="recipes">`;
        items.forEach(r => {
        const ing = (r.ingredients || []);
        const ingPreview = ing.length ? esc(ing.slice(0, 4).map(ingLabel).join(" · ")) + (ing.length > 4 ? " …" : "") : "Keine Zutaten hinterlegt";
        html += `<article class="rcard" data-rid="${r.id}">
          ${cardImageHtml(r)}
          <button class="imgadd" data-action="photo" data-id="${r.id}" title="Eigenes Foto für dieses Meal wählen" aria-label="Eigenes Foto für dieses Meal wählen">+</button>
          <div class="rbody">
          <div class="top">
            <h3>${esc(r.name)}</h3>
            ${isExample(r) ? `<span class="chip example" title="Mitgeliefertes Beispiel-Meal">Beispiel</span>` : ""}
          </div>
          <div class="meta">
            ${recipeNut(r).kcal ? `<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c1 3 4 4.4 4 8a4 4 0 0 1-8 0c0-1.3.4-2.1 1-3 .3 1 .8 1.6 1.5 1.9C10 8 10.4 5.4 12 3Z"/></svg>${nfmt(recipeNut(r).kcal)} kcal</span>` : ""}
            <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h10"/></svg>${ing.length} Zutat${ing.length === 1 ? "" : "en"}</span>
          </div>
          <div class="ingredients">${ingPreview}</div>
          <div class="actions">
            <button class="btn ghost sm" data-action="view" data-id="${r.id}">${ACT_ICONS.view}Ansehen</button>
            <button class="btn ghost sm" data-action="edit" data-id="${r.id}">${ACT_ICONS.edit}Bearbeiten</button>
            <button class="btn del-ic" data-action="delete" data-id="${r.id}" title="Meal löschen" aria-label="Meal löschen">${ACT_ICONS.del}</button>
          </div>
          </div>
        </article>`;
        });
        html += `</div></section>`;
      }
    }
    view.innerHTML = html;
  }

  // ---------- Modal ----------
  const modalRoot = document.getElementById("modal-root");
  const FOCUSABLE = 'a[href], button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])';
  let lastFocused = null;   // Element, das den Dialog geoeffnet hat
  function closeModal() {
    // Sicherheitsnetz: schliesst irgendetwas das Formular, waehrend der Live-Scanner
    // laeuft, darf die Kamera nicht weiterlaufen.
    if (liveScanStop) liveScanStop();
    modalRoot.innerHTML = "";
    document.removeEventListener("keydown", modalKeys);
    // Fokus dorthin zurueckgeben, wo er herkam - sonst landet er beim Schliessen am
    // Seitenanfang und Tastaturnutzer verlieren ihre Position.
    if (lastFocused && document.contains(lastFocused)) { try { lastFocused.focus(); } catch (e) {} }
    lastFocused = null;
  }
  // Escape schliesst; Tab bleibt im Dialog gefangen (sonst wandert der Fokus hinter
  // den Dialog in die Seite, die visuell gar nicht bedienbar ist).
  function modalKeys(e) {
    if (e.key === "Escape") { closeModal(); return; }
    if (e.key !== "Tab") return;
    const box = modalRoot.querySelector(".modal");
    if (!box) return;
    const items = Array.prototype.filter.call(box.querySelectorAll(FOCUSABLE), el => el.offsetParent !== null);
    if (!items.length) return;
    const first = items[0], last = items[items.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }
  function openModal(node) {
    hoveredCardId = null;   // Maus steht ab jetzt ueber dem Overlay, nicht mehr auf einer Karte
    lastFocused = document.activeElement;
    const overlay = document.createElement("div");
    overlay.className = "overlay";
    overlay.addEventListener("mousedown", e => { if (e.target === overlay) closeModal(); });
    overlay.appendChild(node);
    modalRoot.innerHTML = "";
    modalRoot.appendChild(overlay);
    document.addEventListener("keydown", modalKeys);
    const focusEl = node.querySelector("input, textarea, select, button");
    if (focusEl) setTimeout(() => focusEl.focus(), 30);
  }
  function el(html) { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstElementChild; }

  // Einheitlicher Ja/Nein-Dialog. Ersetzt fuenf fast identische Modal-Bloecke; damit
  // sehen Bestaetigungen ueberall gleich aus und verhalten sich gleich.
  //   title, text (oder bodyHtml fuer Auszeichnungen), okLabel, onConfirm
  function confirmModal(o) {
    const node = el(`<div class="modal" role="dialog" aria-modal="true" aria-label="${esc(o.title)}">
      <div class="modal-head"><h3>${esc(o.title)}</h3><button class="btn ghost sm" data-close aria-label="Schließen">✕</button></div>
      <div class="modal-body">${o.bodyHtml || `<p style="margin:0">${esc(o.text || "")}</p>`}</div>
      <div class="modal-foot"><button class="btn ghost" data-close>Abbrechen</button><button class="btn danger" data-confirm>${esc(o.okLabel || "Löschen")}</button></div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    node.querySelector("[data-confirm]").addEventListener("click", () => { closeModal(); o.onConfirm(); });
    openModal(node);
  }

  // ---------- Recipe form ----------
  function openRecipeForm(id) {
    const r = id ? getRecipe(id) : null;
    const opts = CATEGORIES.map(c => `<option value="${c}" ${r && r.category === c ? "selected" : ""}>${c}</option>`).join("");
    const node = el(`<div class="modal detail" role="dialog" aria-modal="true" aria-label="${r ? "Meal bearbeiten" : "Neues Meal"}">
      <div class="modal-head"><h3>${r ? "Meal bearbeiten" : "Neues Meal"}</h3><button class="btn ghost sm" data-close>✕</button></div>
      <div class="modal-body">
        <div class="field">
          <label for="f-name">Name des Meals</label>
          <input type="text" id="f-name" placeholder="z. B. Ofengemüse mit Feta" value="${r ? esc(r.name) : ""}" maxlength="80">
        </div>
        <div class="field"><label for="f-cat">Kategorie</label><select id="f-cat">${opts}</select></div>
        <div class="field">
          <label>Zutaten <span class="hint">– Namen tippen und aus der Vorschlagsliste wählen; bei Markenprodukten den Barcode scannen</span></label>
          <div id="f-ings"></div>
          <button type="button" class="btn sm" id="f-ing-add" hidden>+ Weitere Zutat</button>
          <input type="file" id="f-ing-barcode" accept="image/*" capture="environment" class="visually-hidden">
        </div>
        <!-- Steht bewusst UNTER den Zutaten: es ist deren Ergebnis, nicht noch eine
             Eingabe. Der Rahmen grenzt die Summe von den gleich aussehenden
             Zutatenzeilen ab. -->
        <div class="field nut-total">
          <label>Makros gesamt <span class="hint" id="f-nut-hint">– mit Zutaten-Nährwerten automatisch summiert</span></label>
          <div class="row2" style="gap:12px">
            <div class="row2" style="gap:12px">
              <div class="field"><label for="f-kcal" class="hint">Kalorien (kcal)</label><input type="number" id="f-kcal" min="0" max="99999" step="1" value="${r && r.nutrition && r.nutrition.kcal != null ? esc(r.nutrition.kcal) : ""}" placeholder="520"></div>
              <div class="field"><label for="f-carbs" class="hint">Kohlenhydrate (g)</label><input type="number" id="f-carbs" min="0" max="9999" step="0.1" value="${r && r.nutrition && r.nutrition.carbs != null ? esc(r.nutrition.carbs) : ""}" placeholder="60"></div>
            </div>
            <div class="row2" style="gap:12px">
              <div class="field"><label for="f-protein" class="hint">Proteine (g)</label><input type="number" id="f-protein" min="0" max="9999" step="0.1" value="${r && r.nutrition && r.nutrition.protein != null ? esc(r.nutrition.protein) : ""}" placeholder="30"></div>
              <div class="field"><label for="f-fat" class="hint">Fett (g)</label><input type="number" id="f-fat" min="0" max="9999" step="0.1" value="${r && r.nutrition && r.nutrition.fat != null ? esc(r.nutrition.fat) : ""}" placeholder="18"></div>
            </div>
          </div>
        </div>
        <div class="field">
          <label for="f-steps">Zubereitung <span class="hint">– optional</span></label>
          <textarea id="f-steps" placeholder="Beschreibe die Schritte …">${r && r.steps ? esc(r.steps) : ""}</textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" data-close>Abbrechen</button>
        <button class="btn primary" data-save>${r ? "Speichern" : "Meal anlegen"}</button>
      </div>
    </div>`);

    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));

    // --- Zutaten-Zeilen (Name, Menge, Naehrwerte pro 100 g, Barcode-Scan) ---
    const ingsWrap = node.querySelector("#f-ings");
    const barcodeInput = node.querySelector("#f-ing-barcode");
    let barcodeRow = null;
    let acSeq = 0; // laufende Nummer fuer die Listbox-IDs (aria-activedescendant)
    const barcodeSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path stroke-width="2.4" d="M4 5v14"/><path stroke-width="1.4" d="M7.5 5v14"/><path stroke-width="2.4" d="M10.5 5v14"/><path stroke-width="1.4" d="M13.5 5v14"/><path stroke-width="1.4" d="M16.5 5v14"/><path stroke-width="2.4" d="M19.5 5v14"/></svg>`;
    function nutVal(v) { return v != null ? esc(v) : ""; }
    function addIngRow(o) {
      o = o || {};
      if (o.unit == null && node.querySelector("#f-cat").value === "Getränk") o.unit = "ml";
      const u = ingUnit(o);
      const row = el(`<div class="ing-row">
        <div class="ing-top">
          <span class="ing-nrow">
            <span class="ing-nwrap">
              <input type="text" class="ing-name" placeholder="Zutat, z. B. Reis" maxlength="60" autocomplete="off" value="${esc(o.name || "")}">
              <ul class="ing-ac" role="listbox" hidden></ul>
            </span>
            <button type="button" class="ing-barcode" title="Barcode mit der Kamera scannen – füllt Name und Nährwerte automatisch">${barcodeSvg}<span>Scannen</span></button>
          </span>
          <span class="ing-gwrap">
            <input type="number" class="ing-g" min="0" max="99999" step="1" placeholder="200" value="${nutVal(o.grams)}" aria-label="Menge">
            <select class="ing-u" aria-label="Einheit">
              <option value="g"${u === "g" ? " selected" : ""}>g</option>
              <option value="ml"${u === "ml" ? " selected" : ""}>ml</option>
              <option value="st"${u === "st" ? " selected" : ""}>Stück</option>
            </select>
          </span>
          <button type="button" class="ing-ic ing-del" title="Zutat entfernen">✕</button>
        </div>
        <div class="ing-nut">
          <span class="ing-per">${ingPerLabel(u)}</span>
          <div class="ing-vals">
            <label>Kcal<input type="number" class="ing-kcal" min="0" max="9999" step="1" value="${nutVal(o.kcal)}"></label>
            <label>KH<input type="number" class="ing-carbs" min="0" max="999" step="0.1" value="${nutVal(o.carbs)}"></label>
            <label>P<input type="number" class="ing-prot" min="0" max="999" step="0.1" value="${nutVal(o.protein)}"></label>
            <label>F<input type="number" class="ing-fat" min="0" max="999" step="0.1" value="${nutVal(o.fat)}"></label>
          </div>
        </div>
      </div>`);
      row.querySelector(".ing-del").addEventListener("click", () => { row.remove(); updateMacroSum(); });
      row.querySelector(".ing-barcode").addEventListener("click", () => { startBarcodeFlow(row); });
      row.querySelectorAll("input").forEach(inp => inp.addEventListener("input", updateMacroSum));
      // Einheit umstellen: Bezugsgroesse der Naehrwerte mitziehen. Bei Stueck gibt es keine
      // 100er-Basis — der Barcode-Scan liefert aber immer pro 100 g und stellt die Einheit
      // ohnehin selbst zurueck, deshalb bleibt der Knopf hier sichtbar.
      const uSel = row.querySelector(".ing-u");
      function syncUnit() {
        const cur = uSel.value;
        row.querySelector(".ing-per").textContent = ingPerLabel(cur);
        row.querySelector(".ing-g").placeholder = cur === "st" ? "2" : "200";
        updateMacroSum();
      }
      uSel.addEventListener("change", syncUnit);
      syncUnit();

      // --- Zutaten-Suche (ARIA-Combobox auf dem Namensfeld) ---
      // Sucht in FOODS und fuellt bei Auswahl Einheit und alle vier Naehrwerte. Wer nichts
      // auswaehlt, tippt wie bisher frei weiter — die Liste ist ein Angebot, kein Zwang.
      const nameInp = row.querySelector(".ing-name");
      const acBox = row.querySelector(".ing-ac");
      const acId = "ing-ac-" + (++acSeq);
      acBox.id = acId;
      nameInp.setAttribute("role", "combobox");
      nameInp.setAttribute("aria-expanded", "false");
      nameInp.setAttribute("aria-autocomplete", "list");
      nameInp.setAttribute("aria-controls", acId);
      let acHits = [], acCur = -1, acOpen = false;
      function acClose() {
        if (!acOpen) return;
        acOpen = false; acCur = -1;
        acBox.hidden = true;
        row.classList.remove("ac-open");
        nameInp.setAttribute("aria-expanded", "false");
        nameInp.removeAttribute("aria-activedescendant");
      }
      function acMark(i) {
        acCur = i;
        Array.prototype.forEach.call(acBox.children, (li, n) => {
          const on = n === i;
          li.classList.toggle("on", on);
          li.setAttribute("aria-selected", on ? "true" : "false");
        });
        if (i >= 0) {
          nameInp.setAttribute("aria-activedescendant", acId + "-" + i);
          const li = acBox.children[i];
          if (li && li.scrollIntoView) li.scrollIntoView({ block: "nearest" });
        } else nameInp.removeAttribute("aria-activedescendant");
      }
      function acShow() {
        acHits = foodSearch(nameInp.value, 8);
        if (!acHits.length) { acClose(); return; }
        acBox.innerHTML = acHits.map((f, n) =>
          `<li class="ing-ac-item" role="option" aria-selected="false" id="${acId}-${n}">` +
          `<span class="fname">${esc(f.name)}</span>` +
          `<span class="fnut">${nfmt(f.kcal)} kcal · ${f.unit === "st" ? "je Stück" : "je 100 " + f.unit}</span></li>`).join("");
        acBox.hidden = false; acOpen = true;
        row.classList.add("ac-open");
        nameInp.setAttribute("aria-expanded", "true");
        acMark(-1);
      }
      function acPick(i) {
        const f = acHits[i];
        if (!f) return;
        nameInp.value = f.name;
        uSel.value = f.unit;
        row.querySelector(".ing-kcal").value = f.kcal;
        row.querySelector(".ing-carbs").value = f.carbs;
        row.querySelector(".ing-prot").value = f.protein;
        row.querySelector(".ing-fat").value = f.fat;
        acClose();
        syncUnit(); // zieht Bezugsgroesse, Scan-Button und die Makro-Summe nach
        row.querySelector(".ing-g").focus(); // jetzt fehlt nur noch die Menge
      }
      nameInp.addEventListener("input", acShow);
      nameInp.addEventListener("blur", acClose);
      nameInp.addEventListener("keydown", e => {
        if (e.key === "ArrowDown" || e.key === "ArrowUp") {
          if (!acOpen) { acShow(); if (!acOpen) return; }
          e.preventDefault();
          let n = acCur + (e.key === "ArrowDown" ? 1 : -1);
          if (n < 0) n = acHits.length - 1;
          if (n >= acHits.length) n = 0;
          acMark(n);
        } else if (e.key === "Enter" && acOpen && acCur >= 0) {
          e.preventDefault(); acPick(acCur);
        } else if (e.key === "Escape" && acOpen) {
          e.preventDefault();
          e.stopPropagation(); // nur die Liste schliessen, nicht das ganze Modal
          acClose();
        } else if (e.key === "Tab") acClose();
      });
      // mousedown abfangen: sonst verliert das Feld den Fokus und blur schliesst die
      // Liste, bevor der Klick ueberhaupt ankommt.
      acBox.addEventListener("mousedown", e => e.preventDefault());
      acBox.addEventListener("click", e => {
        const li = e.target.closest(".ing-ac-item");
        if (li) acPick(Array.prototype.indexOf.call(acBox.children, li));
      });

      ingsWrap.appendChild(row);
      return row;
    }
    function rowData(row) {
      const name = row.querySelector(".ing-name").value.trim();
      if (!name) return null;
      const o = { name };
      const grams = nutParse(row.querySelector(".ing-g").value);
      const kcal = nutParse(row.querySelector(".ing-kcal").value);
      const carbs = nutParse(row.querySelector(".ing-carbs").value);
      const protein = nutParse(row.querySelector(".ing-prot").value);
      const fat = nutParse(row.querySelector(".ing-fat").value);
      if (grams == null && kcal == null && carbs == null && protein == null && fat == null) return name; // reiner Freitext wie frueher
      const unit = row.querySelector(".ing-u").value;
      if (grams != null) o.grams = grams;
      if (unit !== "g") o.unit = unit; // "g" ist Default und bleibt ungespeichert
      if (kcal != null) o.kcal = kcal;
      if (carbs != null) o.carbs = carbs;
      if (protein != null) o.protein = protein;
      if (fat != null) o.fat = fat;
      return o;
    }
    function collectIngs() { return Array.from(ingsWrap.querySelectorAll(".ing-row")).map(rowData).filter(Boolean); }
    // Summe aller Zutaten (auf Menge hochgerechnet) → Makro-Felder; solange keine Zutat
    // Naehrwerte hat, bleiben die Felder manuell editierbar.
    function updateMacroSum() {
      const withNut = collectIngs().filter(i => typeof i === "object" && nutNum(i.grams) && ingHasNut(i));
      const auto = withNut.length > 0;
      if (auto) {
        let s = { kcal: 0, carbs: 0, protein: 0, fat: 0 };
        withNut.forEach(i => { s = addNut(s, ingContrib(i)); });
        node.querySelector("#f-kcal").value = Math.round(s.kcal);
        node.querySelector("#f-carbs").value = Math.round(s.carbs * 10) / 10;
        node.querySelector("#f-protein").value = Math.round(s.protein * 10) / 10;
        node.querySelector("#f-fat").value = Math.round(s.fat * 10) / 10;
      }
      ["f-kcal", "f-carbs", "f-protein", "f-fat"].forEach(fid => { node.querySelector("#" + fid).readOnly = auto; });
      node.querySelector("#f-nut-hint").textContent = auto ? "– Summe aus deinen Zutaten (automatisch)" : "– mit Zutaten-Nährwerten automatisch summiert";
      // "+ Weitere Zutat" erst zeigen, wenn die erste Zutat einen Namen hat - sonst wirkt
      // das Formular ueberladen, bevor ueberhaupt etwas eingetragen wurde.
      node.querySelector("#f-ing-add").hidden = ![...ingsWrap.querySelectorAll(".ing-name")].some(inp => inp.value.trim());
    }
    (r && r.ingredients && r.ingredients.length ? r.ingredients : [null]).forEach(i => addIngRow(i == null ? null : ingObj(i)));
    updateMacroSum();
    node.querySelector("#f-ing-add").addEventListener("click", () => { addIngRow().querySelector(".ing-name").focus(); });
    // Kategorie -> Getraenk gewechselt: noch unberuehrte Zutatenzeilen (kein Name, keine
    // Menge, Einheit noch auf dem "g"-Default) auf ml umstellen. Bereits befuellte Zeilen
    // bleiben unangetastet, damit keine bewusst gewaehlte Einheit ueberschrieben wird.
    node.querySelector("#f-cat").addEventListener("change", (e) => {
      if (e.target.value !== "Getränk") return;
      ingsWrap.querySelectorAll(".ing-row").forEach(row => {
        const nameEl = row.querySelector(".ing-name"), gEl = row.querySelector(".ing-g"), uEl = row.querySelector(".ing-u");
        if (!nameEl.value && !gEl.value && uEl.value === "g") { uEl.value = "ml"; uEl.dispatchEvent(new Event("change")); }
      });
    });
    // Barcode -> Open Food Facts -> Zeile fuellen. Gemeinsamer Weg fuer beide Zugaenge
    // (Live-Kamera und Einzelfoto). Der Scan ersetzt die Zeile vollstaendig: Einheit
    // (OFF normiert alles auf 100 g), alle vier Naehrwerte UND den Namen. Den Namen
    // auszunehmen waere inkonsequent — er ist die Identitaet des gescannten Produkts,
    // keine persoenliche Notiz. Liefert der Treffer keinen Namen, bleibt der bisherige
    // stehen, statt ihn gegen nichts zu tauschen. Die Rueckmeldung nennt das erkannte
    // Produkt, damit ein ersetzter Name nicht wortlos verschwindet.
    async function applyBarcode(row, code) {
      const btn = row.querySelector(".ing-barcode");
      btn.disabled = true; btn.classList.add("busy");
      toast("Suche Produkt …");
      try {
        const p = await fetchOffNutrition(code);
        if (!p) { toast("Produkt nicht gefunden – bitte manuell eintragen"); return; }
        if (p.name) row.querySelector(".ing-name").value = p.name;
        row.querySelector(".ing-u").value = "g";
        row.querySelector(".ing-u").dispatchEvent(new Event("change"));
        if (p.kcal != null) row.querySelector(".ing-kcal").value = Math.round(p.kcal);
        if (p.carbs != null) row.querySelector(".ing-carbs").value = p.carbs;
        if (p.protein != null) row.querySelector(".ing-prot").value = p.protein;
        if (p.fat != null) row.querySelector(".ing-fat").value = p.fat;
        updateMacroSum();
        toast(p.name ? "„" + p.name + "“ übernommen – Werte bitte kurz prüfen"
                     : "Nährwerte übernommen – bitte kurz prüfen");
      } catch (e) {
        toast("Suche nicht möglich (offline?) – bitte manuell eintragen");
      } finally {
        btn.disabled = false; btn.classList.remove("busy");
      }
    }
    // Einstieg ueber den Zeilen-Button: erst Live-Kamera; wer dort aufs Foto ausweicht
    // (oder wessen Kamera nicht startet), landet auf dem bisherigen Foto-Weg.
    async function startBarcodeFlow(row) {
      const r = await scanBarcodeLive();
      if (!r || r.cancelled) return;
      if (!row.isConnected) return; // Zeile inzwischen entfernt
      if (r.photo) { barcodeRow = row; barcodeInput.click(); return; }
      if (r.code) await applyBarcode(row, r.code);
    }
    // Foto-Weg: Bild -> Code lokal auslesen -> gemeinsamer Nachschlage-Pfad
    barcodeInput.addEventListener("change", async () => {
      const f = barcodeInput.files && barcodeInput.files[0];
      barcodeInput.value = "";
      const row = barcodeRow; barcodeRow = null;
      if (!f || !row || !row.isConnected) return;
      const btn = row.querySelector(".ing-barcode");
      btn.disabled = true; btn.classList.add("busy");
      toast("Lese Barcode …");
      let code = null, failed = false;
      try {
        code = await detectBarcode(f);
      } catch (e) {
        failed = true;
        toast("Erkennung nicht möglich (offline?) – bitte manuell eintragen");
      } finally {
        btn.disabled = false; btn.classList.remove("busy");
      }
      if (failed) return;
      if (!code) { toast("Kein Barcode erkannt – bitte näher heran oder manuell eintragen"); return; }
      await applyBarcode(row, code);
    });

    node.querySelector("[data-save]").addEventListener("click", () => {
      const name = node.querySelector("#f-name").value.trim();
      if (!name) { node.querySelector("#f-name").focus(); node.querySelector("#f-name").style.borderColor = "var(--danger)"; toast("Bitte gib einen Namen ein"); return; }
      const ingredients = collectIngs();
      const nutrition = {
        kcal: nutParse(node.querySelector("#f-kcal").value),
        carbs: nutParse(node.querySelector("#f-carbs").value),
        protein: nutParse(node.querySelector("#f-protein").value),
        fat: nutParse(node.querySelector("#f-fat").value),
      };
      const hasAnyNut = nutrition.kcal != null || nutrition.carbs != null || nutrition.protein != null || nutrition.fat != null;
      // Portionen/Minuten sind bewusst entfallen (ein Meal = eine Portion); das Meal-Bild
      // wird nicht mehr hier, sondern ueber das "+" auf der Meal-Karte gepflegt.
      const data = {
        name,
        category: node.querySelector("#f-cat").value,
        nutrition: hasAnyNut ? nutrition : null,
        ingredients,
        steps: node.querySelector("#f-steps").value.trim(),
      };
      if (r) { Object.assign(r, data); toast("Meal gespeichert"); }
      else { state.recipes.push(Object.assign({ id: uid() }, data)); toast("Meal angelegt"); }
      closeModal(); render();
    });
    openModal(node);
  }

  // ---------- Recipe detail ----------
  function openRecipeDetail(id) {
    const r = getRecipe(id); if (!r) return;
    const cls = CAT_CLASS[r.category] || "cat-x";
    const ing = r.ingredients && r.ingredients.length
      ? `<ul>${r.ingredients.map(i => `<li>${esc(ingLabel(i))}${ingHasNut(i) && nutNum(ingObj(i).grams) ? ` <span style="color:var(--text-muted);font-size:12px">· ${nfmt(ingContrib(i).kcal)} kcal</span>` : ""}</li>`).join("")}</ul>`
      : `<p style="color:var(--text-muted);margin:0">Keine Zutaten hinterlegt.</p>`;
    const node = el(`<div class="modal detail" role="dialog" aria-modal="true" aria-label="${esc(r.name)}">
      <div class="modal-head">
        <div style="flex:1"><div class="kicker">Meal</div><h3 style="margin-top:2px">${esc(r.name)}</h3></div>
        <span class="chip ${cls}">${esc(r.category || "Gericht")}</span>
        <button class="btn ghost sm" data-close>✕</button>
      </div>
      <div class="modal-body">
        <div class="dbanner has-photo"><img class="rphoto" src="${photoFor(r)}" alt="${esc(r.name)}"></div>
        ${nutFactsHtml(r)}
        <div class="dsec"><h4>Zutaten</h4>${ing}</div>
        ${r.steps ? `<div class="dsec"><h4>Zubereitung</h4><div class="steps">${esc(r.steps)}</div></div>` : ""}
      </div>
      <div class="modal-foot">
        <button class="btn danger" data-del>${ACT_ICONS.del}Löschen</button>
        <button class="btn" data-edit>${ACT_ICONS.edit}Bearbeiten</button>
        <button class="btn primary" data-close>Schließen</button>
      </div>
    </div>`);
    node.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeModal));
    node.querySelector("[data-edit]").addEventListener("click", () => { closeModal(); openRecipeForm(r.id); });
    node.querySelector("[data-del]").addEventListener("click", () => { closeModal(); deleteRecipe(r.id); });
    openModal(node);
  }

  // ---------- Picker ----------
  function openPicker(day, meal) {
    const dLabel = DAYS.find(d => d.key === day).label;
    const mLabel = MEALS.find(m => m.key === meal).label;
    if (state.recipes.length === 0) {
      const node = el(`<div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head"><h3>Noch keine Meals</h3><button class="btn ghost sm" data-close>✕</button></div>
        <div class="modal-body"><p style="margin:0;color:var(--text-muted)">Du hast noch keine Meals angelegt. Wechsle in den Reiter <strong>Meals</strong> und leg zuerst ein Meal an.</p></div>

    const listEl = node.querySelector("#p-list");
    const searchEl = node.querySelector("#p-search");
    const mealCat = MEALS.find(m => m.key === meal).label;
    let showAll = false;

    function paint(q) {
      const query = (q || "").toLowerCase().trim();
      let list = state.recipes.slice().sort((a, b) => a.name.localeCompare(b.name, "de"));
      if (query) list = list.filter(r => r.name.toLowerCase().includes(query) || (r.category || "").toLowerCase().includes(query));
      const hidden = list.filter(r => !catFitsMeal(r.category, meal)).length;
      if (!showAll) list = list.filter(r => catFitsMeal(r.category, meal));
      // suggest matching category first
      list.sort((a, b) => {
        const sa = a.category === mealCat ? 0 : 1, sb = b.category === mealCat ? 0 : 1;
        return sa - sb;
      });
      const more = hidden > 0
        ? `<div class="pmore">
             <span>${hidden} Meal${hidden === 1 ? " passt" : "s passen"} nicht zu ${esc(mealCat)}</span>
             <button class="btn ghost sm" data-toggle-all>${showAll ? "Nur passende" : "Alle anzeigen"}</button>
           </div>`
        : "";
      if (list.length === 0) {
        listEl.innerHTML = `<p style="color:var(--text-muted);padding:8px 4px;margin:0">Kein passendes Meal gefunden.</p>${more}`;
      } else {
        listEl.innerHTML = list.map(r => {
          const suggest = r.category === mealCat ? " suggest" : "";
          const off = catFitsMeal(r.category, meal) ? "" : " offcat";
          return `<button class="pitem${suggest}${off}" data-assign="${r.id}">
            ${thumbHtml(r, "pthumb")}
            <span class="pn">${esc(r.name)}</span>
            <span class="pc">${esc(r.category || "")}</span>
          </button>`;
        }).join("") + more;
      }
      const toggle = listEl.querySelector("[data-toggle-all]");
      if (toggle) toggle.addEventListener("click", () => { showAll = !showAll; paint(searchEl.value); });
      listEl.querySelectorAll("[data-assign]").forEach(b => b.addEventListener("click", () => {
        state.plan[day][meal].push(b.dataset.assign);
        closeModal(); render(); toast("Zum Plan hinzugefügt");
      }));
    }
    searchEl.addEventListener("input", () => paint(searchEl.value));
    paint("");
    openModal(node);
  }

  // ---------- Shopping list ----------
  // Grobe Warengruppen fuer die Einkaufsliste (Stichwort-Matching wie PHOTO_RULES).
  // Reihenfolge = Pruef- UND Anzeigereihenfolge (grob wie ein Supermarkt-Rundgang);
  // die zuerst passende Gruppe gewinnt. Stichwoerter mit < 4 Zeichen matchen nur als
  // ganzes Wort, laengere per Wortanfang/-ende (deutsche Komposita), aber nie in der
  // Wortmitte -- so schnappt "reis" nicht in "Preiselbeere", "eis" nicht in "Rindfleisch".
  // Erweitern: einfach Stichwoerter in die passende Liste eintragen (klein, ss statt ss/ß).
  const SHOP_CATS = [
    { key: "gemuese", title: "Obst & Gemüse", icon: "🥬", kw: ["zwiebel","knoblauch","schalotte","paprika","tomate","tomaten","tomatenmark","karotte","möhre","moehre","zucchini","gurke","salat","rucola","spinat","brokkoli","blumenkohl","kartoffel","süsskartoffel","pilz","champignon","lauch","porree","sellerie","kohl","kürbis","kuerbis","aubergine","bohne","bohnen","erbse","erbsen","zuckerschote","zuckererbse","mais","avocado","ingwer","chili","kohlrabi","fenchel","spargel","radieschen","rettich","bete","kresse","apfel","äpfel","aepfel","banane","zitrone","limette","orange","clementine","mandarine","beere","beeren","himbeer","erdbeer","heidelbeer","blaubeer","brombeer","traube","trauben","birne","mango","pfirsich","nektarine","aprikose","ananas","melone","kiwi","pflaume","kirsche","feige","petersilie","basilikum","schnittlauch","koriander","minze"] },
